    try { return JSON.parse(JSON.stringify(stripFirestoreHeavyFields(obj))); }
    catch (e) {
      try { console.error("[verrocchio sanitize] serialization failed:", e); } catch (_) {}
      // Returning the raw object would cause the Firestore set() to
      // reject with "Unsupported field value" and mask the real cause.
      // Safer to return an empty doc — caller will see it in the cloud
      // log and the local copy is untouched.
      return {};
    }
  };
  // Save method. localStorage is treated as the source of truth for
  // the "Saved" indicator — if we wrote to it, the user's data is
  // safe on this device, full stop. Firestore is best-effort behind
  // the scenes: with offline persistence enabled, .set() resolves
  // from the local IndexedDB cache and queues the network attempt,
  // so it rarely rejects in normal operation. Failures get logged to
  // the console but DON'T flip the UI to "Offline" — that label was
  // misleading (data was always saved locally) and added noise on
  // every transient blip. A genuine Firestore problem still shows up
  // as a [verrocchio save] warning in DevTools.
  const save = useCallback(d => {
    const stamped = { ...d, _updatedAt: Date.now() };
    setData(stamped);
    latestData.current = stamped;
    if (demoMode) {
      setSaved(true);
      setTimeout(() => setSaved(false), 800);
      setSyncState("synced");
      return;
    }
    let localOk = false;
    try {
      localStorage.setItem(lsKey, JSON.stringify(stamped));
      localOk = true;
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (e) {
      try { console.warn("[verrocchio save] localStorage failed:", e); } catch (_) {}
    }
    // Only show "synced" when at least localStorage accepted the
    // write. A failed localStorage write (Safari private mode, quota
    // exceeded, blocked storage) used to flip the indicator to
    // "synced" anyway — silently lying to the user that their data
    // was saved. Leave the indicator on "loading" so the user has at
    // least one signal something is wrong.
    if (localOk) setSyncState("synced");
    if (!uid) return;
    userDoc(uid).set(sanitizeForFirestore(stamped)).then(() => {
      // Clear any prior failure banner once a write lands successfully.
      setLastSyncError(null);
      lastSaveRef.current = null;
    }).catch(err => {
      try { console.warn("[verrocchio save] cloud write rejected:", err && err.code, err && err.message); } catch (e) {}
      // W3-T21: surface failure so the user can retry. Local copy is
      // already safe at this point (localOk === true above).
      setLastSyncError((err && (err.code || err.message)) || "save-failed");
      lastSaveRef.current = stamped;
    });
  }, [demoMode, uid, lsKey]);

  // §13.4a (v75) — dispatch helper for extracted views. Accepts a curried
  // domain action `(data) => newData` and runs it against the freshest
  // data, then persists via save(). Tolerant of non-function args.
  const dispatch = React.useCallback((transform) => {
    const cur = latestData.current || data;
    const next = typeof transform === "function" ? transform(cur) : transform;
    if (next && next !== cur) save(next);
  }, [data, save]);

  // The visibility/pagehide flush and 30s heartbeat were removed:
  // both existed to compensate for the old 800ms save() debounce,
  // but save() now writes to Firestore immediately on every call.
  // The heartbeat could also race a more recent save from another
  // device — re-writing this device's stale snapshot would clobber
  // the cloud. Less code, fewer cross-device hiccups.

  // Wipe-all-data action. Empties every content array. (Historical
  // note: DD used to inject SEED_GOALS / SEED_HABITS as the default,
  // so cloning DD would leave wiped users staring at example habits.
  // SEED constants are now empty by design, but we still build the
  // blank doc from scratch — explicit beats clever.)
  //
  // Writes directly to localStorage + Firestore rather than going
  // through save() so a broken save path can't silently swallow the
  // wipe. Each step logs to [verrocchio wipe] for debug.
  const wipeAllData = async () => {
    const blank = {
      goals: [],
      habits: [],
      todos: [],
      journal: [],
      quotes: [],
      archive: [],
      goalArchive: [],
      dailyRitual: {},
      upcomingDates: [],
      dayVisits: [],
      bestStreaks: {},
      achievementsUnlocked: {},
      customGoalTypes: [],
      customImportance: [],
      customSections: [],
      travelDays: [],
      homeLocation: "",
      xp: 0,
      onboardingComplete: true,
      tourDone: true,
      _updatedAt: Date.now()
    };
    // 1. In-memory React state.
    try { setData(blank); } catch (e) { try { console.warn("[verrocchio wipe] setData failed", e); } catch (_) {} }
    latestData.current = blank;
    // 2. Per-user localStorage.
    try {
      localStorage.setItem(lsKey, JSON.stringify(blank));
    } catch (e) {
      try { console.warn("[verrocchio wipe] localStorage write failed", e); } catch (_) {}
    }
    // 3. Firestore (only when signed in and not in demo).
    if (!demoMode && uid) {
      try {
        await userDoc(uid).set(sanitizeForFirestore(blank));
      } catch (e) {
        try { console.warn("[verrocchio wipe] Firestore set failed:", e && e.code, e && e.message, e); } catch (_) {}
      }
    }
    setConfirmWipe(null);
    setConfirmWipeTyped("");
    setShowProfile(false);
  };

  /* ── Day-visit tracking ──
     Append today's date key to data.dayVisits the first time the user
     opens the app each calendar day. Only runs once data is loaded and
     the user is actually in the app (not splash / login / onboarding /
     demo mode). Idempotent — if tk() is already the last entry, noop. */
  useEffect(() => {
    if (demoMode) return;
    if (!data || !data.onboardingComplete) return;
    const today = tk();
    const visits = Array.isArray(data.dayVisits) ? data.dayVisits : [];
    if (visits[visits.length - 1] === today) return; // fast path
    if (visits.indexOf(today) !== -1) return;
    save({ ...data, dayVisits: [...visits, today] });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.onboardingComplete, demoMode]);

  /* ── Achievement stat computation ──
     Derives the numbers that unlock tiers. Streak computation uses
     max(current streak across active habits, cached best-ever per
     habit), so streaks earned and later reset still count. */
  // Habit-pattern derivations that were previously recomputed on every
  // render of the Home tab. Both findCorrelations (O(N²·60)) and the
  // per-habit off-schedule scan (O(N·14)) only change when the
  // underlying habits array changes, so gating them on data.habits
  // identity skips the work on unrelated re-renders (tab switch,
  // scroll, etc.). The briefing prompt, the briefing fallback, and
  // the smartTips block all read these memoized values now.
  // §6 Future Habits — exclude parked habits from AI inputs. They're
  // inert: should not influence correlation discovery, off-schedule
  // detection, or any other behavioral signal.
  const memoedCorrelations = useMemo(() => findCorrelations(((data && data.habits) || []).filter(h => h && !h.parked)), [data && data.habits]);
  const memoedOffSchedule = useMemo(
    () => window.habitsDomain.offScheduleHabits((data && data.habits) || []),
    [data && data.habits]
  );
  // §perf — App-wide streak. Pure logic in habitsDomain.appWideStreak;
  // useMemo here keeps the 365-day walk off the hot render path so it
  // recomputes only when habits change.
  const memoedAppStreak = useMemo(
    () => window.habitsDomain.appWideStreak((data && data.habits) || []),
    [data && data.habits]
  );
  // §perf — historyPanel timeline. Pure aggregator lives in
  // lib/domains/history.js (historyDomain.flatHistoryEvents). useMemo
  // here keeps the O(N log N) sort off the hot render path — only
  // recomputes when habits / goals / goalArchive change.
  const memoedHistoryEvents = useMemo(
    () => window.historyDomain.flatHistoryEvents(data),
    [data && data.habits, data && data.goals, data && data.goalArchive]
  );
  // §perf — Goals tab "sort areas by recent progress". Pure logic in
  // habitsDomain.sortAreasByProgress; useMemo here keeps the per-habit
  // getCR fan-out off the hot render path. Goals-tab IIFE still has a
  // local fallback for non-default sort modes (custom / date-sort).
  const memoedAreaProgress = useMemo(
    () => window.habitsDomain.sortAreasByProgress((data && data.habits) || [], HT),
    [data && data.habits]
  );
  // Pure aggregator lives in lib/domains/achievements.js.
  // useMemo here keeps the per-habit getStreak fan-out + SMART scan
  // off the hot render path; only recomputes when `data` changes.
  const achievementStats = useMemo(
    () => window.achievementsDomain.computeAchievementStats(data),
    [data]
  );

  // Removed: a one-shot effect that collapsed every section except
  // the current time-of-day one once data loaded. The user prefers
  // all sections expanded on first render, and the initial
  // `collapsedSections` state already starts every section open —
  // re-collapsing them after data arrives would override that.
  // didInitCollapseRef is kept declared in case any other effect
  // wants to gate on first-data-loaded later.

  /* ── Cache first-unlock timestamps ──
     Whenever stats cross a threshold for the first time, record the
     moment in data.achievementsUnlocked so the UI can show "Unlocked
     on Apr 21, 2026" even if the underlying stat later regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const already = (data && data.achievementsUnlocked) || {};
    const newly = {};
    ACHIEVEMENTS.forEach(a => {
      if (already[a.id]) return;
      if ((achievementStats[a.stat] || 0) >= a.threshold) {
        newly[a.id] = Date.now();
      }
    });
    if (Object.keys(newly).length === 0) return;
    save({ ...data, achievementsUnlocked: { ...already, ...newly } });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [achievementStats.visits, achievementStats.bestStreak, achievementStats.goals, achievementStats.habitsActive, achievementStats.xp, achievementStats.smartGoals, achievementStats.goalsCreated, achievementStats.activeGoalsCleared, achievementStats.habitPerGoal, achievementStats.featuresExplored]);

  /* Also keep data.bestStreaks up-to-date — whenever a habit's current
     streak exceeds its cached best, bump the cache so the achievement
     counter never regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const habitsArr = data.habits || [];
    const cache = { ...(data.bestStreaks || {}) };
    let changed = false;
    habitsArr.forEach(h => {
      const s = getStreak(h);
      if (s > (cache[h.id] || 0)) { cache[h.id] = s; changed = true; }
    });
    if (changed) save({ ...data, bestStreaks: cache });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.habits]);

  const exportData = () => {
    const b = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `verrocchio-backup-${tk()}.json`;
    a.click();
  };
  const importData = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const p = JSON.parse(ev.target.result);
        if (!p.habits) p.habits = SEED_HABITS;
        if (!p.goals) p.goals = SEED_GOALS;
        if (!p.journal) p.journal = [];
        if (!p.archive) p.archive = [];
        if (!p.quotes) p.quotes = [];
        if (!p.todos) p.todos = [];
        save(p);
      } catch {
        alert("Invalid file.");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  /* TODOS */
  // All to-do writers read latestData.current so a sync echo / habit
  // toggle landing during a tap doesn't get clobbered. The audit-fix
  // pass migrated other writers but skipped these — symptom users
  // reported as "to-dos don't save properly" / disappear after sync.
  // ID comparisons normalized to String(x)===String(y) so an
  // import/export round-trip that flips a Number id to a String can't
  // silently drop the find/filter match.
  const addTodo = () => {
    if (!nTodo.trim()) return;
    const cur = latestData.current || data;
    save({
      ...cur,
      todos: [...(cur.todos || []), {
        id: Date.now(),
        text: nTodo.trim(),
        done: false,
        date: new Date().toDateString(),
        dueDate: nTodoDue || null,
        goalId: nTodoGoalId || null
      }]
    });
    touchFeature("todo.create");
    sNTodo("");
    sNTodoDue("");
    // Keep the goal selection sticky — users adding multiple to-dos for
    // the same goal shouldn't have to re-pick it every time. Clear it
    // explicitly via the picker's "No goal" option.
  };
  const sETodo = t => {
    sETodoId(t.id);
    sETodoTxt(t.text);
    sETodoDue(t.dueDate || "");
  };
  const svETodo = id => {
    if (!eTodoTxt.trim()) return;
    const cur = latestData.current || data;
    save({
      ...cur,
      todos: (cur.todos || []).map(t => String(t.id) === String(id) ? {
        ...t,
        text: eTodoTxt.trim(),
        dueDate: eTodoDue || null
      } : t)
    });
    sETodoId(null);
  };
  const chkTodo = id => {
    const cur = latestData.current || data;
    const t = (cur.todos || []).find(x => String(x.id) === String(id));
    if (!t) return;
    // Push undo BEFORE the destructive move so a mis-tap can be
    // reversed (chkTodo previously skipped this — felt like the to-do
    // had silently disappeared).
    pushUndo(`Completed task: ${t.text.slice(0, 30)}`, JSON.parse(JSON.stringify(cur)));
    save({
      ...cur,
      todos: (cur.todos || []).filter(x => String(x.id) !== String(id)),
      archive: [...(cur.archive || []), {
        ...t,
        done: true,
        archivedAt: new Date().toISOString()
      }]
    });
  };
  const delTodo = id => {
    const cur = latestData.current || data;
    const t = (cur.todos || []).find(x => String(x.id) === String(id));
    if (!t) return;
    pushUndo(`Deleted task: ${t.text.slice(0, 30)}`, JSON.parse(JSON.stringify(cur)));
    save({
      ...cur,
      todos: (cur.todos || []).filter(x => String(x.id) !== String(id)),
      archive: [...(cur.archive || []), {
        ...t,
        archivedAt: new Date().toISOString()
      }]
    });
  };
  // §8.1: Archive a todo (non-destructive — flips an `archived` flag on the
  // todo in-place so it can be restored later). Distinct from delTodo (which
  // moves the item to data.archive as a tombstone) and chkTodo (completion).
  const archiveTodo = id => {
    const cur = latestData.current || data;
    const t = (cur.todos || []).find(x => String(x.id) === String(id));
    if (!t) return;
    pushUndo(`Archived task: ${(t.text || "").slice(0, 30)}`, JSON.parse(JSON.stringify(cur)));
    save({
      ...cur,
      todos: (cur.todos || []).map(x =>
        String(x.id) === String(id)
          ? { ...x, archived: true, archivedAt: Date.now() }
          : x
      )
    });
    touchFeature("todo.archive");
  };
  const restoreTodo = id => {
    const cur = latestData.current || data;
    save({
      ...cur,
      todos: (cur.todos || []).map(x =>
        String(x.id) === String(id)
          ? { ...x, archived: false, archivedAt: null }
          : x
      )
    });
  };
  const reordTodos = l => {
    const cur = latestData.current || data;
    save({ ...cur, todos: l });
  };
  const dueStatus = d => {
    if (!d) return null;
    const td = new Date();
    td.setHours(0, 0, 0, 0);
    const du = new Date(d + "T00:00:00");
    const df = Math.round((du - td) / 86400000);
    if (df < 0) return {
      label: "Overdue",
      color: "#dc2626",
      bg: "#fef2f2"
    };
    if (df === 0) return {
      label: "Due today",
      color: "#d97706",
      bg: "#fffbeb"
    };
    if (df === 1) return {
      label: "Due tomorrow",
      color: "#d97706",
      bg: "#fffbeb"
    };
    if (df <= 7) return {
      label: `Due in ${df}d`,
      color: "#0891b2",
      bg: "#f0f9ff"
    };
    return {
      label: new Date(d + "T00:00:00").toLocaleDateString("en-US", {
        month: "short",
        day: "numeric"
      }),
      color: "#6b7280",
      bg: "var(--c-surface-raised)"
    };
  };

  /* GOALS */
  const addGoal = () => {
    if (!nGoal.trim()) return;
    // Require an Area of Life. Without a bucket, the goal used to fall
    // into a null-type "General" pile that wasn't in HT, so the card
    // rendered with broken theme colors and the filter chips couldn't
    // target it. Rather than add a real "General" bucket, we force the
    // user to pick — that's the prompt the UI keeps making anyway.
    if (!nGType) {
      setGoalAreaErr(true);
      return;
    }
    // Require at least one underlying habit. A goal with no driving
    // habit is just a wish; the user has explicitly opted into pairing
    // each new goal with a concrete first habit. If the user clears
    // it, we abort and the gated Save button (already disabled) catches
    // the rest. Both records are created in a single save() call so
    // they land in localStorage + Firestore atomically and the habit's
    // goalId never points at a missing goal.
    if (!nGFirstHabit.trim()) return;
    const goalId = Date.now();
    const habitId = goalId + 1;
    const todayISO = dk(new Date());
    // Pull the habit's metadata from the new-habit form state that
    // Step 4 populated. Defaults match the standalone Add Habit form
    // so a user who tabbed past every dropdown still gets a valid
    // shape. The Area of Life is forced to nGType regardless of
    // nHType so it can't drift from the goal's area.
    const habitFreq = {
      ...(nHFreq || {}),
      type: (nHFreq && nHFreq.type) || "daily",
      days: Array.isArray(nHFreq && nHFreq.days) ? nHFreq.days.slice() : [],
      day: typeof (nHFreq && nHFreq.day) === "number" ? nHFreq.day : null,
      monthDay: typeof (nHFreq && nHFreq.monthDay) === "number" ? nHFreq.monthDay : 1,
      month: typeof (nHFreq && nHFreq.month) === "number" ? nHFreq.month : 0
    };
    save({
      ...data,
      goals: [...data.goals, {
        id: goalId,
        text: nGoal.trim(),
        type: nGType,
        smart: {
          ...nGSmart
        }
      }],
      habits: [...(data.habits || []), {
        id: habitId,
        text: nGFirstHabit.trim(),
        // Inherit area from the goal so habit + goal share a category.
        type: nGType,
        section: nHSec || "morning",
        duration: nHDur || "",
        importance: nHImp || "Important",
        notes: (nHNotes && nHNotes.trim()) || null,
        frequency: habitFreq,
        location: "both",
        startDate: nHStart || todayISO,
        goalIds: [goalId],
        goalId: goalId,
        completions: {},
        completionTimes: {},
        completionUnits: {},
        // Target fields land here only when the user flipped the
        // Yes/No vs Target & Unit toggle to Target & Unit on
        // Step 4. Yes/No mode writes nulls so the habit reads as
        // a plain Yes/No card.
        target:    nHHasTarget ? (() => { const n = parseFloat(nHTarget); return isFinite(n) && n >= 0 ? Math.round(n * 100) / 100 : null; })() : null,
        targetOp:  nHHasTarget ? (nHTargetOp === "<=" ? "<=" : ">=") : ">=",
        unitLabel: nHHasTarget ? ((nHUnitLabel || "").trim() || null) : null,
        increment: nHHasTarget ? (() => { const n = parseFloat(nHIncrement); return isFinite(n) && n > 0 ? Math.round(n * 100) / 100 : null; })() : null
      }]
    });
    touchFeature("goal.create");
    touchFeature("habit.create");
    sNGoal("");
    sNGType("");
    sNGSmart({
      specific: "",
      measurable: "",
      measurableUnit: "",
      achievable: "",
      relevant: "",
      timebound: ""
    });
    sNGFirstHabit("");
    // Reset the shared new-habit form state so a later standalone
    // Add Habit attempt starts fresh.
    sNHabit("");
    sNHType("");
    sNHSec("morning");
    sNHDur("");
    sNHImp("Important");
    sNHFreq({ type: "daily", days: [], day: 1, monthDay: 1, month: new Date().getMonth() });
    sNHStart(dk(new Date()));
    sNHNotes("");
    sNHHasTarget(false);
    sNHTarget("");
    sNHTargetOp(">=");
    sNHUnitLabel("");
    sNHIncrement("");
    setGoalAreaErr(false);
    setGoalFormStep(0);
    setExpGForm(false);
  };
  const sEGoal = g => {
    sEGId(g.id);
    sEGTxt(g.text);
    sEGType(g.type || "");
    sEGSmart({
      ...{
        specific: "",
        measurable: "",
        measurableUnit: "",
        achievable: "",
        relevant: "",
        timebound: ""
      },
      ...(g.smart || {})
    });
  };
  const svEGoal = id => {
    if (!eGTxt.trim()) return;
    // Same rule as addGoal — a saved goal must have an Area of Life.
    // If the user clears it, we block the save and surface the error.
    if (!eGType) {
      setGoalAreaErr(true);
      return;
    }
    const prev = data.goals.find(g => g.id === id);
    if (!prev) return;
    const nextText = eGTxt.trim();
    const nextType = eGType;
    const nextSmart = { ...eGSmart };
    // Snapshot the OLD state if anything tracked actually changed.
    // `history` is the trail of prior versions; the live goal is the tip.
    const smartSame = JSON.stringify(prev.smart || {}) === JSON.stringify(nextSmart);
    const changed = prev.text !== nextText
      || (prev.type || null) !== nextType
      || !smartSame;
    const snapshot = changed ? {
      ts: Date.now(),
      text: prev.text,
      type: prev.type || null,
      smart: prev.smart || {},
      icon: prev.icon || null
    } : null;
    save({
      ...data,
      goals: data.goals.map(g => g.id === id ? {
        ...g,
        text: nextText,
        type: nextType,
        smart: nextSmart,
        history: snapshot ? [...(g.history || []), snapshot] : (g.history || [])
      } : g)
    });
    setGoalAreaErr(false);
    sEGId(null);
  };
  const delGoal = id => {
    const g = data.goals.find(x => x.id === id);
    if (!g) return;
    setConfirmDel({
      kind: "goal",
      id,
      name: g.text
    });
  };
  const doDelGoal = id => {
    const g = data.goals.find(x => x.id === id);
    if (!g) return;
    pushUndo(`Deleted goal: ${g.text.slice(0, 30)}`, JSON.parse(JSON.stringify(data)));
    save({
      ...data,
      goals: data.goals.filter(x => x.id !== id),
      // Unlink any habits that pointed at this goal so they don't
      // dangle with a goalId that no longer resolves. Habits with
      // multiple goalIds keep their other links — only the deleted
      // goal is removed. Single-goal habits keep their `goalId`
      // field set to null (legacy shape) for back-compat.
      habits: (data.habits || []).map(h => {
        const ids = habitGoalIds(h).filter(gid => String(gid) !== String(id));
        if (ids.length === habitGoalIds(h).length) return h; // unchanged
        return { ...h, goalIds: ids, goalId: ids[0] != null ? ids[0] : null };
      }),
      // Same for any todos that had this goalId on them.
      todos: (data.todos || []).map(t =>
        String(t.goalId) === String(id) ? { ...t, goalId: null } : t
      )
    });
  };
  const reordGoals = l => save({
    ...data,
    goals: l
  });
  const completeGoal = (goalId, nextTxt, nextType) => {
    const cur = latestData.current || data;
    const g = (cur.goals || []).find(x => String(x.id) === String(goalId));
    if (!g) return;
    const newArchive = [...(cur.goalArchive || []), {
      ...g,
      archivedAt: new Date().toISOString(),
      completedDate: selDate

        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: maxTokens,
          system: systemPrompt,
          messages: [{ role: "user", content: userPrompt }]
        })
      });
      if (!r.ok) {
        try { console.warn("[verrocchio:ai-debrief] HTTP", r.status, r.statusText); } catch (_) {}
        return null;
      }
      const j = await r.json();
      const text = j && j.content && j.content[0] && j.content[0].text;
      return text ? text.trim() : null;
    } catch (e) {
      try { console.warn("[verrocchio:ai-debrief] failed:", e && e.message); } catch (_) {}
      return null;
    }
  };

  /* AI Daily Briefing gate predicate — pure logic lives in
     lib/domains/brief.js (briefDomain.allYesterdayHabitsReviewed).
     App-scope wrapper just supplies `data.habits` and injects the
     App-scope `isFutureHabit` predicate. */
  const allYesterdayHabitsReviewed = () =>
    window.briefDomain.allYesterdayHabitsReviewed(data.habits, { isFutureHabit });

  const genBrief = async () => {
    // New users (< 7 days of completion data) get the welcome briefing —
    // no API call. Saves quota and avoids shallow AI output.
    if (completionDayCount() < 7) {
      const txt = welcomeBriefing();
      setBriefTxt(txt);
      updateRitual({ briefing: txt });
      return;
    }
    // Gate: skip generation if yesterday is incomplete. Today's briefing
    // depends on a clean yesterday — unreviewed habits produce shallow
    // summaries. The placeholder in the briefing card explains the gate
    // and links to the Review Yesterday widget.
    if (!allYesterdayHabitsReviewed()) {
      setBriefing(false);
      return;
    }
    setBriefing(true);
    setBriefTxt("");
    const habits = data.habits || [];
    // §6 Future Habits — exclude parked from AI briefing inputs.
    const dH = habits.filter(h => h.section !== "avoid" && !h.parked);
    const td = tk();
    const pend = data.todos.filter(t => !t.done);
    const q = todayQ();
    const l30 = pastDays(30);
    // Actual window length — users with <30 days of history would
    // otherwise see deflated completion percentages (dividing by 30
    // when only 14 days of data exist makes a 100% user look like 47%).
    // Cap the denominator at the number of days we've actually
    // observed so percentages reflect real behavior.
    const dataDays = Math.max(1, Math.min(l30.length, completionDayCount()));
    const tc = HT.map(t => {
      const g = dH.filter(h => h.type === t.value);
      if (!g.length) return null;
      return {
        type: t.value,
        pct: Math.round(g.reduce((s, h) => s + l30.filter(d => h.completions?.[d]).length, 0) / (g.length * dataDays) * 100)
      };
    }).filter(Boolean);
    // Correlations from the last 60 days of completion-time data — the
    // LLM sees them alongside goals/habits so it can weave them into
    // the narrative instead of listing them mechanically.
    const corrHints = memoedCorrelations.slice(0, 3).map(r => {
      const hrLabel = r.aCutoffHour === 12 ? "by noon" : r.aCutoffHour === 18 ? "by 6pm" : "by midnight";
      const pct = Math.round((r.lift) * 100);
      return `When "${r.aText}" is done ${hrLabel}, "${r.bText}" is ${pct}pp more likely to happen (${Math.round(r.conditional*100)}% vs ${Math.round(r.base*100)}% base)`;
    });
    // AI tone → prompt-shaping preamble. "Neutral" is the default.
    // "Encouraging" is the warm coach voice. "Tough love" gives direct
    // feedback without being cruel. Unknown values resolve to neutral
    // so a future tone can land before this switch knows about it.
    const toneLine =
      (data.aiTone === "tough-love")
        ? "You are a direct, no-nonsense coach who holds the user accountable without being cruel. Call out slipping habits plainly and expect better. Skip the pep talk."
        : (data.aiTone === "encouraging")
          ? "You are a warm personal coach. Lead with positive framing and celebrate progress."
          : "You are a neutral analyst. Summarize the user's day factually without cheerleading or criticism. Plain language, no emotional framing.";
    // W3-T12: consent gate. See genIns above — same v1.0 inert / v1.1 live semantics.
    if (AI_ENABLED && (!data.aiConsentAt || data.aiConsentAt === 0)) {
      setShowAiConsent(true);
      return;
    }
    const prompt = `${toneLine} Generate a brief, data-driven morning briefing. Do NOT include any quotations, author attributions, or motivational aphorisms — that content lives elsewhere in the app.\n\nGOALS: ${data.goals.map(g => `[${g.type || "General"}] ${g.text}`).join(" | ") || "None"}\nTASKS: ${pend.map(t => t.text).join(", ") || "All clear!"}\nHABITS (${dH.filter(h => isDone(h, td)).length}/${dH.length} done): ${dH.map(h => `${isDone(h, td) ? "✓" : "○"} ${h.text}`).join(", ") || "none"}\nFOCUSED areas (${dataDays}d): ${tc.filter(t => t.pct >= 70).map(t => t.type).join(", ") || "none"}\nNEGLECTED areas (${dataDays}d): ${tc.filter(t => t.pct < 40).map(t => t.type).join(", ") || "none"}${corrHints.length ? `\nPATTERNS DETECTED: ${corrHints.join(" | ")}` : ""}\n\n3 short paragraphs: 1) greeting referencing today's tasks/goals, 2) life-balance insight — weave in any PATTERNS DETECTED naturally if present, 3) brief closing. Match the tone above exactly. No quotes.`;
    if (!AI_BACKEND_URL) {
      // No backend proxy configured — render the data-driven coaching
      // note from briefDomain.deterministicBriefing (pinned by
      // tests/domains/brief.test.mjs). The pre-AI vars above (dH,
      // dataDays, l30, tc, memoedCorrelations, pend) all feed both
      // the AI prompt path AND the deterministic path.
      const txt = window.briefDomain.deterministicBriefing({
        data,
        today: td,
        pastDays30: l30,
        dataDays,
        habitTypeAreas: HT,
        correlations: memoedCorrelations,
        isDone
      });
      setBriefTxt(txt);
      updateRitual({ briefing: txt });
      setBriefing(false);
      return;
    }
    try {
      const idToken = auth.currentUser ? await auth.currentUser.getIdToken() : null;
      if (!idToken) throw new Error("not_signed_in");
      const r = await fetch(AI_BACKEND_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${idToken}`
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: prompt
          }]
        })
      });
      const j = await r.json();
      const txt = j.content?.[0]?.text || "Could not generate.";
      setBriefTxt(txt);
      // Persist today's briefing so we don't regenerate across reloads.
      updateRitual({ briefing: txt });
    } catch {
      setBriefTxt("Error generating brief. Check connection.");
    }
    setBriefing(false);
  };

  /* Auto-hydrate briefTxt from the persisted daily ritual + auto-generate
     on the first Home-tab view of the day. Per R-1 (HOMEPAGE_REDESIGN.md),
     the cached daily briefing must NOT trigger an AI call (and must NOT
     pop the consent modal) on a passive tab visit — the user has to have
     explicitly consented first. If consent hasn't been given, we still
     hydrate any previously cached text from `dailyRitual`, but skip the
     generation step. `genBrief`'s pre-7-days welcome branch is also safe
     to invoke without consent (no network call), so it runs unconditionally
     for fresh users via the existing internal guard. */
  useEffect(() => {
    if (tab !== "brief") return;
    // Skip during onboarding or when the user has no habits/goals yet.
    if (!data.onboardingComplete) return;
    const r = (data.dailyRitual && data.dailyRitual[tk()]) || {};
    if (r.briefing && !briefTxt) {
      setBriefTxt(r.briefing);
      return;
    }
    if (!r.briefing && !briefTxt && !briefing) {
      const hasContent = (data.habits && data.habits.length > 0) || (data.goals && data.goals.length > 0);
      if (!hasContent) return;
      // For users past the 7-day welcome threshold, only auto-fire when
      // AI consent has been given. Without this guard, opening the Brief
      // tab would pop the consent modal as a side-effect of navigation,
      // which the design doc explicitly rules out (Surface A is passive).
      const needsAi = completionDayCount() >= 7;
      if (needsAi && AI_ENABLED && !data.aiConsentAt) return;
      // Yesterday-completeness gate: don't auto-generate when yesterday's
      // habits aren't fully reviewed (done or missed for each due habit).
      // The card itself shows a placeholder + link to the Review Yesterday
      // widget. The pre-7-days welcome branch bypasses this (no real AI
      // call, deterministic message), so we only gate the live path.
      if (needsAi && !allYesterdayHabitsReviewed()) return;
      genBrief();
    }
  }, [tab, data.dailyRitual, data.onboardingComplete, data.aiConsentAt, data.habits]);

  /* §14.4 — AI-personalized tip rewrite for the Brief tab.
     Pulls the top observed signal (off-schedule habit, then habit
     correlation) and asks the AI proxy to rephrase it as a single
     coach-style tip in the user's chosen tone (Warm / Neutral /
     Tough love). Cached per day per signal key in dailyRitual so
     we don't burn tokens on every Brief-tab render. The deterministic
     smartTips list is unchanged — the AI tip is prepended as an extra
     first item when available, never overwrites a template. */
  const aiTipFiredRef = useRef(new Set());
  useEffect(() => {
    if (tab !== "brief") return;
    if (!AI_ENABLED) return;
    if (!data.aiConsentAt) return;
    if (completionDayCount() < 7) return;
    const todayKey = tk();
    const rit = (data.dailyRitual && data.dailyRitual[todayKey]) || {};
    // Pick the top signal mirroring smartTips priority.
    const offTop = (memoedOffSchedule && memoedOffSchedule[0]) || null;
    const corrTop = (memoedCorrelations && memoedCorrelations[0]) || null;
    // Encode tone in the signal key so a tone change invalidates the
    // cached body (otherwise an old-tone body persists silently after
    // the user switches voices). Drop the late/logged counters from
    // the key — they tick mid-day with every completion and force
    // wasteful re-fires for what is effectively the same signal.
    const tone = data.aiTone || "neutral";
    let signalKey = "";
    let promptUser = "";
    if (offTop) {
      signalKey = tone + ":off:" + offTop.habitId + ":" + offTop.section;
      const suggestSec = offTop.section === "morning" ? "afternoon" : offTop.section === "afternoon" ? "evening" : "morning";
      promptUser = `Signal: the habit "${offTop.habitText}" was logged AFTER the ${offTop.section} cutoff in ${offTop.lateCount} of the last ${offTop.loggedCount} sessions. Suggest moving it to ${suggestSec} or accepting the new time. Keep specifics (habit name, counts, sections) exact.`;
    } else if (corrTop) {
      const hrLabel = corrTop.aCutoffHour === 12 ? "by noon" : corrTop.aCutoffHour === 18 ? "by 6pm" : "before bed";
      signalKey = tone + ":corr:" + corrTop.aHabitId + "+" + corrTop.bHabitId;
      promptUser = `Signal: when the user does "${corrTop.aText}" ${hrLabel}, "${corrTop.bText}" follows ${Math.round(corrTop.conditional * 100)}% of the time (vs ${Math.round(corrTop.base * 100)}% otherwise) over a 14-day window. Frame it as a useful pattern they can exploit. Keep specifics exact.`;
    }
    if (!signalKey) return;
    if (rit.aiTipKey === signalKey && rit.aiTipBody) return;
    // Dedupe in-session fires so a re-render doesn't trigger a second
    // call before the first one's result lands and writes the cache.
    const fireKey = todayKey + ":" + signalKey;
    if (aiTipFiredRef.current.has(fireKey)) return;
    aiTipFiredRef.current.add(fireKey);
    (async () => {
      const toneInstr = tone === "encouraging"
        ? "Warm and encouraging. Lead with positive framing."
        : tone === "tough-love"
          ? "Direct and honest, no cheerleading or softening."
          : "Neutral and factual, no cheerleading or scolding.";
      const sys = `You are an analytical coach for the Verrocchio habit-tracking app. Convert one observed behavioral signal into a single concise tip the user sees on their home page. Tone: ${toneInstr} Max 2 sentences. Keep every specific (habit names, percentages, counts, sections) exactly as given. Do not add facts you weren't told. Do not moralize. Do not predict the future.`;
      const body = await callAiForDebrief(sys, promptUser, 110);
      if (body) {
        updateRitual({ aiTipKey: signalKey, aiTipBody: body });
      }
    })();
    // Intentionally do NOT include `data.dailyRitual` here. dailyRitual
    // is mutated on every unrelated ritual write (briefingReviewed,
    // yesterdayReviewed, evening debrief steps, tip acknowledgements)
    // and re-firing the effect on each of those caused observable
    // jank in the Brief tab's interactive flow. The cache lookup
    // reads dailyRitual via fresh closure each run, so a new signal
    // still flushes the cache through memoedOffSchedule /
    // memoedCorrelations changing. The aiTipFiredRef guards
    // in-session double-fires; cross-device echo is gated by the
    // existing _updatedAt detection in the realtime listener.
  }, [tab, data.aiConsentAt, data.aiTone, memoedOffSchedule, memoedCorrelations]);

  /* Splash loading -> quote transition for the welcome screen.
     Kept here (before any conditional returns) to respect React's
     rules of hooks. Only runs once the welcome screen is actually
     about to render (auth resolved + user signed in or demo). */
  useEffect(() => {
    if (hasSeenWelcome) {
      // Reset for next session so a future visit sees the pyramid again.
      if (splashPhase !== "loading") setSplashPhase("loading");
      return;
    }
    const willShowWelcome = authUser !== undefined && (authUser !== null || demoMode);
    if (!willShowWelcome) return;
    if (splashPhase !== "loading") return;
    // Splash runtime: pyramid blocks + their paired wordmark letters
    // animate in pairs from t=0.10s to t=2.12s (each block's delay +
    // its 1s pop-duration), then the tagline lands at 3.8s and the
    // completed lockup holds until SPLASH_HOLD elapses. The pyramid
    // sequence was slowed 2× from its original 1.06s end; the tagline
    // and SPLASH_HOLD keep their original timing so the post-pyramid
    // lockup pause stays the same length.
    //
    // Session gating: the full 5.8s splash plays on the first cold
    // launch of a tab (or fresh PWA open). Subsequent same-session
    // reopens use a 700ms snap so reloads stay snappy without losing
    // the magic for first impression. sessionStorage clears on tab
    // close, so the next true cold launch sees the full sequence.
    let splashSeen = false;
    try { splashSeen = sessionStorage.getItem("vc_splash_seen") === "1"; } catch (_) { /* private mode etc. */ }
    const SPLASH_HOLD = splashSeen ? 700 : 5800;
    const t = setTimeout(() => {
      try { sessionStorage.setItem("vc_splash_seen", "1"); } catch (_) {}
      setHasSeenWelcome(true);
    }, SPLASH_HOLD);
    return () => clearTimeout(t);
  }, [hasSeenWelcome, splashPhase, authUser, demoMode, splashAnimKey]);

  /* DERIVED */
  const habits = data.habits || [];
  const journal = data.journal || [];
  const quotes = data.quotes || [];
  // §8.1: archived todos are hidden from the main render. They're surfaced
  // via the "View archive" toggle below the active list, and can be restored.
  const pending = (data.todos || []).filter(t => !t.done && !t.archived);
  // §6 Future Habits — a habit is "future" if either (a) the user
  // manually parked it (h.parked === true) OR (b) its startDate is
  // strictly after today (calendar-based future). Both states feed
  // the Future Habits drawer and are excluded from active lists,
  // tips, daily briefing inputs, and home widgets. Date comparison
  // works because dk()-format keys ("YYYY-MM-DD") are lexicographically
  // ordered. Defined early so all downstream derived state can use it.
  const _todayKForFuture = tk();
  // Pure predicate lives in habitsDomain. App-scope wrapper keeps the
  // single-arg signature ~25 call sites already use; _todayKForFuture
  // (above) pins "today" for the lifetime of this App() render.
  const isFutureHabit = h => window.habitsDomain.isFutureHabit(h, _todayKForFuture);
  // §5.8b — Slot helpers (MAX_SLOTS / slotIdForIndex / parseSlotId /
  // slotSectionCounts / slotRowsFor) live in lib/slots.js, loaded as a
  // classic script earlier in the page so their consts are script-scope
  // globals available to every App-scope reference here.
  // A goal is "future" if no currently-active (non-future) habit is
  // linked to it. Mirrors the existing Future Goals drawer rule but
  // routes through isFutureHabit so a goal whose only linked habits
  // are date-future is also future.
  const isFutureGoal = g => !(data.habits || []).some(h => habitLinkedToGoal(h, g.id) && !isFutureHabit(h));
  // §6 — future habits are inert and excluded from every daily-stat
  // aggregator that reads `dH` (Habits-tab header count, 30-day
  // sparkline heatmap, etc.).
  const dH = habits.filter(h => h.section !== "avoid" && !isFutureHabit(h));
  const doneHCt = dH.filter(h => isDone(h, selDate)).length;
  const isToday = selDate === tk();
  const travelDays = data.travelDays || [];
  const travelEntryFor = d => travelDays.find(t => t && t.date === d) || null;
  const routineMode = travelEntryFor(selDate) ? "travel" : "home";

  // Commit a drag-selected date range as a single trip. If the range is one
  // day and that day is already a travel day, the existing trip for that
  // day is removed (i.e. single-tap toggles off). Otherwise all new dates
  // in the range are added with a shared tripId + one shared location.
  const commitTripRange = (startDate, endDate) => {
    const lo = startDate <= endDate ? startDate : endDate;
    const hi = startDate <= endDate ? endDate : startDate;
    // Single-day toggle-off shortcut
    if (lo === hi) {
      const existing = (data.travelDays || []).find(t => t.date === lo);
      if (existing) {
        // Remove every day that shares this trip so cancelling one day of a
        // multi-day trip cancels the whole trip.
        const next = (data.travelDays || []).filter(t => t.tripId !== existing.tripId);
        save({ ...data, travelDays: next });
        return;
      }
    }
    // Build full list of dates in range
    const dates = [];
    const d = new Date(lo + "T12:00:00");
    const endD = new Date(hi + "T12:00:00");
    while (d <= endD) {
      dates.push(dk(d));
      d.setDate(d.getDate() + 1);
    }
    const existingDates = new Set((data.travelDays || []).map(t => t.date));
    const newDates = dates.filter(x => !existingDates.has(x));
    if (newDates.length === 0) return;
    const first = newDates[0], last = newDates[newDates.length - 1];
    const promptMsg = newDates.length === 1
      ? "Where will you be on " + first + "?"
      : "Where will you be (" + first + " \u2192 " + last + ")?";
    const loc = window.prompt(promptMsg, data.homeLocation || "");
    if (loc === null) return;
    const tripId = "t" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 6);
    const next = [
      ...(data.travelDays || []),
      ...newDates.map(x => ({ date: x, location: loc.trim(), tripId }))
    ].sort((a, b) => a.date.localeCompare(b.date));
    save({ ...data, travelDays: next });
  };

  // Global pointer listeners: once a drag has started on a calendar day,
  // track pointermove across the whole document so the user can sweep
  // their finger (or mouse) across multiple day buttons. On pointerup the
  // range is committed.
  useEffect(() => {
    if (!tripDrag) return;
    const handleMove = e => {
      const pt = e.touches && e.touches[0] ? e.touches[0] : e;
      const el = document.elementFromPoint(pt.clientX, pt.clientY);
      if (!el) return;
      const dayEl = el.closest && el.closest("[data-travel-day]");
      if (!dayEl) return;
      const val = dayEl.getAttribute("data-travel-day");
      if (val) {
        setTripDrag(prev => prev && prev.end !== val ? { ...prev, end: val } : prev);
      }
    };
    const handleUp = () => {
      setTripDrag(prev => {
        if (prev) {
          // Use setTimeout so the state update flushes before prompt()
          // blocks the UI thread (otherwise the pending re-render shows
          // the drag highlight frozen under the modal).
          setTimeout(() => commitTripRange(prev.start, prev.end), 0);
        }
        return null;
      });
    };
    document.addEventListener("pointermove", handleMove, { passive: true });
    document.addEventListener("touchmove", handleMove, { passive: true });
    document.addEventListener("pointerup", handleUp);
    document.addEventListener("pointercancel", handleUp);
    document.addEventListener("touchend", handleUp);
    return () => {
      document.removeEventListener("pointermove", handleMove);
      document.removeEventListener("touchmove", handleMove);
      document.removeEventListener("pointerup", handleUp);
      document.removeEventListener("pointercancel", handleUp);
      document.removeEventListener("touchend", handleUp);
    };
  }, [tripDrag, data.travelDays, data.homeLocation]);

  // Collapse the header sub-row (calendar icon + At Home/Traveling pill +
  // XP/Level bar) once the user scrolls past a small threshold, so the
  // top-most Verrocchio title strip stays pinned without hogging space.
  useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY || document.documentElement.scrollTop || 0;
      setHeaderCollapsed(prev => {
        const next = y > 24;
        return prev === next ? prev : next;
      });
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const matchesRoutine = h => { const loc = h.location || "both"; return loc === "both" || loc === routineMode; };
  const filtH = habits.filter(h => {
    // §6 Future Habits — both parked AND startDate>today habits are
    // inert. They sit in the Future Habits drawer (rendered below
    // active sections) and don't appear in any section, filter pill,
    // or count chip.
    if (isFutureHabit(h)) return false;
    if (impFilter.length > 0 && !impFilter.includes(h.importance)) return false;
    // Goal (Area-of-Life) filter — habit's `type` must match one of the
    // currently selected area values (Physical, Mental, etc.).
    if (habGoalFilter.length > 0 && !habGoalFilter.includes(h.type)) return false;
    // Frequency filter — normalized via getFreq() so legacy habits with
    // no frequency field still match "daily".
    if (habFreqFilter.length > 0) {
      const ft = getFreq(h).type;
      if (!habFreqFilter.includes(ft)) return false;
    }
    // Two-thumb duration range: keep habits whose duration falls inside
    // [durRange[0], durRange[1]]. Habits without a duration are treated
    // as 0 minutes, so they're only excluded when the user has raised
    // the low thumb above 0.
    {
      const [dMin, dMax] = durRange;
      const any = dMin === DUR_MIN && dMax === DUR_MAX;
      if (!any) {
        const d = parseInt(h.duration) || 0;
        if (d < dMin || d > dMax) return false;
      }
    }
    if (!matchesRoutine(h)) return false;
    // "Today's Habits" / "Not Today" / "All" filter. selDate drives
    // it so the user can also scroll to a past day and see only the
    // habits that were due that day. Avoid-section habits are
    // exempted because "due today" doesn't really apply to a habit
    // you're supposed to NOT do — they should always show up.
    if (h.section !== "avoid" && dueFilter !== "all") {
      const due = isHabitDueOn(h, selDate);
      if (dueFilter === "today" && !due) return false;
      if (dueFilter === "other" && due) return false;
    }
    return true;
  });
  // §13.3 — Block entry to reorder mode while ANY filter pill is
  // active. Reordering a partial set risks misordering the hidden
  // habits behind the filter (the new _order is computed only over
  // the visible peers in the section). Future enhancement: surface a
  // toast on long-press explaining the gate; for now we silently
  // no-op the long-press so the user's existing tap/swipe handlers
  // are undisturbed.
  const reorderEntryBlockedByFilter = (
    impFilter.length > 0 ||
    habGoalFilter.length > 0 ||
    habFreqFilter.length > 0 ||
    secFilter.length > 0 ||
    dueFilter !== "all" && dueFilter !== "today" ||
    (durRange[0] !== DUR_MIN || durRange[1] !== DUR_MAX)
  );
  // NB: dueFilter defaults to "today" — that's effectively the user's
  // working set, NOT a deliberate filter to block reorder on. We keep
  // reorder entry allowed in the default "today" view; only the
  // explicit "other" or "all" filters (and the explicit filter pills)
  // gate entry. The expression above leaves "today" and "all" as
  // non-blocking ("all" is "show everything", also non-restrictive).
  const dateOpts = Array.from({
    length: 14
  }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const val = dk(d);
    const label = i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString("en-US", {
      weekday: "short",
      month: "short",
      day: "numeric"
    });
    return {
      val,
      label
    };
  });
  const fj = filtJ();

  /* STYLE CONSTANTS */
  const EI = {
    background: "var(--c-surface-raised)",

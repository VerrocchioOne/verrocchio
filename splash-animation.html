<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verrocchio — Splash Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#faf8f3;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    overflow:hidden;
  }

  /* ─── Stage (sized to fit a ~375px mobile viewport) ─────────────────
     Overall stage is 360×340. All inner positions use stage coordinates.
     Coordinate key:
       • Pyramid wrapper at top:80, width:200, height:112, centered.
       • Blocks (28px tall) stack with 2px gaps: bottom 0/28/56/84.
       • Pyramid bottom edge at stage-y 192.
  */
  .stage{
    position:relative;
    flex:0 0 auto;
    width:360px;
    height:340px;
  }

  /* ─── Pyramid ─────────────────────────────────────────────────────── */
  .pyramid{
    position:absolute;
    top:80px;
    left:50%;
    width:200px;
    height:112px;
    transform:translateX(-50%);
  }
  .block{
    position:absolute;
    left:50%;
    height:26px;
    background:linear-gradient(135deg,#2d5a2d 0%,#3d7a3d 100%);
    border-radius:4px;
    box-shadow:
      0 6px 14px rgba(45,90,45,.22),
      inset 0 1px 0 rgba(255,255,255,.18);
    transform:translateX(-600px);
    opacity:0;
    animation:slideIn .72s cubic-bezier(.22,1,.36,1) forwards;
    will-change:transform,opacity,filter;
  }
  .b1{bottom:0;  width:200px;animation-delay:.05s}
  .b2{bottom:28px;width:150px;animation-delay:.20s}
  .b3{bottom:56px;width:100px;animation-delay:.35s}
  .b4{bottom:84px;width:50px; animation-delay:.50s}

  @keyframes slideIn{
    0%  {transform:translate(-600px,0);opacity:0;filter:blur(3px)}
    55% {opacity:1;                    filter:blur(.5px)}
    100%{transform:translate(-50%,0);  opacity:1;filter:blur(0)}
  }

  /* ─── Stick-figure climber ────────────────────────────────────────
     Starts at ground level to the left of the pyramid; hops up each
     step (top of b1 → b2 → b3 → b4) and switches to a victory pose
     at the summit.

     Start: left:60, top:168 → feet land at stage-y 192 (ground).
     Keyframes target the left-ish portion of each block top, except
     the summit which is centered on b4.

     Block tops in stage-y:  b1=166, b2=138, b3=110, b4=82
     Target (x, y) per step in stage coords  (x = climber CENTER):
       b1:   (100, 166)   (climber.left = 91,  top = 142)
       b2:   (125, 138)   (climber.left = 116, top = 114)
       b3:   (150, 110)   (climber.left = 141, top = 86)
       b4:   (180, 82)    (climber.left = 171, top = 58)
     Deltas from start (left:60, top:168):
       b1: dx=+31, dy=-26
       b2: dx=+56, dy=-54
       b3: dx=+81, dy=-82
       b4: dx=+111, dy=-110
  */
  .climber{
    position:absolute;
    left:60px;
    top:168px;
    width:18px;
    height:24px;
    overflow:visible;
    stroke:#2d5a2d;
    fill:#2d5a2d;
    stroke-width:1.3;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:0;
    animation:climb 1.4s cubic-bezier(.35,.05,.4,1) 1.1s forwards;
    will-change:transform,opacity;
    z-index:3;
    pointer-events:none;
  }
  @keyframes climb{
    0%   {opacity:0;transform:translate(0,0)}
    5%   {opacity:1;transform:translate(0,0)}
    /* Little "hops" — peak slightly above each step before landing. */
    15%  {transform:translate(16px,-32px)}
    20%  {transform:translate(31px,-26px)}
    35%  {transform:translate(44px,-60px)}
    40%  {transform:translate(56px,-54px)}
    53%  {transform:translate(69px,-88px)}
    58%  {transform:translate(81px,-82px)}
    73%  {transform:translate(96px,-116px)}
    78%  {transform:translate(111px,-110px)}
    100% {opacity:1;transform:translate(111px,-110px)}
  }

  /* Two poses share the SVG. Running pose visible during climb;
     victory pose crossfades in at the summit (~78% of climb → 2.2s). */
  .climber .pose{opacity:0}
  .climber .pose.run{opacity:1;animation:runOff .18s 2.3s forwards}
  .climber .pose.victory{animation:victoryOn .22s 2.3s forwards}
  @keyframes runOff    {to{opacity:0}}
  @keyframes victoryOn {to{opacity:1}}

  /* ─── "V" imposed over the bottom 3 blocks ──────────────────────── */
  .v-mark{
    position:absolute;
    top:112px;
    left:50%;
    transform:translate(-50%,-4px);
    width:100px;
    height:78px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-weight:900;
    font-size:88px;
    line-height:1;
    color:#f4efe4;
    text-shadow:0 2px 10px rgba(0,0,0,.28);
    opacity:0;
    /* Delayed until the climber has reached the summit + settled. */
    animation:vFade .7s cubic-bezier(.22,1,.36,1) 2.6s forwards;
    will-change:transform,opacity,filter;
    pointer-events:none;
  }
  @keyframes vFade{
    0%  {opacity:0;transform:translate(-50%,4px);filter:blur(3px)}
    60% {opacity:1;                            filter:blur(.4px)}
    100%{opacity:1;transform:translate(-50%,-4px);filter:blur(0)}
  }

  /* ─── "Achieve Anything" wordmark (italic, green, under pyramid) ──
     Italic Playfair Display 900 at 22px. The phrase is sized to fit
     within the bottom block's 200px width. Positioned just below the
     pyramid (pyramid bottom at stage-y 192; wordmark top at 198 =
     6px gap).

     Final layout: the A sits at the wordmark's leading position; its
     center is at (stage-center − 82px). The tagline is anchored so
     its first glyph sits tight against the A's right edge.
  */
  .a-mark{
    position:absolute;
    top:198px;
    left:50%;
    width:14px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-style:italic;
    font-weight:900;
    font-size:22px;
    line-height:1;
    color:#2d5a2d;
    opacity:0;
    transform:translate(-50%,6px) scale(.82);
    animation:aMove 2.4s cubic-bezier(.65,0,.35,1) 3.4s forwards;
    will-change:transform,opacity,filter;
  }
  @keyframes aMove{
    0%  {opacity:0;transform:translate(-50%,6px) scale(.82);filter:blur(2px)}
    18% {opacity:1;transform:translate(-50%,0)   scale(1);  filter:blur(0)}
    40% {opacity:1;transform:translate(-50%,0)   scale(1);  filter:blur(0)}
    55% {                                                    filter:blur(.5px)}
    70% {opacity:1;transform:translate(calc(-50% - 82px),0) scale(1);filter:blur(0)}
    100%{opacity:1;transform:translate(calc(-50% - 82px),0) scale(1);filter:blur(0)}
  }

  .tagline{
    position:absolute;
    top:198px;
    left:calc(50% - 75px);
    height:28px;
    display:flex;
    align-items:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-style:italic;
    font-size:22px;
    font-weight:900;
    color:#2d5a2d;
    letter-spacing:0;
    white-space:nowrap;
    pointer-events:none;
  }
  .tagline .char{
    display:inline-block;
    opacity:0;
    transform:translate(6px,0);
    filter:blur(2px);
    animation:charIn .5s cubic-bezier(.22,1,.36,1) forwards;
    will-change:transform,opacity,filter;
  }
  .tagline .char.space{width:.26em}
  @keyframes charIn{
    0%  {opacity:0;transform:translate(6px,0);filter:blur(2px)}
    100%{opacity:1;transform:translate(0,0);  filter:blur(0)}
  }

  /* ─── Replay control ─────────────────────────────────────────────── */
  .replay{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:8px 14px;
    font:500 12px system-ui,-apple-system,sans-serif;
    color:#6b7280;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.04em;
    transition:all .15s ease;
  }
  .replay:hover{color:#1f2937;border-color:#d1d5db;box-shadow:0 2px 6px rgba(0,0,0,.04)}

  @media (prefers-reduced-motion: reduce){
    .block,.climber,.climber .pose,.v-mark,.a-mark,.tagline .char{
      animation-duration:.01s!important
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="pyramid">
      <div class="block b1"></div>
      <div class="block b2"></div>
      <div class="block b3"></div>
      <div class="block b4"></div>
    </div>

    <!-- Stick-figure climber -->
    <svg class="climber" viewBox="0 0 18 24" aria-hidden="true">
      <!-- Running pose: mid-stride with arms and legs swung -->
      <g class="pose run">
        <circle cx="9" cy="3.5" r="2.2" stroke="none"/>
        <line x1="9" y1="5.7" x2="8.5" y2="14.5"/>
        <line x1="9" y1="8.5" x2="14" y2="6.5"/>
        <line x1="9" y1="8.5" x2="4" y2="10.5"/>
        <line x1="8.5" y1="14.5" x2="4.5" y2="19"/>
        <line x1="4.5" y1="19" x2="6" y2="22.5"/>
        <line x1="8.5" y1="14.5" x2="12" y2="21.5"/>
      </g>
      <!-- Victory pose: standing tall, arms up in a V -->
      <g class="pose victory">
        <circle cx="9" cy="3.5" r="2.2" stroke="none"/>
        <line x1="9" y1="5.7" x2="9" y2="15"/>
        <line x1="9" y1="7.5" x2="4.5" y2="1"/>
        <line x1="9" y1="7.5" x2="13.5" y2="1"/>
        <line x1="9" y1="15" x2="6.5" y2="22.5"/>
        <line x1="9" y1="15" x2="11.5" y2="22.5"/>
      </g>
    </svg>

    <!-- V imposed on the bottom 3 blocks; never moves -->
    <div class="v-mark">V</div>

    <!-- A: pops up under V, slides to the wordmark's leading position -->
    <div class="a-mark">A</div>

    <!-- "chieve Anything" shuffles in to the right of the A -->
    <div class="tagline" id="tagline" aria-label="chieve Anything"></div>
  </div>

  <button class="replay" onclick="replay()">Replay</button>

<script>
  const TAGLINE_TEXT  = 'chieve Anything';
  /* A's slide completes at 70% of a 2.4s animation starting at 3.4s →
     3.4 + 1.68 = 5.08s. Begin the shuffle just before that (4.9s). */
  const TAGLINE_START = 4.9;   /* seconds */
  const CHAR_STAGGER  = 0.045; /* seconds between characters */

  function buildTagline(){
    const host = document.getElementById('tagline');
    host.innerHTML = '';
    [...TAGLINE_TEXT].forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'char' + (ch === ' ' ? ' space' : '');
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      span.style.animationDelay = (TAGLINE_START + i * CHAR_STAGGER) + 's';
      host.appendChild(span);
    });
  }

  function replay(){
    const s = document.getElementById('stage');
    const c = s.cloneNode(false);
    c.id = 'stage';
    s.replaceWith(c);
    c.innerHTML = `
      <div class="pyramid">
        <div class="block b1"></div>
        <div class="block b2"></div>
        <div class="block b3"></div>
        <div class="block b4"></div>
      </div>
      <svg class="climber" viewBox="0 0 18 24" aria-hidden="true">
        <g class="pose run">
          <circle cx="9" cy="3.5" r="2.2" stroke="none"/>
          <line x1="9" y1="5.7" x2="8.5" y2="14.5"/>
          <line x1="9" y1="8.5" x2="14" y2="6.5"/>
          <line x1="9" y1="8.5" x2="4" y2="10.5"/>
          <line x1="8.5" y1="14.5" x2="4.5" y2="19"/>
          <line x1="4.5" y1="19" x2="6" y2="22.5"/>
          <line x1="8.5" y1="14.5" x2="12" y2="21.5"/>
        </g>
        <g class="pose victory">
          <circle cx="9" cy="3.5" r="2.2" stroke="none"/>
          <line x1="9" y1="5.7" x2="9" y2="15"/>
          <line x1="9" y1="7.5" x2="4.5" y2="1"/>
          <line x1="9" y1="7.5" x2="13.5" y2="1"/>
          <line x1="9" y1="15" x2="6.5" y2="22.5"/>
          <line x1="9" y1="15" x2="11.5" y2="22.5"/>
        </g>
      </svg>
      <div class="v-mark">V</div>
      <div class="a-mark">A</div>
      <div class="tagline" id="tagline" aria-label="chieve Anything"></div>
    `;
    buildTagline();
  }

  buildTagline();
</script>
</body>
</html>

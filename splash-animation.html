<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verrocchio — Splash Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600;1,700;1,900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#faf8f3;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    overflow:hidden;
  }

  /* ─── Stage (sized to fit a ~375px mobile viewport) ─────────────────
     Overall stage is 360×340. All inner positions use stage coordinates.
     Coordinate key:
       • Pyramid wrapper at top:80, width:200, height:112, centered.
       • Blocks (28px tall) stack with 2px gaps: bottom 0/28/56/84.
       • Pyramid bottom edge at stage-y 192.
  */
  .stage{
    position:relative;
    flex:0 0 auto;
    width:360px;
    height:340px;
  }

  /* ─── Pyramid ─────────────────────────────────────────────────────── */
  .pyramid{
    position:absolute;
    top:80px;
    left:50%;
    width:200px;
    height:112px;
    transform:translateX(-50%);
  }
  /* Blocks stack bottom-to-top: the widest base block drops into place
     first; each subsequent block falls onto the one below it, like
     building a stack of pancakes. Each block enters from above and
     settles with a small overshoot bounce. */
  .block{
    position:absolute;
    left:50%;
    height:26px;
    background:linear-gradient(135deg,#2d5a2d 0%,#3d7a3d 100%);
    border-radius:4px;
    box-shadow:
      0 6px 14px rgba(45,90,45,.22),
      inset 0 1px 0 rgba(255,255,255,.18);
    transform:translate(-50%,-44px);
    opacity:0;
    animation:blockStack .62s cubic-bezier(.34,1.35,.64,1) forwards;
    will-change:transform,opacity,filter;
  }
  .b1{bottom:0;  width:200px;animation-delay:.05s}
  .b2{bottom:28px;width:150px;animation-delay:.22s}
  .b3{bottom:56px;width:100px;animation-delay:.39s}
  .b4{bottom:84px;width:50px; animation-delay:.56s}

  @keyframes blockStack{
    0%  {transform:translate(-50%,-44px);opacity:0;filter:blur(3px)}
    55% {                                opacity:1;filter:blur(.4px)}
    100%{transform:translate(-50%,0);    opacity:1;filter:blur(0)}
  }

  /* ─── Stick-figure climber ────────────────────────────────────────
     Starts at ground level to the left of the pyramid. He doesn't
     leap up each step — he pulls himself up with his arms:
       1. Stands on the current step (mount pose).
       2. Reaches up to grab the edge of the next step (reach pose).
       3. Pulls his body up and over onto the next step.
       4. Briefly rests before the next pull.
     At the summit he throws both arms up in a victory V.

     Start: left:48, top:156 → feet land at stage-y 192 (ground).
     Block tops in stage-y:  b1=166, b2=138, b3=110, b4=82
     Translate deltas from start per step (feet end up on block top):
       b1  dx=+38, dy=-26
       b2  dx=+63, dy=-54
       b3  dx=+88, dy=-82
       b4  dx=+118, dy=-110

     The climb path for each step is:
       rest → arms-up reach (still at rest x/y)
            → body rises mostly vertically (small sideways shift)
            → body swings over the edge (mostly sideways shift)
            → settles on the new step.
     The rise is more vertical than parabolic so it reads as "pulling
     up" rather than "jumping over."
  */
  .climber{
    position:absolute;
    left:48px;
    top:156px;
    width:28px;
    height:36px;
    overflow:visible;
    stroke:#2d5a2d;
    fill:#2d5a2d;
    stroke-width:1.5;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:0;
    /* Climb is 3.4s — slower than before so each pull reads as real
       effort. `climb` also handles entrance fade-in; `climberOff`
       fades him out after the victory beat so the brand wordmark can
       take his place above the pyramid. Climb starts at 1.25s, after
       the last block has settled into the pyramid. */
    animation:
      climb 3.4s cubic-bezier(.5,.05,.5,.95) 1.25s forwards,
      climberOff .4s ease-out 4.9s forwards;
    will-change:transform,opacity;
    z-index:3;
    pointer-events:none;
  }
  @keyframes climberOff{
    0%  {opacity:1}
    100%{opacity:0}
  }
  /* Four pulls up the pyramid, with a slip on Pull #2 so the climb
     reads as genuinely challenging:
       Pull 1 → clean
       Pull 2 → slips back partway, regroups, muscles up
       Pull 3 → slow, labored
       Pull 4 → summit
     Rests are longer than before — catching his breath between pulls. */
  @keyframes climb{
    0%   {opacity:0;transform:translate(0,0)}
    3%   {opacity:1;transform:translate(0,0)}

    /* Pull #1 → b1 ------------------------------------------------- */
    6%   {transform:translate(0,0)}              /* stand, plant feet */
    9%   {transform:translate(2px,-5px)}         /* reach for edge */
    13%  {transform:translate(8px,-20px)}        /* body pulling up */
    17%  {transform:translate(24px,-28px)}       /* swing over the edge */
    20%  {transform:translate(38px,-26px)}       /* land on b1 */
    25%  {transform:translate(38px,-26px)}       /* rest — catch breath */

    /* Pull #2 → b2 (with a slip + recovery) ----------------------- */
    28%  {transform:translate(40px,-32px)}       /* grasp edge */
    32%  {transform:translate(46px,-44px)}       /* start pulling up */
    35%  {transform:translate(44px,-38px)}       /* SLIP — grip gives */
    38%  {transform:translate(45px,-42px)}       /* dangling, regrouping */
    42%  {transform:translate(52px,-54px)}       /* stronger pull */
    45%  {transform:translate(63px,-54px)}       /* finally onto b2 */
    51%  {transform:translate(63px,-54px)}       /* long rest */

    /* Pull #3 → b3 ------------------------------------------------- */
    54%  {transform:translate(65px,-60px)}       /* grasp */
    59%  {transform:translate(71px,-72px)}       /* slow pull */
    64%  {transform:translate(80px,-82px)}       /* haul over */
    68%  {transform:translate(88px,-82px)}       /* land on b3 */
    74%  {transform:translate(88px,-82px)}       /* rest */

    /* Pull #4 → summit (b4) --------------------------------------- */
    77%  {transform:translate(90px,-88px)}
    83%  {transform:translate(96px,-104px)}
    89%  {transform:translate(108px,-112px)}
    93%  {transform:translate(118px,-110px)}
    100% {opacity:1;transform:translate(118px,-110px)}
  }

  /* Three poses share the SVG, cycled in lockstep with the climb.
     The mount pose (standing on a step) is visible during rests; the
     reach pose (arms up, body stretched) is visible during the pulls;
     the victory pose takes over once he's on top.

     All three opacity animations share the climb's 2.6s duration and
     1s delay so their keyframes line up with the position keyframes
     above.  */
  .climber .pose{opacity:0}
  .climber .pose.mount   {animation:mountCycle 3.4s linear 1.25s forwards}
  .climber .pose.reach   {animation:reachCycle 3.4s linear 1.25s forwards}
  .climber .pose.victory {animation:victoryCycle 3.4s linear 1.25s forwards}

  /* Rests:    0–5%, 20–25%, 45–51%, 68–74%
     Pulls:    6–20%, 26–45% (slip stays in reach pose), 52–68%, 75–93%
     Summit:   94%+ */
  @keyframes mountCycle{
    0%  {opacity:1}
    5%  {opacity:1}
    6%  {opacity:0}
    19% {opacity:0}
    21% {opacity:1}
    25% {opacity:1}
    26% {opacity:0}
    44% {opacity:0}
    46% {opacity:1}
    51% {opacity:1}
    52% {opacity:0}
    67% {opacity:0}
    69% {opacity:1}
    74% {opacity:1}
    75% {opacity:0}
    100%{opacity:0}
  }
  @keyframes reachCycle{
    0%  {opacity:0}
    5%  {opacity:0}
    6%  {opacity:1}
    19% {opacity:1}
    20% {opacity:0}
    25% {opacity:0}
    26% {opacity:1}
    44% {opacity:1}
    45% {opacity:0}
    51% {opacity:0}
    52% {opacity:1}
    67% {opacity:1}
    68% {opacity:0}
    74% {opacity:0}
    75% {opacity:1}
    93% {opacity:1}
    94% {opacity:0}
    100%{opacity:0}
  }
  @keyframes victoryCycle{
    0%  {opacity:0}
    92% {opacity:0}
    95% {opacity:1}
    100%{opacity:1}
  }

  /* ─── "Verrocchio" brand wordmark ─────────────────────────────────
     Takes the climber's place above the pyramid after he fades out.
     Non-italic (the brand name) to contrast with the italic tagline
     below. Sized to fit within the pyramid's base (200px).
  */
  .brand-wordmark{
    position:absolute;
    top:44px;
    left:50%;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-weight:700;
    font-style:normal;
    font-size:24px;
    line-height:1;
    color:#2d5a2d;
    letter-spacing:.005em;
    white-space:nowrap;
    opacity:0;
    transform:translate(-50%,6px);
    animation:brandIn .7s cubic-bezier(.22,1,.36,1) 5.1s forwards;
    will-change:transform,opacity,filter;
    pointer-events:none;
  }
  @keyframes brandIn{
    0%  {opacity:0;transform:translate(-50%,6px);filter:blur(3px)}
    60% {opacity:1;                               filter:blur(.4px)}
    100%{opacity:1;transform:translate(-50%,0);  filter:blur(0)}
  }

  /* ─── "V" imposed over the bottom 3 blocks ──────────────────────── */
  .v-mark{
    position:absolute;
    top:112px;
    left:50%;
    transform:translate(-50%,-4px);
    width:100px;
    height:78px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-weight:900;
    font-size:88px;
    line-height:1;
    color:#f4efe4;
    text-shadow:0 2px 10px rgba(0,0,0,.28);
    opacity:0;
    /* Delayed until Verrocchio has arrived above the pyramid. */
    animation:vFade .7s cubic-bezier(.22,1,.36,1) 5.95s forwards;
    will-change:transform,opacity,filter;
    pointer-events:none;
  }
  @keyframes vFade{
    0%  {opacity:0;transform:translate(-50%,4px);filter:blur(3px)}
    60% {opacity:1;                            filter:blur(.4px)}
    100%{opacity:1;transform:translate(-50%,-4px);filter:blur(0)}
  }

  /* ─── "Achieve Anything" wordmark (italic, green, under pyramid) ──
     Italic Playfair Display 900 at 22px. The phrase is sized to fit
     within the bottom block's 200px width. Positioned just below the
     pyramid (pyramid bottom at stage-y 192; wordmark top at 198 =
     6px gap).

     Final layout: the A sits at the wordmark's leading position; its
     center is at (stage-center − 82px). The tagline is anchored so
     its first glyph sits tight against the A's right edge.
  */
  .a-mark{
    position:absolute;
    top:198px;
    left:50%;
    width:14px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-style:italic;
    font-weight:700;
    font-size:22px;
    line-height:1;
    color:#2d5a2d;
    opacity:0;
    transform:translate(-50%,6px) scale(.82);
    animation:aMove 2.4s cubic-bezier(.65,0,.35,1) 6.75s forwards;
    will-change:transform,opacity,filter;
  }
  @keyframes aMove{
    0%  {opacity:0;transform:translate(-50%,6px) scale(.82);filter:blur(2px)}
    18% {opacity:1;transform:translate(-50%,0)   scale(1);  filter:blur(0)}
    40% {opacity:1;transform:translate(-50%,0)   scale(1);  filter:blur(0)}
    55% {                                                    filter:blur(.5px)}
    70% {opacity:1;transform:translate(calc(-50% - 82px),0) scale(1);filter:blur(0)}
    100%{opacity:1;transform:translate(calc(-50% - 82px),0) scale(1);filter:blur(0)}
  }

  .tagline{
    position:absolute;
    top:198px;
    left:calc(50% - 75px);
    height:28px;
    display:flex;
    align-items:center;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif;
    font-style:italic;
    font-size:22px;
    font-weight:700;
    color:#2d5a2d;
    letter-spacing:0;
    white-space:nowrap;
    pointer-events:none;
  }
  .tagline .char{
    display:inline-block;
    opacity:0;
    transform:translate(6px,0);
    filter:blur(2px);
    animation:charIn .5s cubic-bezier(.22,1,.36,1) forwards;
    will-change:transform,opacity,filter;
  }
  .tagline .char.space{width:.26em}
  @keyframes charIn{
    0%  {opacity:0;transform:translate(6px,0);filter:blur(2px)}
    100%{opacity:1;transform:translate(0,0);  filter:blur(0)}
  }

  /* ─── Replay control ─────────────────────────────────────────────── */
  .replay{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:8px 14px;
    font:500 12px system-ui,-apple-system,sans-serif;
    color:#6b7280;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.04em;
    transition:all .15s ease;
  }
  .replay:hover{color:#1f2937;border-color:#d1d5db;box-shadow:0 2px 6px rgba(0,0,0,.04)}

  @media (prefers-reduced-motion: reduce){
    .block,.climber,.climber .pose,.v-mark,.a-mark,.tagline .char{
      animation-duration:.01s!important
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="pyramid">
      <div class="block b1"></div>
      <div class="block b2"></div>
      <div class="block b3"></div>
      <div class="block b4"></div>
    </div>

    <!-- Stick-figure climber (28×36 viewBox) -->
    <svg class="climber" viewBox="0 0 28 36" aria-hidden="true">
      <!-- Mount pose: standing on a step, arms at sides. Shown during
           the brief rests between pulls and right after landing. -->
      <g class="pose mount">
        <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
        <line x1="14" y1="8.9" x2="14" y2="22"/>
        <line x1="14" y1="12" x2="9.5" y2="20"/>
        <line x1="14" y1="12" x2="18.5" y2="20"/>
        <line x1="14" y1="22" x2="11" y2="34"/>
        <line x1="14" y1="22" x2="17" y2="34"/>
      </g>
      <!-- Reach/pull pose: one arm reaching up high to grab the next
           step's edge, the other arm bent pulling, legs bent/scrambling
           to push off. Reads as "pulling himself up." -->
      <g class="pose reach">
        <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
        <line x1="14" y1="8.9" x2="13" y2="21.5"/>
        <!-- right arm reaching up high -->
        <line x1="14" y1="11.5" x2="19" y2="3"/>
        <line x1="19" y1="3" x2="22" y2="-2"/>
        <!-- left arm bent, pulling back -->
        <line x1="14" y1="11.5" x2="8.5" y2="14"/>
        <line x1="8.5" y1="14" x2="11" y2="19"/>
        <!-- bent/scrambling legs -->
        <line x1="13" y1="21.5" x2="8.5" y2="26"/>
        <line x1="8.5" y1="26" x2="11" y2="33"/>
        <line x1="13" y1="21.5" x2="17" y2="28"/>
        <line x1="17" y1="28" x2="19" y2="34"/>
      </g>
      <!-- Victory pose: standing tall, arms raised in a V. -->
      <g class="pose victory">
        <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
        <line x1="14" y1="8.9" x2="14" y2="22.5"/>
        <line x1="14" y1="12" x2="6" y2="1"/>
        <line x1="14" y1="12" x2="22" y2="1"/>
        <line x1="14" y1="22.5" x2="10" y2="34"/>
        <line x1="14" y1="22.5" x2="18" y2="34"/>
      </g>
    </svg>

    <!-- Brand wordmark that takes the climber's place above the pyramid -->
    <div class="brand-wordmark">Verrocchio</div>

    <!-- V imposed on the bottom 3 blocks; never moves -->
    <div class="v-mark">V</div>

    <!-- A: pops up under V, slides to the wordmark's leading position -->
    <div class="a-mark">A</div>

    <!-- "chieve Anything" shuffles in to the right of the A -->
    <div class="tagline" id="tagline" aria-label="chieve Anything"></div>
  </div>

  <button class="replay" onclick="replay()">Replay</button>

<script>
  const TAGLINE_TEXT  = 'chieve Anything';
  /* A's slide completes at 70% of a 2.4s animation starting at 6.75s →
     6.75 + 1.68 = 8.43s. Begin the shuffle just before that (8.25s) so
     the tagline arrives while the A is settling. */
  const TAGLINE_START = 8.25;  /* seconds */
  const CHAR_STAGGER  = 0.045; /* seconds between characters */

  function buildTagline(){
    const host = document.getElementById('tagline');
    host.innerHTML = '';
    [...TAGLINE_TEXT].forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'char' + (ch === ' ' ? ' space' : '');
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      span.style.animationDelay = (TAGLINE_START + i * CHAR_STAGGER) + 's';
      host.appendChild(span);
    });
  }

  function replay(){
    const s = document.getElementById('stage');
    const c = s.cloneNode(false);
    c.id = 'stage';
    s.replaceWith(c);
    c.innerHTML = `
      <div class="pyramid">
        <div class="block b1"></div>
        <div class="block b2"></div>
        <div class="block b3"></div>
        <div class="block b4"></div>
      </div>
      <svg class="climber" viewBox="0 0 28 36" aria-hidden="true">
        <g class="pose mount">
          <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
          <line x1="14" y1="8.9" x2="14" y2="22"/>
          <line x1="14" y1="12" x2="9.5" y2="20"/>
          <line x1="14" y1="12" x2="18.5" y2="20"/>
          <line x1="14" y1="22" x2="11" y2="34"/>
          <line x1="14" y1="22" x2="17" y2="34"/>
        </g>
        <g class="pose reach">
          <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
          <line x1="14" y1="8.9" x2="13" y2="21.5"/>
          <line x1="14" y1="11.5" x2="19" y2="3"/>
          <line x1="19" y1="3" x2="22" y2="-2"/>
          <line x1="14" y1="11.5" x2="8.5" y2="14"/>
          <line x1="8.5" y1="14" x2="11" y2="19"/>
          <line x1="13" y1="21.5" x2="8.5" y2="26"/>
          <line x1="8.5" y1="26" x2="11" y2="33"/>
          <line x1="13" y1="21.5" x2="17" y2="28"/>
          <line x1="17" y1="28" x2="19" y2="34"/>
        </g>
        <g class="pose victory">
          <circle cx="14" cy="5.5" r="3.4" stroke="none"/>
          <line x1="14" y1="8.9" x2="14" y2="22.5"/>
          <line x1="14" y1="12" x2="6" y2="1"/>
          <line x1="14" y1="12" x2="22" y2="1"/>
          <line x1="14" y1="22.5" x2="10" y2="34"/>
          <line x1="14" y1="22.5" x2="18" y2="34"/>
        </g>
      </svg>
      <div class="brand-wordmark">Verrocchio</div>
      <div class="v-mark">V</div>
      <div class="a-mark">A</div>
      <div class="tagline" id="tagline" aria-label="chieve Anything"></div>
    `;
    buildTagline();
  }

  buildTagline();
</script>
</body>
</html>

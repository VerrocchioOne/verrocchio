const tk = () => new Date().toISOString().split("T")[0];
const fmtDur = v => {
  if (!v) return null;
  const n = parseInt(v);
  if (isNaN(n)) return null;
  if (n < 60) return `${n}m`;
  if (n % 60 === 0) return `${n / 60}h`;
  return `${Math.floor(n / 60)}h ${n % 60}m`;
};
const fmtT = iso => new Date(iso).toLocaleTimeString("en-US", {
  hour: "numeric",
  minute: "2-digit"
});
const fmtD = iso => new Date(iso).toLocaleDateString("en-US", {
  weekday: "short",
  month: "short",
  day: "numeric"
});
function pastDays(n) {
  return Array.from({
    length: n
  }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - i);
    return d.toISOString().split("T")[0];
  });
}
function getStreak(h) {
  let s = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    if (h.completions?.[d.toISOString().split("T")[0]]) s++;else break;
  }
  return s;
}
function getCR(h) {
  return {
    pct: Math.round(pastDays(30).filter(d => h.completions?.[d]).length / 30 * 100)
  };
}
function getLast14(h) {
  return Array.from({
    length: 14
  }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (13 - i));
    const k = d.toISOString().split("T")[0];
    return {
      k,
      done: !!h.completions?.[k]
    };
  });
}
const _dr = {
  from: null,
  over: null
};
function dp(idx, items, reorder) {
  return {
    draggable: true,
    onDragStart: e => {
      _dr.from = idx;
      e.dataTransfer.effectAllowed = "move";
    },
    onDragEnter: () => {
      _dr.over = idx;
    },
    onDragOver: e => {
      e.preventDefault();
    },
    onDrop: e => {
      e.preventDefault();
      if (_dr.from === null || _dr.over === null || _dr.from === _dr.over) {
        _dr.from = null;
        _dr.over = null;
        return;
      }
      const n = [...items];
      const [m] = n.splice(_dr.from, 1);
      n.splice(_dr.over, 0, m);
      reorder(n);
      _dr.from = null;
      _dr.over = null;
    },
    onDragEnd: () => {
      _dr.from = null;
      _dr.over = null;
    }
  };
}

/* ── RADAR CHART COMPONENT ── */
function RadarChart(_ref) {
  let {
    habits,
    selDate
  } = _ref;
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const cats = HT.map(t => t.value);
    const scores = cats.map(cat => {
      const catH = habits.filter(h => h.type === cat && h.section !== "avoid");
      const avoidH = habits.filter(h => h.type === cat && h.section === "avoid");
      if (catH.length === 0 && avoidH.length === 0) return 0;
      const done = catH.filter(h => !!h.completions?.[selDate]).length;
      const avoided = avoidH.filter(h => !!h.completions?.[selDate]).length;
      const total = catH.length + avoidH.length;
      return total > 0 ? Math.round((done + avoided) / total * 100) : 0;
    });
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: "radar",
      data: {
        labels: cats,
        datasets: [{
          label: "Today",
          data: scores,
          backgroundColor: "rgba(124,58,237,0.12)",
          borderColor: "#7c3aed",
          borderWidth: 2,
          pointBackgroundColor: HT.map(t => t.color),
          pointBorderColor: "#fff",
          pointBorderWidth: 1.5,
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 1.4,
        scales: {
          r: {
            min: 0,
            max: 100,
            ticks: {
              display: false,
              stepSize: 25
            },
            grid: {
              color: "rgba(0,0,0,0.06)"
            },
            angleLines: {
              color: "rgba(0,0,0,0.06)"
            },
            pointLabels: {
              color: "#6b7280",
              font: {
                family: "system-ui",
                size: 11,
                weight: "600"
              }
            }
          }
        },
        plugins: {
          legend: {
            display: false
          }
        }
      }
    });
    return () => {
      if (chartRef.current) {
        chartRef.current.destroy();
        chartRef.current = null;
      }
    };
  }, [habits, selDate]);
  return React.createElement("canvas", {
    ref: canvasRef,
    style: {
      maxWidth: "100%"
    }
  });
}

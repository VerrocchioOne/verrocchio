<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#2d5a2d;--accent-2:#3d7a3d;--app-bg:#f8f7f4;--app-text:#1f2937}

body{background:var(--app-bg);font-family:system-ui,-apple-system,sans-serif;color:var(--app-text);min-height:100%;min-height:-webkit-fill-available;overscroll-behavior:none}
/* Dark mode: flip base surfaces + invert card backgrounds. Cards stay
   legible because all card content uses gray-100/gray-700 text which we
   also remap. Hard-coded dark theme, not a full auto-inversion.
   The remapping uses inline-style-attribute substring selectors because
   nearly every component in the file uses React inline styles with hex
   literals — React normalizes those to rgb() in the DOM, so each
   override matches a specific rgb triple. If you add new surfaces in
   light mode, add a matching rule here. */
body.dark{--app-bg:#0b0d0f;--app-text:#e5e7eb}
/* ── neutral surface → dark card ── */
body.dark [style*="background: rgb(255, 255, 255)"]{background:#17191c!important}
body.dark [style*="background: rgb(249, 250, 251)"]{background:#1c1f23!important}
body.dark [style*="background: rgb(243, 244, 246)"]{background:#22262a!important}
body.dark [style*="background: rgb(248, 247, 244)"]{background:#0b0d0f!important}
/* ── green tints (brand) ── */
body.dark [style*="background: rgb(240, 247, 240)"]{background:#182418!important}
body.dark [style*="background: rgb(240, 253, 244)"]{background:#162216!important}
body.dark [style*="background: rgb(245, 250, 245)"]{background:#182418!important}
body.dark [style*="background: rgb(198, 223, 198)"]{background:#2a3d2a!important}
/* ── amber / warning tints ── */
body.dark [style*="background: rgb(255, 251, 235)"]{background:#2a220f!important}
body.dark [style*="background: rgb(255, 247, 237)"]{background:#2a1e0f!important}
body.dark [style*="background: rgb(254, 243, 199)"]{background:#332810!important}
body.dark [style*="background: rgb(254, 249, 195)"]{background:#332e0f!important}
/* ── red / danger tints ── */
body.dark [style*="background: rgb(254, 242, 242)"]{background:#2a1414!important}
body.dark [style*="background: rgb(254, 226, 226)"]{background:#3a1a1a!important}
/* Avoid-habit card tints: the default card bg (#fff5f5), the
   transient "missed" bg (#fff1f1), and the success/miss border
   colors (#86efac / #fca5a5). Without these the whole avoid list
   stays stubbornly pink in dark mode. */
body.dark [style*="background: rgb(255, 245, 245)"]{background:#241414!important}
body.dark [style*="background: rgb(255, 241, 241)"]{background:#2a1414!important}
body.dark [style*="solid rgb(254, 202, 202)"]{border-color:#4d1a1a!important}
body.dark [style*="solid rgb(252, 165, 165)"]{border-color:#5a2020!important}
body.dark [style*="solid rgb(134, 239, 172)"]{border-color:#2a3d2a!important}
/* ── cyan / travel tints ── */
body.dark [style*="background: rgb(240, 249, 255)"]{background:#0f2231!important}
body.dark [style*="background: rgb(236, 254, 255)"]{background:#0f2631!important}
body.dark [style*="background: rgb(207, 250, 254)"]{background:#123340!important}
body.dark [style*="background: rgb(186, 230, 253)"]{background:#153a4d!important}
/* ── blue tints ── */
body.dark [style*="background: rgb(239, 246, 255)"]{background:#0f1a31!important}
body.dark [style*="background: rgb(219, 234, 254)"]{background:#1a2540!important}
/* ── purple / violet tints ── */
body.dark [style*="background: rgb(245, 243, 255)"]{background:#1f1a31!important}
body.dark [style*="background: rgb(221, 214, 254)"]{background:#2d2540!important}
/* ── pink / rose tints ── */
body.dark [style*="background: rgb(253, 244, 255)"]{background:#2a1531!important}
body.dark [style*="background: rgb(240, 171, 252)"]{background:#3d2040!important}
/* ── teal tints ── */
body.dark [style*="background: rgb(240, 253, 250)"]{background:#0f2626!important}
/* ── light gradients → dark gradients (hand-mapped to the 2 specific
   gradients actually used by the XP/Level bar and the Insights card) ── */
body.dark [style*="linear-gradient(135deg, rgb(240, 253, 244), rgb(240, 247, 240))"]{background:linear-gradient(135deg,#162216,#182418)!important}
body.dark [style*="linear-gradient(135deg, rgb(240, 247, 240), rgb(245, 250, 245))"]{background:linear-gradient(135deg,#182418,#1a2a1a)!important}
body.dark [style*="linear-gradient(180deg, rgb(248, 247, 244) 0%, rgb(239, 236, 229) 100%)"]{background:linear-gradient(180deg,#0b0d0f 0%,#1a1c1f 100%)!important}
body.dark [style*="linear-gradient(90deg, rgb(254, 243, 199), rgb(253, 230, 138))"]{background:linear-gradient(90deg,#332810,#3d2f10)!important}
/* ── borders: flip near-white / light gray borders to dark-mode gray ── */
body.dark [style*="border: 1px solid rgb(243, 244, 246)"]{border-color:#2a2f34!important}
body.dark [style*="border: 1px solid rgb(229, 231, 235)"]{border-color:#2a2f34!important}
body.dark [style*="border: 1px solid rgb(198, 223, 198)"]{border-color:#2a3d2a!important}
body.dark [style*="border: 1px solid rgb(186, 230, 253)"]{border-color:#153a4d!important}
body.dark [style*="border: 1px solid rgb(253, 186, 116)"]{border-color:#4d2810!important}
body.dark [style*="border: 1px solid rgb(254, 202, 202)"]{border-color:#4d1a1a!important}
body.dark [style*="border: 1px solid rgb(253, 211, 77)"]{border-color:#4d3510!important}
body.dark [style*="border-bottom: 1px solid rgb(243, 244, 246)"]{border-bottom-color:#2a2f34!important}
body.dark [style*="border-top: 1px solid rgb(229, 231, 235)"]{border-top-color:#2a2f34!important}
body.dark [style*="border-bottom: 1px solid rgb(252, 211, 77)"]{border-bottom-color:#4d3510!important}
/* ── text colors: light-mode dark grays → dark-mode near-white ── */
body.dark [style*="color: rgb(31, 41, 55)"]{color:#e5e7eb!important}
body.dark [style*="color: rgb(17, 24, 39)"]{color:#f3f4f6!important}
body.dark [style*="color: rgb(55, 65, 81)"]{color:#d1d5db!important}
body.dark [style*="color: rgb(75, 85, 99)"]{color:#d1d5db!important}
body.dark [style*="color: rgb(107, 114, 128)"]{color:#9ca3af!important}
body.dark [style*="color: rgb(156, 163, 175)"]{color:#9ca3af!important}
body.dark [style*="color: rgb(209, 213, 219)"]{color:#6b7280!important}
/* ── accents on tinted cards: keep brand text readable on tinted dark bg ── */
body.dark [style*="color: rgb(45, 90, 45)"]:not([data-brand]){color:#9fdf9f!important}
body.dark [style*="color: rgb(8, 145, 178)"]{color:#7dd3fc!important}
body.dark [style*="color: rgb(120, 53, 15)"]{color:#fcd34d!important}
body.dark [style*="color: rgb(153, 27, 27)"]{color:#fca5a5!important}
body.dark [style*="color: rgb(21, 128, 61)"]{color:#86efac!important}
body.dark [style*="color: rgb(194, 65, 12)"]{color:#fdba74!important}
body.dark [style*="color: rgb(217, 119, 6)"]{color:#fbbf24!important}
/* ── dashed travel-day outlines: stay visible on dark calendar ── */
body.dark [style*="dashed rgb(103, 232, 249)"]{border-color:#67e8f9!important}
/* Custom accent: remap the default green button background / accent
   colors to the user's chosen --accent value. Uses inline-style
   attribute substring matching because most components hard-code
   "#2d5a2d" as inline style. Anything marked `data-brand="1"`
   stays on the canonical Verrocchio green — the demo badge, the
   "pick Verrocchio green" palette swatch, and the splash/brand
   artwork explicitly opt out of recoloring. */
body.accent-custom [style*="background: rgb(45, 90, 45)"]:not([data-brand]){background:var(--accent)!important}
body.accent-custom [style*="color: rgb(45, 90, 45)"]:not([data-brand]){color:var(--accent)!important}
body.accent-custom [style*="stroke: rgb(45, 90, 45)"]:not([data-brand]){stroke:var(--accent)!important}
body.accent-custom [style*="fill: rgb(45, 90, 45)"]:not([data-brand]){fill:var(--accent)!important}
/* Borders: match any width so `2px solid #2d5a2d` and `1.5px solid
   #2d5a2d` both remap, plus the shorthand `border-color`, plus each
   side-specific variant (borderTop/Bottom/Left/Right). */
body.accent-custom [style*="solid rgb(45, 90, 45)"]:not([data-brand]){border-color:var(--accent)!important}
body.accent-custom [style*="border-color: rgb(45, 90, 45)"]:not([data-brand]){border-color:var(--accent)!important}
body.accent-custom [style*="border-top-color: rgb(45, 90, 45)"]:not([data-brand]){border-top-color:var(--accent)!important}
body.accent-custom [style*="border-bottom-color: rgb(45, 90, 45)"]:not([data-brand]){border-bottom-color:var(--accent)!important}
/* SVG presentation attributes (the bottom-nav icons and some chart
   marks set `fill="#2d5a2d"` / `stroke="#2d5a2d"` rather than inline
   style). Attribute selectors catch both the hex and normalized forms. */
body.accent-custom svg [fill="#2d5a2d"]:not([data-brand]),
body.accent-custom [fill="#2d5a2d"]:not([data-brand]){fill:var(--accent)!important}
body.accent-custom svg [stroke="#2d5a2d"]:not([data-brand]),
body.accent-custom [stroke="#2d5a2d"]:not([data-brand]){stroke:var(--accent)!important}
/* Guided-tour highlight ring: gently pulse the brand-green glow around
   the spotlighted target so the eye lands on it even before reading the
   tooltip. Ring itself is drawn inline in renderTour(); this just
   animates the box-shadow radius/alpha. */
@keyframes tourPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(45,90,45,.25),0 8px 24px rgba(0,0,0,.3)}
  50%{box-shadow:0 0 0 8px rgba(45,90,45,.15),0 8px 28px rgba(0,0,0,.32)}
}
/* Gated-step + button emphasis. Applied to the real target button (the
   "New goal" / "New habit" [+]) while the tour is waiting for the user to
   tap it, so the button itself visibly wobbles — not just a ring around
   it. Slight scale + rotation so it reads as "look here, tap me" rather
   than a steady pulse the eye filters out. */
@keyframes tourTargetBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(1.18) rotate(-4deg)}
  40%{transform:scale(1.18) rotate(4deg)}
  60%{transform:scale(1.1) rotate(-2deg)}
  80%{transform:scale(1.05) rotate(0deg)}
}
.tour-target-bounce{animation:tourTargetBounce 1.4s ease-in-out infinite;transform-origin:center center}
@media (prefers-reduced-motion: reduce){
  .tour-target-bounce{animation:none}
}
/* Gated-step callout bob — arrow + bubble below the spotlighted button,
   pointing up at it. Separate from tourTargetBounce so the callout
   motion reads as an independent "look up here" nudge rather than being
   yoked to the button's jiggle. */
@keyframes tourCalloutBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.tour-callout{animation:tourCalloutBob 1.1s ease-in-out infinite}
@media (prefers-reduced-motion: reduce){
  .tour-callout{animation:none}
}
::placeholder{color:#9ca3af}
input,select,textarea{outline:none;font-family:inherit;-webkit-appearance:none;border-radius:0}
/* ── Duration filter slider (Habits tab "Max time" control) ──
   Native <input type="range"> renders a rectangular track by default.
   We override with a pill-shaped track on both WebKit and Firefox so
   the slider matches the rest of the pill-shaped filter chrome.
   The thumb is a 14px circle in the same cyan accent so drag affordance
   stays clear. accentColor on the element still tints the filled
   portion on WebKit (via ::-webkit-slider-runnable-track inheritance)
   and on Firefox (::-moz-range-progress). */
/* Dual-thumb duration range slider. Two <input type="range"> elements
   are absolutely stacked over a shared wrapper; their native tracks are
   hidden and a custom gray track + accent-colored fill is drawn between
   the two thumb positions. The inputs themselves get pointer-events:none
   on the track so neither one steals the wrong thumb — only the thumbs
   have pointer-events:auto. Thumbs use var(--accent) so they follow the
   user's selected accent color (Verrocchio green by default). */
.dur-slider-wrap{position:relative;height:18px;flex:1;min-width:80px}
.dur-slider-wrap .dur-track{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:6px;border-radius:9999px;background:#e5e7eb;pointer-events:none}
.dur-slider-wrap .dur-fill{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:9999px;background:var(--accent,#2d5a2d);pointer-events:none}
.dur-slider-wrap input[type=range].dur-slider{position:absolute;top:0;left:0;width:100%;height:18px;background:transparent;pointer-events:none;-webkit-appearance:none;appearance:none;margin:0;padding:0}
.dur-slider-wrap input[type=range].dur-slider:focus{outline:none}
.dur-slider-wrap input[type=range].dur-slider::-webkit-slider-runnable-track{height:6px;background:transparent;border:none}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-track{height:6px;background:transparent;border:none}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-progress{background:transparent}
.dur-slider-wrap input[type=range].dur-slider::-webkit-slider-thumb{pointer-events:auto;-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent,#2d5a2d);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);margin-top:-5px;cursor:pointer;position:relative;z-index:2}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;border-radius:50%;background:var(--accent,#2d5a2d);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer;position:relative;z-index:2}
body.dark .dur-slider-wrap .dur-track{background:#2a2f36}
body.dark .dur-slider-wrap input[type=range].dur-slider::-webkit-slider-thumb{border-color:#17191c}
body.dark .dur-slider-wrap input[type=range].dur-slider::-moz-range-thumb{border-color:#17191c}
/* Prevent iOS Safari from auto-zooming into inputs on focus (it fires
   when the input's computed font-size < 16px and the zoom persists
   AFTER blur — leaving the whole app stuck zoomed-in and forcing the
   user to pinch back out). Forcing 16px on touch devices avoids that
   without affecting desktop layouts that use smaller inputs. */
@media (hover:none) and (pointer:coarse){
  input,select,textarea{font-size:16px!important}
}
select{-webkit-appearance:none;appearance:none}
textarea{resize:vertical}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.fade-in{animation:fadeIn .2s ease forwards}
.pulsing{animation:pulse 1.5s ease infinite}
/* ── Verrocchio welcome splash ("Ink V") ──────────────────────────────
   Full-bleed brand animation on the welcome screen while
   splashPhase === "loading" (see setSplashPhase timer). Pyramid
   blocks stack bottom-to-top in quick springy succession; a Playfair
   Display "V" is then DRAWN into the pyramid's negative space via
   an SVG stroke-dashoffset reveal — left arm first, then the
   thinner right arm — so the glyph appears hand-inked. The Lora
   wordmark and italic tagline land last.
   Earlier "Climber" (v2) and "Quick build" (v3) variants lived here
   too; they were removed once the Ink V was chosen as the final
   animation. If you need to restore them, their commit is in git. */
.splashv4{position:fixed;inset:0;background:#faf8f3;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:9999}
.splashv4 .stage{position:relative;flex:0 0 auto;width:320px;height:280px}
.splashv4 .pyramid{position:absolute;top:66px;left:50%;width:200px;height:112px;transform:translateX(-50%)}
.splashv4 .block{position:absolute;left:50%;height:26px;background:linear-gradient(135deg,#2d5a2d 0%,#3d7a3d 100%);border-radius:4px;box-shadow:0 6px 14px rgba(45,90,45,.22),inset 0 1px 0 rgba(255,255,255,.18);transform:translate(-50%,-34px) scale(.92);opacity:0;animation:splashv4Stack .42s cubic-bezier(.2,.8,.2,1) forwards;will-change:transform,opacity}
.splashv4 .b1{bottom:0;width:200px;animation-delay:.05s}
.splashv4 .b2{bottom:28px;width:150px;animation-delay:.22s}
.splashv4 .b3{bottom:56px;width:100px;animation-delay:.39s}
.splashv4 .b4{bottom:84px;width:50px;animation-delay:.56s}
@keyframes splashv4Stack{0%{transform:translate(-50%,-34px) scale(.92);opacity:0}70%{opacity:1}100%{transform:translate(-50%,0) scale(1);opacity:1}}
/* Playfair serif V revealed by a two-stroke pen-draw.
   The V itself is an SVG <text> element in Playfair Display 900 — the
   exact same glyph as the in-app brand-mark. An SVG <mask> with two
   thick path strokes sits on top: as each mask path draws in via
   stroke-dashoffset, it reveals the Playfair V underneath along the
   stroke's direction.
     • mask-left  pen: travels top-left → apex (the thick arm)
     • mask-right pen: travels apex → top-right (the thin finishing line)
   Linear timing end-to-end so the pen velocity never spikes. */
.splashv4 .ink-v-wrap{position:absolute;top:98px;left:50%;transform:translateX(-50%);width:100px;height:78px;pointer-events:none;z-index:2}
.splashv4 .ink-v-svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 2px 8px rgba(0,0,0,.22));shape-rendering:geometricPrecision}
.splashv4 .ink-v-svg .v-glyph{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-weight:900;font-size:92px;fill:#f4efe4}
/* Smoothing notes:
   - pathLength 1000 (instead of 1) gives the browser 3 extra orders of
     magnitude of sub-pixel precision on the dashoffset animation, which
     removes the micro-stutter you get with pathLength 1.
   - will-change:stroke-dashoffset hoists each path to its own GPU layer.
   - Easing: cubic-bezier(.33,0,.1,1) — a gentle "pen start / pen settle"
     curve: quick acceleration from rest, a long smooth glide, and a soft
     deceleration at the stroke's end. Feels more like handwriting than
     pure linear (which reads as mechanical constant-velocity).
   - Right stroke starts at 2.45s — the exact moment the left stroke
     finishes — so there's zero visual pause at the apex handoff. */
.splashv4 .ink-v-svg .v-mask-left{fill:none;stroke:#fff;stroke-width:70;stroke-linecap:round;stroke-dasharray:1000;stroke-dashoffset:1000;will-change:stroke-dashoffset;animation:splashv4VLeftDraw 1.3s cubic-bezier(.33,0,.1,1) 1.15s forwards}
.splashv4 .ink-v-svg .v-mask-right{fill:none;stroke:#fff;stroke-width:70;stroke-linecap:round;stroke-dasharray:1000;stroke-dashoffset:1000;will-change:stroke-dashoffset;animation:splashv4VRightDraw .95s cubic-bezier(.33,0,.1,1) 2.45s forwards}
@keyframes splashv4VLeftDraw{to{stroke-dashoffset:0}}
@keyframes splashv4VRightDraw{to{stroke-dashoffset:0}}
.splashv4 .brand-wordmark{position:absolute;top:22px;left:50%;font-family:'Lora',Georgia,'Times New Roman',serif;font-weight:700;font-size:34px;line-height:1;color:#2d5a2d;letter-spacing:.12em;white-space:nowrap;opacity:0;transform:translate(-50%,8px);animation:splashv4BrandIn .7s cubic-bezier(.22,1,.36,1) 3.3s forwards;will-change:transform,opacity,letter-spacing}
@keyframes splashv4BrandIn{0%{opacity:0;transform:translate(-50%,8px);letter-spacing:.12em}60%{opacity:1}100%{opacity:1;transform:translate(-50%,0);letter-spacing:-.01em}}
/* Tagline mirrors the LOGIN PAGE tagline: system-ui sans-serif, italic,
   #6b7280 gray, 13px — same treatment as the "Achieve Anything" line
   under the Verrocchio wordmark on the login/signup screen so the two
   read as the same piece of typography across the launch flow. */
.splashv4 .tagline{position:absolute;top:184px;left:50%;transform:translateX(-50%);font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:400;font-style:italic;color:#6b7280;letter-spacing:normal;white-space:nowrap;opacity:0;animation:splashv4TagIn .6s ease-out 3.9s forwards;will-change:opacity,transform}
@keyframes splashv4TagIn{0%{opacity:0;transform:translate(-50%,6px)}100%{opacity:1;transform:translate(-50%,0)}}

/* Compact pyramid + V brand mark — static lockup used on the quote card. */

/* ── iOS 26 "Liquid Glass" surfaces ────────────────────────────────
   The header, bottom nav, onboarding cards, and tour tooltips all
   carry the `.lg` class. The element itself gets a translucent fill
   and heavy backdrop blur via inline styles (so variants can differ);
   this class layers on the characteristic specular sheen — a bright
   highlight at the top edge that fades to neutral, plus a very faint
   bottom-edge darkening — via a ::before pseudo-element. Pointer
   events pass through so the sheen never blocks a tap. */
.lg{position:relative;isolation:isolate}
.lg::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.12) 28%,rgba(255,255,255,0) 55%,rgba(0,0,0,.03) 100%);z-index:0}
.lg > *{position:relative;z-index:1}
/* Dark mode — flip the sheen so the top edge still reads as a
   highlight rather than a bright wash. */
body.dark .lg::before{background:linear-gradient(180deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 35%,rgba(255,255,255,0) 60%,rgba(0,0,0,.18) 100%)}

/* ── Guided-tour tooltip dark-mode overrides ───────────────────────
   The tour tooltip renders with a translucent white fill and dark
   grey text so it reads cleanly on the light dim overlay. In dark
   mode the attribute-selector rules above (which target exact
   `rgb(...)` strings) don't match `rgba(...)` values, so the tip
   would stay bright-white with dark text — hard to scan against the
   dim. These class-based overrides swap the surface to a dark
   translucent panel with light text, and also re-color the tour's
   "demo navigation cards" (the top-docked form-step header and the
   gated bubble callout) so their copy stays legible. */
.tour-tip{background:rgba(255,255,255,0.72);color:#1f2937;border:1px solid rgba(255,255,255,0.7)}

.tour-tip-body{color:#4b5563}

   button for ~900ms. Prevents accidental exits from stray taps while
   the tooltip sits inside a busy spotlight layout, and the label

   nav hint. The word "swipe" rocks side to side so users who've never
   seen a swipe-based navigator register the affordance. Gentle amp +
   slow period — this is a persistent hint, not a call-to-action. */
@keyframes lgSwipeRock{

  25%{transform:translateX(-5px)}

}
.swipe-hint{display:inline-flex;align-items:center;gap:4px}

   Paired with the fireConfetti() DOM helper. Each particle element
   sets --cf-x / --cf-y / --cf-rot inline; the keyframe applies them

  35%{opacity:.9}

@keyframes obLadderRung{

@keyframes obCompassNeedle{
  0%{transform:rotate(-45deg)}

  50%{transform:rotate(8deg)}
}

/* Habit frequency taxonomy. `rank` is used to order habits from "most
   often" to "least often" when a goal expands its linked habits (lower
   rank = higher frequency). `daily` is the pre-existing implicit default
   — any legacy habit without a `frequency` field is treated as daily at
   display time.

   Field shape per cadence:
     daily      — no extra fields
     weekdays   — `days: number[]`  (0..6 Sun..Sat; multi-select)
     weekly     — `day: number`     (0..6 Sun..Sat; single day of week)
     monthly    — `monthDay: 1..31` (day of month)
     quarterly  — `month: 0..11` + `monthDay: 1..31`
                  (anchor date; repeats every 3 months from the anchor)
     annual     — `month: 0..11` + `monthDay: 1..31`
                  (anchor date; repeats every year)

   Historical note: an earlier build had two weekly variants — `weekly`
   (no day) and `weekly-day` (with day). They've been merged into a
   single `weekly` that always carries a `day`. Legacy `weekly-day`
   habits are migrated on read by `getFreq()`. */
const FREQ = [
  { value: "daily",       label: "Daily",         icon: "\u{1F4C5}", rank: 1 },
  { value: "weekdays",    label: "Select Days",   icon: "\u{1F5D3}", rank: 2 },
  { value: "weekly",      label: "Weekly",        icon: "\u{1F5D3}", rank: 3 },
  { value: "monthly",     label: "Monthly",       icon: "\u{1F4C6}", rank: 5 },
  { value: "quarterly",   label: "Quarterly",     icon: "\u{1F4C6}", rank: 6 },
  { value: "annual",      label: "Annual",        icon: "\u{1F4C6}", rank: 7 }
];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_LONG  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
// Ordinal suffix for day-of-month display (1st, 2nd, 3rd, 4th, … 21st, …).
const ordSuffix = n => {
  const v = n % 100;
  if (v >= 11 && v <= 13) return n + "th";
  switch (n % 10) { case 1: return n + "st"; case 2: return n + "nd"; case 3: return n + "rd"; default: return n + "th"; }
};
// Indexed by JS `Date.getDay()` — 0 = Sun … 6 = Sat. Kept in Sunday-first
// order so day values stored in `frequency.days` / `frequency.day` keep
// their meaning across the whole codebase.
const DOW_ABBR = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
// Display order for the day-picker UI: Mon → Sun. The picker iterates
// this list when rendering chips so Monday appears first, while the
// stored day numbers still map to DOW_ABBR. Also used to sort the
// comma-joined display in freqLabel so "Mon · Wed · Sun" reads left-to
// -right in the same Monday-first order.
const DOW_ORDER = [1, 2, 3, 4, 5, 6, 0];
const dowDisplayRank = d => {
  const i = DOW_ORDER.indexOf(d);
  return i === -1 ? 99 : i;
};
/* Normalize any habit shape to a
   `{ type, days, day, monthDay, month }` frequency object.
   - Legacy habits without a `.frequency` field render as "Daily".
   - Legacy `weekly-day` cadence is collapsed into `weekly` (its `day`
     value is preserved, so an existing "every Tuesday" habit stays
     on Tuesday after the merge).
   - `monthDay` / `month` are new fields for monthly / quarterly /
     annual habits; they default to null when absent. */
const getFreq = h => {
  const f = h && h.frequency;
  if (!f || !f.type) return { type: "daily", days: [], day: null, monthDay: null, month: null };
  const rawType = f.type === "weekly-day" ? "weekly" : f.type;
  return {
    type: rawType,
    days: Array.isArray(f.days) ? f.days : [],
    day: typeof f.day === "number" ? f.day : null,
    monthDay: typeof f.monthDay === "number" ? f.monthDay : null,
    month:    typeof f.month    === "number" ? f.month    : null

};
const freqRank = h => {

};
const freqLabel = h => {

    return picks ? "Days: " + picks : "Select Days";
  }
  if (fq.type === "weekly") {

    // the old weekly / weekly-day split. Show "Weekly — Tue" so the
    // user can see the anchor at a glance.
    return "Weekly \u2014 " + (DOW_ABBR[fq.day == null ? 1 : fq.day] || "Mon");

    return fq.monthDay ? "Monthly \u2014 " + ordSuffix(fq.monthDay) : "Monthly";

  if (fq.type === "quarterly") {
    if (fq.month != null && fq.monthDay) {
      return "Quarterly \u2014 " + MONTHS_SHORT[fq.month] + " " + fq.monthDay;
    }
    return "Quarterly";
  }
  if (fq.type === "annual") {
    if (fq.month != null && fq.monthDay) {
      return "Annual \u2014 " + MONTHS_SHORT[fq.month] + " " + fq.monthDay;
    }
    return "Annual";
  }
  const row = FREQ.find(f => f.value === fq.type);
  return row ? row.label : "Daily";
};

  const [showAddPartner, setShowAddPartner] = useState(false);
  const [newPartnerName, setNewPartnerName] = useState("");
  const [newPartnerPhone, setNewPartnerPhone] = useState("");
  const [showAddGroup, setShowAddGroup] = useState(false);
  const [newGroupName, setNewGroupName] = useState("");
  const [newGroupEmoji, setNewGroupEmoji] = useState("🤝");
  const [socialPartners, setSocialPartners] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem("v-social-partners") || "[]");
    } catch {
      return [];
    }
  });
  const [socialGroups, setSocialGroups] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem("v-social-groups") || "[]");
    } catch {
      return [];
    }
  });
  const savePartners = p => {
    setSocialPartners(p);
    try {
      localStorage.setItem("v-social-partners", JSON.stringify(p));
    } catch {}
  };
  const saveGroups = g => {
    setSocialGroups(g);
    try {
      localStorage.setItem("v-social-groups", JSON.stringify(g));
    } catch {}
  };
  const SUGGESTED_GROUPS = [{
    id: "sg1",
    emoji: "🤜",
    name: "Frens"
  }, {
    id: "sg2",
    emoji: "📚",
    name: "Study Buds"
  }, {
    id: "sg3",
    emoji: "🏠",
    name: "Family"
  }];

  /* PROFILE */
  const [showProfile, setShowProfile] = useState(false);
  const [profileSection, setProfileSection] = useState("account"); // account | inspiration | history | reports | settings
  const [profileNavOpen, setProfileNavOpen] = useState(false);
  const [profileName, setProfileName] = useState(() => localStorage.getItem("v-profile-name") || "");
  const [profileGoal, setProfileGoal] = useState(() => localStorage.getItem("v-profile-goal") || "");

  /* GUIDED TOUR — Appcues-style first-login walkthrough. `tourStep` is
     0 when inactive, 1..TOUR_STEPS.length when showing that step. Auto-
     starts once the user has cleared the splash + onboarding; persists
     the "don't nag me again" decision in localStorage. Users can replay
     from App Settings at any time. */
  const [tourStep, setTourStep] = useState(0);
  const [tourDone, setTourDone] = useState(() => localStorage.getItem("v-tour-done") === "1");
  // Tour/demo control surfaces. `confirmExitDemo` drives a two-
  // phase modal: phase 1 asks the user to confirm leaving demo
  // mode; phase 2 shows them where the Replay Tour control lives
  // before actually running exitDemo(). The hint is shown in-
  // modal (not as a toast after exit) because exitDemo() kicks an
  // unauthenticated user straight to the login screen, where a
  // post-exit toast would feel orphaned and out of context.
  //
  // State values: null = modal closed, "confirm" = phase 1,
  // "hint" = phase 2 (replay location).
  const [confirmExitDemo, setConfirmExitDemo] = useState(null);
  // Forces a re-render when the viewport resizes (tooltip anchors use
  // getBoundingClientRect on each render, so they'd otherwise go stale).
  const [, setTourResizeTick] = useState(0);
  // Swipe-gesture tracking for the tour. Replaces explicit Back/Next
  // buttons: swipe right-to-left = advance, left-to-right = back.
  // Lives in a ref so re-renders mid-gesture don't reset the start point.
  const tourSwipeRef = useRef({ x: 0, y: 0, t: 0, active: false });
  // advance() / goBack() are defined inside renderTour (they close over
  // the current step/gate/form state), but the GLOBAL swipe listener
  // below needs to call them from a useEffect at component scope. We
  // keep them on refs so the effect can invoke the latest versions
  // without re-binding listeners on every render. renderTour updates
  // these refs each time it runs.
  const tourAdvanceRef = useRef(null);
  const tourGoBackRef = useRef(null);
  // Timers kept alive across the tour-step re-measure effect so the
  // cleanup can clear them on a rapid step change. Array of timeout IDs
  // (0..N) — see the "re-measure after tourStep change" effect below.
  const tourRemeasureTimers = useRef([]);
  // Same idea for the auto-scroll-target-into-view effect.
  const tourScrollTimers = useRef([]);

  /* CONFETTI on first goal + first habit.
     Refs seed to -1 so the first render (which may land with goals
     already loaded from Firestore / localStorage) is treated as "seed
     only" and doesn't fire a burst. A legitimate 0 → 1 transition in
     a subsequent render — the user adding their first-ever goal —
     does fire, once. `celebratedFirstGoal` / `celebratedFirstHabit`
     on the data doc guard against a second fire across sessions or
     if the user deletes and re-adds later. */
  const prevGoalsCountRef = useRef(-1);
  const prevHabitsCountRef = useRef(-1);

  /* APP SETTINGS
     - settingsMode: "default" vs "custom". In default, accent is the
       Verrocchio green and all category/importance/section edits are
       ignored. In custom, the user controls accent + can add custom
       categories / importance levels / time-of-day groupings.
     - darkMode is independent of settingsMode (works in both).
     - accentColor only takes effect when settingsMode === "custom".
     All three persist to localStorage so the choice survives reloads
     even before data syncs from Firestore. */
  const [settingsMode, setSettingsMode] = useState(() => localStorage.getItem("v-settings-mode") || "default");
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem("v-dark-mode") === "1");
  const [accentColor, setAccentColor] = useState(() => localStorage.getItem("v-accent-color") || "#2d5a2d");
  /* Staged-form state for the "Add Importance Level" and
     "Add Time-of-Day Group" mini-forms inside App Settings. */
  const [newImpName, setNewImpName] = useState("");
  const [newImpColor, setNewImpColor] = useState("#6366f1");
  const [newSecName, setNewSecName] = useState("");
  const [newSecIcon, setNewSecIcon] = useState("⭐");
  const [newSecColor, setNewSecColor] = useState("#6366f1");
  /* Tracks which default row is currently expanded to show its
     description. Keyed as `${list}:${value}` (e.g. "cat:Physical").
     Only one row per list stays expanded at a time. */
  const [expandedDefault, setExpandedDefault] = useState({});

  /* Achievements modal — opened by long-pressing the XP/Level bar
     in the header. Closes on backdrop tap or × button. */
  const [showAchievements, setShowAchievements] = useState(false);
  const levelHoldTimerRef = useRef(null);
  const levelPressStartRef = useRef(false);
  const beginLevelPress = () => {
    levelPressStartRef.current = true;
    if (levelHoldTimerRef.current) clearTimeout(levelHoldTimerRef.current);
    levelHoldTimerRef.current = setTimeout(() => {
      if (levelPressStartRef.current) {
        setShowAchievements(true);
        levelPressStartRef.current = false; // suppress the subsequent click
      }
    }, 450);
  };
  const cancelLevelPress = () => {
    if (levelHoldTimerRef.current) clearTimeout(levelHoldTimerRef.current);
    levelHoldTimerRef.current = null;
    levelPressStartRef.current = false;
  };

  // Apply dark mode + accent to <body> whenever the toggles change.
  // Pre-app screens (splash loading, login, onboarding) stay on the
  // canonical Verrocchio light theme so brand identity is stable on
  // every first-launch and every shared screenshot — dark mode and
  // custom accents only turn on once the user is actually inside
  // the app shell. localStorage is still written unconditionally so
  // the toggle state is preserved across the splash.
  //
  // Demo mode is also locked to the canonical light theme + green
  // accent: demo is a showroom, and it should always look like the
  // out-of-the-box Verrocchio regardless of the signed-in user's
  // personal customization.
  const inPreApp = !hasSeenWelcome
    || (authUser === null && !demoMode)
    || !(data && data.onboardingComplete);
  const themeLocked = inPreApp || demoMode;
  useEffect(() => {
    document.body.classList.toggle("dark", !!darkMode && !themeLocked);
    localStorage.setItem("v-dark-mode", darkMode ? "1" : "0");
  }, [darkMode, themeLocked]);
  useEffect(() => {
    const isCustom = settingsMode === "custom" && !themeLocked;
    document.body.classList.toggle("accent-custom", isCustom);
    document.documentElement.style.setProperty("--accent", isCustom ? accentColor : "#2d5a2d");
    localStorage.setItem("v-settings-mode", settingsMode);
    localStorage.setItem("v-accent-color", accentColor);
  }, [settingsMode, accentColor, themeLocked]);

  // Auto-start the guided tour once the user is past onboarding and
  // hasn't seen it before. demoMode deliberately runs the tour too:
  // the whole point of demo mode is to preview what a brand-new user
  // sees, and the tour IS part of that experience. Placed above all
  // the conditional early-returns for onboarding / auth screens so
  // React's hook order stays stable across renders.
  useEffect(() => {
    if (tourDone) return;
    if (inPreApp) return;
    if (tourStep !== 0) return;
    // Defer a beat so the nav + render tree have landed in the DOM
    // before the tour tries to anchor to nav-button selectors.
    const t = setTimeout(() => setTourStep(1), 400);
    return () => clearTimeout(t);
  }, [tourDone, inPreApp, tourStep]);

  // Tour ↔ goal-form sub-step bridge. The add-goal form now reveals
  // its fields one step at a time (name → area → SMART+save). When
  // the tour walks past a field, flip the form to the matching
  // sub-step so the selector it spotlights (goal-name / goal-area
  // / goal-smart / goal-save) is actually visible on screen. One-way
  // drive from tour → form; the form's Next button handles the
  // reverse direction inline.
  useEffect(() => {
    if (tourStep === 3) setGoalFormStep(0);
    else if (tourStep === 4) setGoalFormStep(1);
    else if (tourStep === 5 || tourStep === 6) setGoalFormStep(2);
  }, [tourStep]);

  /* Confetti — fire once the first time the user creates a goal or
     habit. Watches the length of each array and fires on the 0 → 1
     transition, guarded by a persisted flag on `data` so it never
     misfires twice (across sessions, across delete-all + re-add
     cycles, etc.). The -1 sentinel on the prev refs means the very
     first render — which may land with the arrays already populated
     from storage — is treated as seed-only and never fires. */
  useEffect(() => {
    const cur = (data && data.goals) ? data.goals.length : 0;
    const prev = prevGoalsCountRef.current;
    prevGoalsCountRef.current = cur;
    if (prev === -1) return; // seed on first render
    if (prev === 0 && cur >= 1 && !data.celebratedFirstGoal) {
      fireConfetti();
      save({ ...data, celebratedFirstGoal: true });
    }
  }, [data && data.goals && data.goals.length]);
  useEffect(() => {
    const cur = (data && data.habits) ? data.habits.length : 0;
    const prev = prevHabitsCountRef.current;
    prevHabitsCountRef.current = cur;
    if (prev === -1) return; // seed on first render
    if (prev === 0 && cur >= 1 && !data.celebratedFirstHabit) {
      fireConfetti();
      save({ ...data, celebratedFirstHabit: true });
    }
  }, [data && data.habits && data.habits.length]);
  // Seed the tour's form state from whatever is already saved on the
  // user's data doc when the tour first fires. Matters for the Replay
  // Tour flow (user ran the tour before, edited home/weekly review,
  // then replayed): the form controls should show their current values
  // rather than defaulting back to "" and Sunday 6pm and silently
  // overwriting saved data on Next. Runs once, at the 0 → 1 transition.
  useEffect(() => {
    if (tourStep !== 1) return;
    if (data && typeof data.homeLocation === "string" && data.homeLocation) {
      setTourHome(data.homeLocation);
    }
    if (data && data.weeklyReview) {
      if (typeof data.weeklyReview.day === "number") setTourReviewDay(data.weeklyReview.day);
      if (typeof data.weeklyReview.hour === "number") setTourReviewHour(data.weeklyReview.hour);
    }
    // Intentionally [tourStep] only — don't re-seed if `data` changes
    // mid-tour (e.g. user edited weekly review on step 8 form) because
    // that would yank the value back to the saved snapshot.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [tourStep]);

  // Auto-advance the centered "Let's show you around!" welcome step
  // onto the [+] spotlight after a short beat. Previously the user had
  // to swipe before the + button ever got highlighted, which made the
  // tour feel like it was waiting on something obscure. Now the intro
  // appears, gives the user a second to read it, then the spotlight on
  // the + button lands on its own.
  useEffect(() => {
    if (tourStep !== 1) return;
    const t = setTimeout(() => {
      // Only advance if still on step 1 — if the user already swiped
      // forward (fast reader) don't bump them to step 3.
      setTourStep(s => s === 1 ? 2 : s);
    }, 1600);
    return () => clearTimeout(t);
  }, [tourStep]);
  // Re-render when the window resizes OR anything scrolls — tooltip
  // anchors use live getBoundingClientRect, which would otherwise go
  // stale and leave the spotlight ring / dim panels / tooltip pinned
  // to where the target USED to be. `capture: true` on the scroll
  // listener catches scrolls inside nested scroll containers too
  // (not just the window), which matters because the tab content
  // scrolls in its own container, not the body.
  useEffect(() => {
    if (tourStep === 0) return;
    const onR = () => setTourResizeTick(t => t + 1);
    window.addEventListener("resize", onR);
    window.addEventListener("scroll", onR, { capture: true, passive: true });
    return () => {
      window.removeEventListener("resize", onR);
      window.removeEventListener("scroll", onR, { capture: true });
    };
  }, [tourStep]);

  /* Re-measure target rect after a tour-step change commits.
     renderTour resolves `step.selector` synchronously on the first render
     after tourStep changes, but the target DOM element often isn't mounted
     yet at that instant — e.g. a setTab(...) from the step-to-tab effect
     fires in the SAME render cycle, so the goal-tab's [+] button hasn't
     been painted when we querySelector for it. Result: rect = null → no
     spotlight ring, no carved dim hole, no ring-shape computation. The
     tooltip shows but the [+] sits unhighlighted until the user taps or
     scrolls (which bumps tourResizeTick via the listener above) and forces
     a re-measure.
     Fix: after every tourStep change we bump the tick twice — once on the
     next animation frame (after React commits + DOM paints) and again at
     ~220ms (after tab-switch transitions settle and any lazy-mounted form
     inputs land). That's enough to catch both fast paints and slower ones
     without thrashing render. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    let cancelled = false;
    const bump = () => { if (!cancelled) setTourResizeTick(t => t + 1); };
    const raf = requestAnimationFrame(() => {
      bump();
      // Second pass a beat later for tab transitions / lazy mounts.
      const t = setTimeout(bump, 220);
      const t2 = setTimeout(bump, 520);
      // Stash on the ref so the cleanup below can clear them.
      tourRemeasureTimers.current = [t, t2];
    });
    return () => {
      cancelled = true;
      cancelAnimationFrame(raf);
      (tourRemeasureTimers.current || []).forEach(clearTimeout);
      tourRemeasureTimers.current = [];
    };
  }, [tourStep]);

  /* Auto-scroll the tour target into view so the spotlight ring + the
     element it's highlighting are both visible, regardless of where on
     the page the user had previously scrolled. Without this, a step
     that points at (say) the [+] New-goal button can land while the
     user is scrolled halfway down the goals list — the ring gets drawn
     viewport-relative to the target's rect, which is now ABOVE the
     visible area. The user sees a tooltip, no spotlight, and has to
     manually scroll to find what's being highlighted.

     Behaviour:
       • `block: "center"` so the target lands in the middle of the
         viewport on most steps — gives the spotlight visual breathing
         room both above and below.
       • `block: "start"` for gated [+] steps (`pinBottom: true`) so
         the button sits near the top of the viewport and the tooltip
         docked at the bottom doesn't cover it.
       • We retry once on rAF and again at 260ms to outrun tab-switch
         transitions and lazy form mounts — same cadence as the
         re-measure effect above.
       • scrollIntoView is a no-op if the target is already in view, so
         there's no jitter on steps where the user hasn't scrolled. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    const step = TOUR_STEPS[tourStep - 1];
    if (!step || !step.selector) return undefined;
    const block = step.pinBottom ? "start" : "center";
    const tryScroll = () => {
      const el = document.querySelector(step.selector);
      if (!el || typeof el.scrollIntoView !== "function") return;
      try {
        el.scrollIntoView({ block: block, inline: "nearest", behavior: "smooth" });
      } catch (_e) {
        // Safari <15.4 and some legacy browsers don't accept the options
        // object. Fall back to the boolean form — `true` aligns the top
        // of the element with the top of the scroll container, which is
        // the closest analogue to block:"start".
        el.scrollIntoView(step.pinBottom ? true : false);
      }
    };
    const raf = requestAnimationFrame(() => {
      tryScroll();
      const t1 = setTimeout(tryScroll, 260);
      const t2 = setTimeout(tryScroll, 560);
      tourScrollTimers.current = [t1, t2];
    });
    return () => {
      cancelAnimationFrame(raf);
      (tourScrollTimers.current || []).forEach(clearTimeout);
      tourScrollTimers.current = [];
    };
  }, [tourStep]);
  // Auto-switch the active tab as the tour advances. Any step can
  // declare a `tab` field in TOUR_STEPS and this effect flips setTab
  // to match, so the page the step describes is actually on screen
  // (not just hinted at by the bottom-nav icon). Header/centered
  // steps leave the tab alone.
  useEffect(() => {
    if (tourStep === 0) return;
    // TOUR_STEPS isn't declared yet at this line (it's below, in
    // render body) — so we read it lazily off the component's own
    // closure at effect time. Safe because the array is a module-level
    // constant shape with no state dependencies.
    const stepIdx = tourStep - 1;
    // Inline mini-mirror of TOUR_STEPS tabs to avoid a forward-ref
    // dependency. Update alongside TOUR_STEPS whenever tabs change.
    // Current shape (1-indexed):
    //   1        intro (no tab change)
    //   2-6      Goals walkthrough (tap +, name, area, SMART, save)
    //   7-14     Habits walkthrough (tap +, name, link, area, importance,
    //            timing, schedule, save)
    //   15       To-Dos
    //   16       Reflect
    //   17-24    header widgets / profile (no tab change)
    //   25       final "you're all set" (lands on brief)
    const TOUR_TAB_BY_STEP = {
      2: "goals", 3: "goals", 4: "goals", 5: "goals", 6: "goals",
      7: "habits", 8: "habits", 9: "habits", 10: "habits", 11: "habits",
      12: "habits", 13: "habits", 14: "habits",
      15: "todos", 16: "reflection", 25: "brief"
    };
    const wantTab = TOUR_TAB_BY_STEP[tourStep];
    if (wantTab && tab !== wantTab) setTab(wantTab);
    void stepIdx; // suppress unused warning in static analyzers
  }, [tourStep]);

  /* Gated-step [+] button bounce. We only animate the PRIMARY action
     target — the New-goal / New-habit [+] button — because it's the one
     step where the user might not realize the app is waiting on them.
     Once the form is open, the subsequent sub-steps (pick area, SMART,
     save) use the standard pulsing spotlight ring + arrow callout
     instead; physically wobbling each form field would read as visual
     noise rather than a "tap me" cue.

     Step indices track TOUR_STEPS:
       2  — "Let's start by adding a goal" → New-goal [+]
       6  — "Save your goal"               → Add-Goal button
       7  — "Now add a habit"               → New-habit [+]
       14 — "Save your habit"               → Add-Habit button
     Re-run key includes goals.length / habits.length so the bounce stops
     the instant the user creates the first goal / habit and the form
     un-mounts (otherwise the class would stay stamped on a stale DOM
     node if one ever came back via back-swipe). Steps 6/14 bounce the
     SAVE button itself — these are the "press the spotlighted save"
     gates that keep the user from swiping past without actually saving
     (U13); the pulsing spotlight ring alone was easy to read as
     decorative. */
  const goalsLen = (data && data.goals) ? data.goals.length : 0;
  const habitsLen = (data && data.habits) ? data.habits.length : 0;
  useEffect(() => {
    if (tourStep === 0) return undefined;
    const GATED = {
      2:  { sel: "button[aria-label='New goal']",  open: goalsLen  === 0 },
      6:  { sel: "[data-tour-id='goal-save']",     open: goalsLen  === 0 },
      7:  { sel: "button[aria-label='New habit']", open: habitsLen === 0 },
      14: { sel: "[data-tour-id='habit-save']",    open: habitsLen === 0 }
    };
    const info = GATED[tourStep];
    if (!info || !info.open) return undefined;
    const apply = () => {
      const el = document.querySelector(info.sel);
      if (el && !el.classList.contains("tour-target-bounce")) {
        el.classList.add("tour-target-bounce");
      }
    };
    apply();
    const t1 = setTimeout(apply, 80);
    const t2 = setTimeout(apply, 320);
    return () => {
      clearTimeout(t1);
      clearTimeout(t2);
      const el = document.querySelector(info.sel);
      if (el) el.classList.remove("tour-target-bounce");
    };
  }, [tourStep, goalsLen, habitsLen]);

  /* Global swipe listener (document-level) — swiping anywhere on the
     app during the tour advances / rewinds. The old listener only fired
     on the tooltip + dim panels, but form-walkthrough steps turn off
     pointer events on the panels so the user can interact with fields
     underneath — which meant a swipe over the form itself didn't
     register. Now any horizontal swipe that started somewhere non-
     interactive (not an input/select/button/textarea) advances the
     tour, regardless of whether it crossed the card, the spotlight
     ring, or the app chrome.

     Rules:
       • 60px horizontal threshold + |dx| > |dy| clamp so vertical
         scrolls and small taps don't count.
       • Swipes that START on an input/select/textarea/button are
         ignored — dragging to select text or scrubbing a slider
         shouldn't flip the tour step.
       • The Hold-to-Exit pill carries `data-no-swipe` so the long-
         press gesture there isn't hijacked by the swipe tracker.
       • Handlers call tourAdvanceRef/tourGoBackRef, which point at
         the latest closures inside renderTour, so gate checks and
         form-saves still run correctly. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    const SWIPE_MIN = 60;
    let startX = 0, startY = 0, tracking = false;
    const ignoreTarget = (t) => {
      if (!t || !t.closest) return false;
      // Let the Hold-to-Exit button, inline form inputs, and any
      // explicit opt-outs manage their own pointer events.
      if (t.closest("[data-no-swipe='1'], .tour-exit-demo")) return true;
      if (t.closest("input, select, textarea, button, [contenteditable='true']")) return true;
      return false;
    };
    const onStart = (x, y, t) => {
      if (ignoreTarget(t)) { tracking = false; return; }
      startX = x; startY = y; tracking = true;
    };
    const onEnd = (x, y) => {
      if (!tracking) return;
      tracking = false;
      const dx = x - startX;
      const dy = y - startY;
      if (Math.abs(dx) < SWIPE_MIN) return;
      if (Math.abs(dx) < Math.abs(dy)) return;
      if (dx < 0) { if (tourAdvanceRef.current) tourAdvanceRef.current(); }
      else        { if (tourGoBackRef.current)  tourGoBackRef.current();  }
    };
    const ts = (e) => { const p = e.touches && e.touches[0]; if (p) onStart(p.clientX, p.clientY, e.target); };
    const te = (e) => { const p = (e.changedTouches && e.changedTouches[0]) || (e.touches && e.touches[0]); if (p) onEnd(p.clientX, p.clientY); };
    const md = (e) => onStart(e.clientX, e.clientY, e.target);
    const mu = (e) => onEnd(e.clientX, e.clientY);
    document.addEventListener("touchstart", ts, { passive: true });
    document.addEventListener("touchend", te, { passive: true });
    document.addEventListener("mousedown", md);
    document.addEventListener("mouseup", mu);
    return () => {
      document.removeEventListener("touchstart", ts);
      document.removeEventListener("touchend", te);
      document.removeEventListener("mousedown", md);
      document.removeEventListener("mouseup", mu);
    };
  }, [tourStep]);

  /* Auto-advance + DOM gate re-evaluation.

     Two things this effect does:
       1. While the tour is on a gated step whose gate depends on DOM
          state (e.g. "is the goal form open?", "is the area-of-life
          dropdown populated?"), we listen for input/change events and
          DOM mutations so the render-driven gate check actually RUNS
          again when those things flip. Without this, renderTour only
          re-checks gates on resize/scroll/tourStep, and the tooltip
          would sit stale until the user happened to trigger one.
       2. When a step has `autoAdvance: true`, we advance as soon as
          its gate passes — no swipe needed. This is what makes the
          form walkthrough feel continuous: tap [+], form opens, the
          tooltip jumps to "Pick an area of life"; pick one, it jumps
          to "SMART details?"; etc. Steps without autoAdvance (pure
          informational ones like SMART) still require a manual swipe.

     The listeners are installed once per tour-step change, scoped to
     the entire document so they catch any form interaction anywhere.
     MutationObserver covers DOM additions (form appearing). The
     per-step effect means cleanup runs before the next step's apply,
     so we never accidentally double-advance. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    let cancelled = false;
    const check = () => {
      if (cancelled) return;
      const step = TOUR_STEPS[tourStep - 1];
      if (!step || !step.gate) return;
      if (step.autoAdvance !== true) return;
      // Pass `data` so gates that are data-based (goals.length > 0,
      // habits.length > 0) still work; DOM-based gates ignore the
      // argument and query the document directly.
      let passed = false;
      try { passed = !!step.gate(data); } catch (_) { passed = false; }
      if (passed) setTourStep(s => (s === tourStep ? s + 1 : s));
    };
    // Initial check — the gate might already be passing when the step
    // mounts (e.g. user back-swipes into a step they've already
    // satisfied). Skip a frame so this runs AFTER React has committed
    // the render for this step; otherwise we can advance past a step
    // the user hasn't actually seen.
    const initial = setTimeout(check, 120);
    const onTick = () => check();
    document.addEventListener("input",  onTick, { capture: true });
    document.addEventListener("change", onTick, { capture: true });
    document.addEventListener("click",  onTick, { capture: true });
    const mo = new MutationObserver(onTick);
    mo.observe(document.body, { childList: true, subtree: true });
    // Also re-check on resize/scroll ticks so we stay in sync with
    // the tour's own re-render triggers (already wired in a separate
    // effect; subscribing here keeps the two in step).
    const onR = () => check();
    window.addEventListener("resize", onR);
    window.addEventListener("scroll", onR, { capture: true, passive: true });
    return () => {
      cancelled = true;
      clearTimeout(initial);
      document.removeEventListener("input",  onTick, { capture: true });
      document.removeEventListener("change", onTick, { capture: true });
      document.removeEventListener("click",  onTick, { capture: true });
      window.removeEventListener("resize", onR);
      window.removeEventListener("scroll", onR, { capture: true });
      mo.disconnect();
    };
  }, [tourStep, goalsLen, habitsLen]);

  /* SECTION FILTER (habits tab) — array of selected values. Empty = "All".
     Tap a pill = single-select (replace). Long-press (hold) = toggle in

  const [secFilter, setSecFilter] = useState([]); // [] | ["morning","afternoon",...]

  const [secPillsOpen, setSecPillsOpen] = useState(false);
  const [impPillsOpen, setImpPillsOpen] = useState(false);

  // COLLAPSED (habits hidden; tapping the header re-expands). The initial
  // state expands only the section matching the current time of day so
  // someone opening the app at 3pm lands on their afternoon habits.
  // Avoid defaults to expanded on first load but is toggleable like the
  // other three sections — its collapse state is honored at render time.
  const [collapsedSections, setCollapsedSections] = useState(() => {
    const cur = getCurrentSection(null); // no data yet in closure

      avoid:     false
    };
  });
  // Re-evaluate the "which section is current" default once per session,
  // after data (and therefore the user's custom timeRanges, if any) has
  // loaded. Guarded by a ref so we don't clobber manual toggles afterward.
  const didInitCollapseRef = useRef(false);
  // Habits-tab "Goal" filter = filter habits by their Area-of-Life type.
  // (Habit.type maps to the HT array: Physical / Mental / Career / …)
  // Kept separate from `goalTypeFilter`, which is the Goals-tab filter.
  const [habGoalFilter, setHabGoalFilter] = useState([]);
  const [habGoalPillsOpen, setHabGoalPillsOpen] = useState(false);

  const [habFreqFilter, setHabFreqFilter] = useState([]);
  const [habFreqPillsOpen, setHabFreqPillsOpen] = useState(false);
  // Duration is the one filter whose expanded row is a slider rather
  // than a row of pills. `durPillsOpen` mirrors the open/closed pattern
  // of the other compact toggles; the expanded row auto-shows whenever
  // the range has been narrowed so the user can always see / reset it.
  const [durPillsOpen, setDurPillsOpen] = useState(false);
  /* GOALS page: collapsed filter layout. Initially only [+] and [All Goals]
     show. Tapping the All-Goals pill expands the rest of the goal-type
     filter pills. The + button opens the new-goal form directly; category

  const [goalPillsOpen, setGoalPillsOpen] = useState(false);

  /* ICON PICKER */
  const [showIconPicker, setShowIconPicker] = useState(null); // {id, kind:"habit"|"goal"}

  /* HABIT STATS PANEL */
  const [showHabitStats, setShowHabitStats] = useState(false);
  const [habitMatrixSort, setHabitMatrixSort] = useState("section");
  const [impFilter, setImpFilter] = useState([]);
  // Duration filter is a two-thumb range [min, max] in minutes (0..120).
  // When min === 0 && max === 120 the filter is treated as "Any" (no
  // filtering). Thumbs are clamped so min <= max - 5 (slider step).
  const DUR_MIN = 0, DUR_MAX = 120, DUR_STEP = 5;

  const [swipeFeedback, setSwipeFeedback] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [showGoalArchive, setShowGoalArchive] = useState(false);

  const [nextGoalTxt, setNextGoalTxt] = useState("");
  const [goalTypeFilter, setGoalTypeFilter] = useState([]);
  const [headerExpanded, setHeaderExpanded] = useState(false);
  // When the user scrolls down past a small threshold, collapse the sub-row

  // Verrocchio / Achieve Anything / Today / streak / profile row stays
  // pinned without hogging vertical space.
  const [headerCollapsed, setHeaderCollapsed] = useState(false);
  const [calTravelMode, setCalTravelMode] = useState(false);
  // Drag-to-create-trip: while the user drags across the calendar grid in

  // On pointerup, all days in the range are committed as ONE trip (shared

  /* GOAL EXPANDED HABITS */
  const [expGoalHabits, setExpGoalHabits] = useState({});
  const [expHabitGoals, setExpHabitGoals] = useState({});
  // Version-history accordions on the goal detail view. `expGoalHistory`
  // tracks whether the goal's own history panel is open; `expHabitHistory`
  // tracks each linked habit's history panel independently, so opening one
  // habit's history doesn't reveal every sibling habit's history too.
  const [expGoalHistory, setExpGoalHistory] = useState({});
  const [expHabitHistory, setExpHabitHistory] = useState({});
  const goalHoldRef = useRef({});

  /* Long-press tracking for filter pills (shared per filter group —
     the user can only be pressing one pill at a time within a group). */
  const secLpRef  = useRef({ timer: null, val: null, fired: false });
  const impLpRef  = useRef({ timer: null, val: null, fired: false });
  const goalLpRef = useRef({ timer: null, val: null, fired: false });
  const habGoalLpRef = useRef({ timer: null, val: null, fired: false });
  const habFreqLpRef = useRef({ timer: null, val: null, fired: false });

  /* filterPressProps — returns the event handlers for a filter pill.
     Tap: replace the selection with [val] (single-select). If the user
     taps the currently-only selected pill, revert to "All" ([]).
     Long-press (≥ 380ms): toggle membership in the selection — this is
     how the user picks multiple pills at once.
     `isAll` marks the "All" pill, which always clears to []. */
  const filterPressProps = (val, selected, setSelected, lpRef, isAll) => {
    const start = () => {
      lpRef.current = {
        val: val,
        fired: false,
        timer: setTimeout(() => {
          lpRef.current.fired = true;
          if (isAll) { setSelected([]); return; }
          // Toggle this val in the current selection.
          if (selected.includes(val)) {
            const next = selected.filter(v => v !== val);
            setSelected(next);
          } else {
            setSelected([...selected, val]);
          }
          if (navigator.vibrate) { try { navigator.vibrate(12); } catch (_) {} }
        }, 380)
      };
    };
    const cancel = () => {
      if (lpRef.current && lpRef.current.timer) {
        clearTimeout(lpRef.current.timer);
        lpRef.current.timer = null;
      }
    };
    const handleClick = () => {
      // Suppress click that follows a long-press.
      if (lpRef.current && lpRef.current.fired) {
        lpRef.current.fired = false;
        return;
      }
      if (isAll) { setSelected([]); return; }
      // Tap: single-select. Tapping the currently-only selection clears.
      if (selected.length === 1 && selected[0] === val) setSelected([]);
      else setSelected([val]);
    };
    return {
      onPointerDown: start,
      onPointerUp: cancel,
      onPointerCancel: cancel,
      onPointerLeave: cancel,
      onClick: handleClick
    };
  };
  const [goalMoreMenu, setGoalMoreMenu] = useState(null); // goal.id
  const [addCatModal, setAddCatModal] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [newCatColor, setNewCatColor] = useState("#6366f1");
  const [goalJournal, setGoalJournal] = useState(null); // goal object
  const [goalJournalTxt, setGoalJournalTxt] = useState("");
  const [xpToast, setXpToast] = useState(null);

  /* MORNING BRIEF */
  const [briefTxt, setBriefTxt] = useState("");
  const [briefing, setBriefing] = useState(false);

  /* RITUAL PILL INTERACTIONS
     expandedPill: key of the pill currently expanded by a single tap.
     pillSheet: object describing an open bottom-sheet with action options
       (opened by long-press). Shape: { title, actions: [{label, onClick}] }. */
  const [expandedPill, setExpandedPill] = useState(null);
  const [pillSheet, setPillSheet] = useState(null);

  /* UNDO */
  const undoStack = useRef([]);
  const [undoToast, setUndoToast] = useState(null);
  const undoTimerRef = useRef(null);
  const pushUndo = (msg, snapshot) => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    undoStack.current = [...undoStack.current.slice(-9), snapshot];
    setUndoToast(msg);
    undoTimerRef.current = setTimeout(() => setUndoToast(null), 5000);
  };
  const doUndo = () => {
    const snap = undoStack.current.pop();
    if (!snap) return;
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoToast(null);
    save(snap);
  };

  /* FIREBASE SYNC */
  const [syncState, setSyncState] = useState("loading"); // loading | synced | saving | offline
  const saveTimerRef = useRef(null);
  const latestData = useRef(null);

  // Per-user localStorage key: prevents one device from leaking account
  // A's data into account B's session. Anonymous/legacy sessions (no uid)
  // fall back to the original key so existing single-user installs keep
  // their data on first load.
  const uid = authUser && authUser.uid ? authUser.uid : null;
  const lsKey = uid ? `${SK}-${uid}` : SK;

  // Load from Firestore whenever the signed-in user changes. Clears the
  // previous user's in-memory data first so we never flash account A's
  // habits inside account B's session. New users (no doc yet) start
  // from SEED state and will create their doc on first save.
  useEffect(() => {
    if (demoMode) return; // demo mode uses in-memory seed data only
    if (!uid) {
      // Signed out — wipe any previously loaded data so the next sign-in
      // can't see stale state. The login gate will keep us on the auth
      // screen until a user signs in.
      if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; }
      latestData.current = null;
      try { setData(JSON.parse(JSON.stringify(DD))); } catch(e){}
      setSyncState("loading");
      return;
    }
    setSyncState("loading");
    // Prefer a local cached copy of *this* user's data for instant paint,
    // then reconcile with Firestore below.
    try {
      const r = localStorage.getItem(lsKey);
      if (r) {
        const d = JSON.parse(r);
        setData(d);
      } else {
        // First time on this device for this user: start from a blank
        // default so onboarding fires instead of the seed workspace.
        setData(JSON.parse(JSON.stringify(DD)));
      }
    } catch (e) {}
    // One-time legacy migration: the pre-multi-user build wrote to the
    // shared `users/main` doc and the unscoped `SK` localStorage key. On
    // the very first sign-in under the new code on a device that still
    // has that legacy data, promote it to the current user's scope so
    // the original owner doesn't lose their workspace. Guarded by the
    // "v-migrated" flag so only the first account to sign in here claims
    // it (subsequent accounts on the same browser get a fresh slate).
    const migrationFlag = "v-migrated";
    const alreadyMigrated = (() => { try { return !!localStorage.getItem(migrationFlag); } catch(e) { return true; } })();
    const legacyLocal = (() => { try { return localStorage.getItem(SK); } catch(e) { return null; } })();
    const userLocalExists = (() => { try { return !!localStorage.getItem(lsKey); } catch(e) { return false; } })();
    userDoc(uid).get().then(snap => {
      if (!snap.exists && !alreadyMigrated && !userLocalExists && legacyLocal) {
        // Copy legacy local cache into this user's per-user slot, then
        // write through to Firestore on the next save.
        try {
          localStorage.setItem(lsKey, legacyLocal);
          localStorage.setItem(migrationFlag, "1");
          const parsed = JSON.parse(legacyLocal);
          setData(parsed);
          latestData.current = parsed;
          userDoc(uid).set(parsed).catch(() => {});
        } catch (e) {}
        setSyncState("synced");
        return;
      }
      if (snap.exists) {
        const d = snap.data();
        if (!d.habits || d.habits.length === 0) d.habits = SEED_HABITS;
        if (!d.goals || d.goals.length === 0) d.goals = SEED_GOALS;
        if (!d.journal) d.journal = [];
        if (!d.archive) d.archive = [];
        if (!d.quotes) d.quotes = [];
        if (!d.todos) d.todos = [];
        if (!d.dailyRitual) d.dailyRitual = {};
        if (typeof d.homeLocation !== "string") d.homeLocation = "";
        if (!Array.isArray(d.travelDays)) d.travelDays = [];
        d.travelDays = d.travelDays.map(t => {
          if (typeof t === "string") return { date: t, location: "", tripId: "t-" + t };
          if (!t || typeof t.date !== "string") return null;
          if (!t.tripId) return { ...t, tripId: "t-" + t.date };
          return t;
        }).filter(Boolean);
        if (Array.isArray(d.habits)) {
          d.habits = d.habits.map(h => h && !h.frequency ? { ...h, frequency: { type: "daily", days: [], day: null } } : h);
        }
        if (typeof d.onboardingComplete !== "boolean") {
          // Existing cloud user: don't force them through onboarding.
          d.onboardingComplete = (d.habits && d.habits.length > 0) || (d.goals && d.goals.length > 0);
        }
        setData(d);
        try {
          localStorage.setItem(lsKey, JSON.stringify(d));
        } catch (e) {}
      } else {
        // Brand-new account — no doc yet. Leave `data` at the blank
        // default set above so the onboarding flow runs for them.
      }
      setSyncState("synced");
    }).catch(() => {
      setSyncState("offline");
    });
  }, [uid, demoMode]);
  const save = useCallback(d => {
    setData(d);
    latestData.current = d;
    if (demoMode) {
      // In-memory only — don't touch localStorage or Firestore so the demo
      // can't overwrite a real user's data.
      setSaved(true);
      setTimeout(() => setSaved(false), 800);
      setSyncState("synced");
      return;
    }
    // Write to localStorage immediately, scoped to the current user so
    // account switching on the same device doesn't cross-contaminate.
    try {
      localStorage.setItem(lsKey, JSON.stringify(d));
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (e) {}
    // No uid yet (auth still resolving) — skip the cloud write; the next
    // save after sign-in will flush to the user's doc.
    if (!uid) { setSyncState("offline"); return; }
    // Debounce Firestore writes — max 1 per 800ms
    setSyncState("saving");
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    const writeUid = uid; // capture so a post-signout flush can't misroute
    saveTimerRef.current = setTimeout(() => {
      userDoc(writeUid).set(latestData.current).then(() => {
        setSyncState("synced");
      }).catch(() => {
        setSyncState("offline");
      });
    }, 800);
  }, [demoMode, uid, lsKey]);

  /* ── Day-visit tracking ──
     Append today's date key to data.dayVisits the first time the user
     opens the app each calendar day. Only runs once data is loaded and
     the user is actually in the app (not splash / login / onboarding /
     demo mode). Idempotent — if tk() is already the last entry, noop. */
  useEffect(() => {
    if (demoMode) return;
    if (!data || !data.onboardingComplete) return;
    const today = tk();
    const visits = Array.isArray(data.dayVisits) ? data.dayVisits : [];
    if (visits[visits.length - 1] === today) return; // fast path
    if (visits.indexOf(today) !== -1) return;
    save({ ...data, dayVisits: [...visits, today] });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.onboardingComplete, demoMode]);

  /* ── Achievement stat computation ──
     Derives the numbers that unlock tiers. Streak computation uses
     max(current streak across active habits, cached best-ever per
     habit), so streaks earned and later reset still count. */
  const achievementStats = useMemo(() => {
    const habitsArr = (data && data.habits) || [];
    const goalsArr = (data && data.goals) || [];
    const archiveArr = (data && data.goalArchive) || [];
    const currentBest = habitsArr.length ? Math.max(0, ...habitsArr.map(h => getStreak(h))) : 0;
    const cachedBest = Math.max(0, ...Object.values((data && data.bestStreaks) || {}), 0);
    // ── Derived goal-quality stats (feed the new Achiever/Builder
    // achievements). None of these introduce new storage — they're
    // pure functions of `data.goals` / `data.goalArchive` / `data.habits`.
    //
    //  smartGoals: count of goals (live OR archived) where every SMART
    //    field carries a non-empty value. `measurable` is the trickiest
    //    — the UI splits it into a number field + a unit field, so both
    //    must be filled for the M to count. The unlock check is
    //    `smartGoals >= 1` so filling SMART on a SINGLE goal triggers
    //    it; keeping it as a count (not a boolean) leaves room for
    //    future "3 SMART goals", "10 SMART goals" tiers without a
    //    schema change.
    //
    //  goalsCreated: total goals the user has ever created, = live +
    //    archived. Completing a goal moves it from data.goals to
    //    data.goalArchive; summing both means a 3-goals milestone
    //    stays unlocked even after the user checks them all off.
    //
    //  activeGoalsCleared: 1 at the "zero active, ≥1 archived" clean-
    //    slate moment, else 0. Boolean-as-threshold so the existing
    //    `statVal >= threshold` unlock check works unchanged.
    //
    //  habitPerGoal: 1 when there's at least one goal AND every live
    //    goal's id appears as a goalId on at least one habit. Zero-
    //    goal state stays locked so an empty workspace can't accidentally
    //    unlock "Laddered Up".
    const isSmartComplete = (g) => {
      const s = g && g.smart;
      if (!s) return false;
      const measurableOk = String(s.measurable || "").trim().length > 0
        && String(s.measurableUnit || "").trim().length > 0;
      return measurableOk
        && String(s.specific    || "").trim().length > 0
        && String(s.achievable  || "").trim().length > 0
        && String(s.relevant    || "").trim().length > 0
        && String(s.timebound   || "").trim().length > 0;
    };
    const smartGoals = goalsArr.filter(isSmartComplete).length
                     + archiveArr.filter(isSmartComplete).length;
    const goalsCreated = goalsArr.length + archiveArr.length;
    const activeGoalsCleared = (goalsArr.length === 0 && archiveArr.length >= 1) ? 1 : 0;
    const linkedGoalIds = new Set(habitsArr.map(h => h && h.goalId).filter(Boolean).map(String));
    const habitPerGoal = (goalsArr.length >= 1 && goalsArr.every(g => linkedGoalIds.has(String(g.id)))) ? 1 : 0;
    return {
      visits: ((data && data.dayVisits) || []).length,
      bestStreak: Math.max(currentBest, cachedBest),
      goals: archiveArr.length,
      habitsActive: habitsArr.length,
      xp: (data && data.xp) || 0,
      smartGoals,
      goalsCreated,
      activeGoalsCleared,
      habitPerGoal
    };
  }, [data]);

  // Run once per session after data loads: seed `collapsedSections` so
  // the section matching the user's current time-of-day (per their own
  // timeRanges if set, or defaults otherwise) is the only one expanded.
  // Ref-guarded so subsequent data updates don't collapse sections the
  // user has since manually expanded.
  useEffect(() => {
    if (didInitCollapseRef.current || !data) return;
    didInitCollapseRef.current = true;
    const cur = getCurrentSection(data);
    setCollapsedSections(prev => ({
      ...prev,
      morning:   cur !== "morning",
      afternoon: cur !== "afternoon",
      evening:   cur !== "evening",
      avoid:     false
    }));
  }, [data]);

  /* ── Cache first-unlock timestamps ──
     Whenever stats cross a threshold for the first time, record the
     moment in data.achievementsUnlocked so the UI can show "Unlocked
     on Apr 21, 2026" even if the underlying stat later regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const already = (data && data.achievementsUnlocked) || {};
    const newly = {};
    ACHIEVEMENTS.forEach(a => {
      if (already[a.id]) return;
      if ((achievementStats[a.stat] || 0) >= a.threshold) {
        newly[a.id] = new Date().toISOString();
      }
    });
    if (Object.keys(newly).length === 0) return;
    save({ ...data, achievementsUnlocked: { ...already, ...newly } });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [achievementStats.visits, achievementStats.bestStreak, achievementStats.goals, achievementStats.habitsActive, achievementStats.xp, achievementStats.smartGoals, achievementStats.goalsCreated, achievementStats.activeGoalsCleared, achievementStats.habitPerGoal]);

  /* Also keep data.bestStreaks up-to-date — whenever a habit's current
     streak exceeds its cached best, bump the cache so the achievement
     counter never regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const habitsArr = data.habits || [];
    const cache = { ...(data.bestStreaks || {}) };
    let changed = false;
    habitsArr.forEach(h => {
      const s = getStreak(h);
      if (s > (cache[h.id] || 0)) { cache[h.id] = s; changed = true; }
    });
    if (changed) save({ ...data, bestStreaks: cache });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.habits]);

  const exportData = () => {
    const b = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `verrocchio-backup-${tk()}.json`;
    a.click();
  };
  const importData = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const p = JSON.parse(ev.target.result);
        if (!p.habits) p.habits = SEED_HABITS;
        if (!p.goals) p.goals = SEED_GOALS;
        if (!p.journal) p.journal = [];
        if (!p.archive) p.archive = [];
        if (!p.quotes) p.quotes = [];
        if (!p.todos) p.todos = [];
        save(p);
      } catch {
        alert("Invalid file.");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  /* TODOS */
  const addTodo = () => {
    if (!nTodo.trim()) return;

     Adding a new step? Append into TOUR_STEPS below. Selectors should
     point at a stable `aria-label` or `data-tour` attribute so tours
     don't depend on class names that churn. Field reference follows.  */
  /* ── TOUR_STEPS (14 steps) ──
     The in-app half of the merged onboarding+tour. The pre-app screens
     (carousel, balanced-life, intent) land the user on the Goals tab
     with an empty workspace, then this tour walks them through actually
     building a first goal + habit on the real UI, and finally explains
     the header, weekly review, travel + home, and settings.

     Step fields:
       title        – tooltip heading.
       body         – tooltip copy.
       selector     – CSS anchor for the spotlight ring. Omit + set
                      `center: true` for a dialog-style centered tip.
       placement    – "top" | "bottom" hint for tooltip side.
       tab          – switches the active page when the step opens so the
                      user sees what's being described (see TOUR_TAB_BY_STEP).
       gate         – fn(data) → bool. When present, Next is disabled
                      until it returns true. Used to force the user to
                      actually create a goal (step 2) and a habit (step 3).
       gateHint     – tiny italic nudge shown while gated.
       form         – "weeklyReview" | "homeLocation". Renders inline form
                      controls in the tooltip; advance saves to data.
       optionalActionKey   – identifies an optional secondary button
                             (openTodoForm | focusReflect). Handler lives
                             in renderTour, not on the step, so closure
                             state stays clean.
       optionalActionLabel – button label for the optional action. */
  const TOUR_STEPS = [
    // 1 — Intro
    {
      title: "Let's show you around!",
      body: "You'll set your first goal, link a habit, and see how the pieces fit. We'll walk it together — swipe to continue.",
      center: true

    // ── Goals walkthrough (2-5) ──────────────────────────────────────
    // The flow used to be one giant "Goals — the long arc" step that

    // create one. It's now four field-level prompts that track the
    // user's actual progress through the inline New-Goal form:
    //   2. tap the [+]  → form opens
    //   3. pick area    → Area-of-Life dropdown has a value
    //   4. SMART fields → informational, user swipes or fills + swipes

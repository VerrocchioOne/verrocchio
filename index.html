    // lightens its dim panels (the user needs to SEE the form) and
    // top-docks the tooltip (out of the way of whatever field it points
    // at). `autoAdvance: true` on gated steps skips the manual swipe —
    // the moment the gate passes (user picks an area, user saves),
    // the tour jumps forward so the prompt never sits stale on screen
    // after the user has already done what it asked.
    // 2 — Goals: tap the [+] to open the new-goal form
    {
      title: "Let's start by adding a goal",
      body: "Tap the [+] above to open the new-goal form.",
      selector: "button[aria-label='New goal']",
      placement: "bottom",
      tab: "goals",
      // Pin the tooltip to the bottom of the viewport so it doesn't

      gate: () => !!document.querySelector("[data-tour-id='goal-form']"),
      gateHint: "Tap + to start.",

    // 3 — Goals: write the goal description

    // keystroke made the step feel like it vanished before the user

    {
      title: "Write your goal",
      body: "One short sentence on what you want to accomplish. Keep it concrete — e.g. \u201CRun a half-marathon\u201D, not \u201CGet fit\u201D. Swipe when you're done.",

      // Once text is typed and the gate passes, a dashed secondary ring

    // 7 — Habits: tap the [+] to open the new-habit form

      selector: "button[aria-label='New habit']",
      placement: "bottom",
      tab: "habits",

      gateHint: "Tap + to start.",
      autoAdvance: true
    },
    // 8 — Habits: name it
    // Same rationale as step 3 — no autoAdvance on text-name steps
    // so the user isn't jumped mid-word. Gate still blocks swipe
    // until there's text, so the user can't accidentally skip.
    {
      title: "Name your habit",
      body: "What's the daily action? Keep it small and concrete — e.g. \u201CRun 20 minutes\u201D or \u201C10 pushups\u201D. Swipe when you're done.",
      selector: "[data-tour-id='habit-name']",
      placement: "bottom",
      tab: "habits",
      formStep: true,
      gate: () => {
        const inp = document.querySelector("[data-tour-id='habit-name']");
        return !!(inp && inp.value && inp.value.trim().length > 0);
      },
      gateHint: "Type a habit to continue."
    },
    // 9 — Habits: link to the goal just created (moved UP from
    // former step 10). We walk link first so the habit's Area of
    // Life auto-syncs from the goal — then the next step is a quick
    // "see, it's already set" confirmation rather than a blank pick.
    {
      title: "Link it to the goal you just set",
      body: "Connect this habit to the goal you just added so progress rolls up. Picking the goal also auto-fills the habit's Area of Life — they have to match.",
      selector: "[data-tour-id='habit-goal']",
      placement: "top",
      tab: "habits",
      formStep: true,
      gate: () => {
        const sel = document.querySelector("[data-tour-id='habit-goal']");
        return !!(sel && sel.value && sel.value !== "__new__");
      },
      gateHint: "Pick the goal you just created.",
      autoAdvance: true
    },
    // 10 — Habits: Area of Life (auto-filled from linked goal)
    {

      body: "Because you linked a goal, the habit sits in the same Area of Life. Unlink the goal if you need to change it.",
      selector: "[data-tour-id='habit-area']",
      placement: "top",
      tab: "habits",
      formStep: true
    },
    // 11 — Habits: Importance
    {

      body: "Rank it so the daily view surfaces the load-bearing habits first when your day gets crowded.",

    // 12 — Habits: time of day + duration
    {

    // 13 — Habits: schedule (start date + cadence)

    // 14 — Habits: save

      placement: "top",
      tab: "habits",

    // 12 — To-Dos
    {

    },
    // 13 — Reflect: optional focus
    {

    // 14 — Date badge

    // 15 — Calendar
    {

    // 16 — Weekly review picker (inline form)
    {

    },
    // 17 — Travel mode
    {

    // 18 — Where is home? (inline form)

    // 19 — XP

    // 20 — Streak

      selector: "[data-tour='header-streak']",

    },
    // 21 — Profile & settings
    {

      selector: "button[aria-label='Profile']",
      placement: "bottom"
    },
    // 22 — Done
    {

      body: "That's the whole app. Replay this tour anytime from Profile \u2192 App Settings \u2192 Guided Tour.",
      center: true,
      tab: "brief"
    }
  ];

  const finishTour = () => {
    // Don't persist "tour done" while in demo mode — demo is a preview
    // of the new-user experience, so completing the tour in demo must
    // not cause the real account's next login to skip the tour.
    if (!demoMode) localStorage.setItem("v-tour-done", "1");
    setTourDone(true);
    setTourStep(0);
  };

  const renderTour = () => {
    if (tourStep === 0) return null;
    const step = TOUR_STEPS[tourStep - 1];
    if (!step) return null;

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const pad = 8;       // padding around the highlighted target
    const tipW = Math.min(300, vw - 32);
    const tipGap = 12;   // space between target and tooltip
    // Gate check hoisted up here because tooltip placement depends on it —
    // gated steps dock the tooltip to the bottom of the screen so the
    // add-goal / add-habit form the user is about to open isn't covered.
    const gateBlocked = typeof step.gate === "function" && !step.gate(data);

    let target = null;
    if (step.selector) {
      target = document.querySelector(step.selector);
    }

    let rect = null;
    // ringRadius is the CSS border-radius to paint on the spotlight ring
    // so it MATCHES the shape of the target element — circles ([+] add
    // buttons) get a circular ring, inputs get their rounded-rectangle
    // radius, etc. The old hard-coded 12px made a pill-capsule [+] sit
    // inside a boxy square, which read as "the spotlight drifted off
    // the button" even though it was centered. We grab the target's
    // computed border-radius (using its four corner values so we don't
    // get tripped up by shorthand quirks), treat 50% / values close to
    // half the smallest side as "circle → render a perfect circle ring
    // that hugs the button", and otherwise extend each corner radius by
    // the overlay's pad so the widened ring still aligns with the
    // target's curve instead of collapsing to a sharp outline.
    let ringRadius = "12px";
    if (target) {
      const r = target.getBoundingClientRect();
      rect = { top: r.top, left: r.left, width: r.width, height: r.height,
               bottom: r.bottom, right: r.right };
      try {
        const cs = window.getComputedStyle(target);
        const raw = [
          cs.borderTopLeftRadius,
          cs.borderTopRightRadius,
          cs.borderBottomRightRadius,
          cs.borderBottomLeftRadius
        ];
        const minSide = Math.min(r.width, r.height);
        // A value ≥ half the smallest side means the corner is fully
        // rounded (pill/circle). If ALL four corners hit that threshold
        // AND the element is roughly square (within 10%), we paint a
        // perfect circle ring hugging the button. Using 50% on a wide
        // pill would produce an ellipse — that's desirable too, so pill-
        // shaped buttons still get a pill ring.
        const parsed = raw.map(v => {
          if (!v) return 0;
          if (v.endsWith("%")) return (parseFloat(v) / 100) * minSide;
          return parseFloat(v) || 0;
        });
        const allPill = parsed.every(p => p >= minSide / 2 - 1);
        const squareish = Math.abs(r.width - r.height) / Math.max(r.width, r.height, 1) < 0.12;
        if (allPill && squareish) {
          // Perfect circle — radius = half the widened (padded) side so
          // the spotlight ring hugs the button edge without cutting in.
          ringRadius = "50%";
        } else if (allPill) {
          // Pill / ellipse — keep it round-on-the-ends by using 9999px
          // which CSS clamps to half-the-shorter-side, preserving the
          // capsule look even after the ring is widened by pad.
          ringRadius = "9999px";
        } else {
          // Rounded rectangle — extend each corner radius by `pad` so
          // the ring's curve stays flush with the element's curve after
          // the ring is grown outward.
          ringRadius = parsed.map(p => (p + pad) + "px").join(" ");
        }
      } catch (_e) {
        ringRadius = "12px";
      }
    }

    // Form-walkthrough steps (pick area, SMART, save, etc.) dock at the
    // top of the viewport just like the initial gated [+] step did, so
    // the middle of the screen stays clear and the user can SEE + type
    // into the form beneath. We treat any step flagged `formStep: true`
    // as needing the top-dock treatment.
    //
    // `pinBottom: true` overrides that and pins the tooltip to the
    // bottom of the viewport instead — used on the "Tap + to start"
    // steps where the spotlight target is the [+] button near the top
    // of the page. Top-docking would cover that button; bottom-docking
    // keeps it unobstructed.
    const pinBottom = step.pinBottom === true;
    const topDock = !pinBottom && (gateBlocked || step.formStep === true);

    // Decide tooltip position: if anchored, place above (default) or
    // below depending on room + step.placement hint. If not anchored,
    // center the tooltip in the viewport.
    let tipStyle = {};
    if (pinBottom) {
      // The fixed-bottom swipe-footer pill occupies ~30px of height at
      // `bottom: 14px`. Park the pin-bottom tooltip ABOVE the pill
      // (footer height + gap + safe-area) so the user can see both the
      // "Tap + to start" card AND the swipe hint on the same screen.
      tipStyle = {
        position: "fixed",
        left: 12,
        right: 12,
        bottom: "calc(62px + env(safe-area-inset-bottom, 0px))",
        width: "auto"
      };
    } else if (topDock) {
      // Gated / form-walkthrough steps — dock the tooltip across the TOP
      // of the viewport, above the spotlighted [+] button or form field.
      // Typical phone stack:
      //   ┌ top band: "Pick an area of life" (this tooltip)
      //   │ ...
      //   │ [target field]  ← spotlight ring
      //   │ "Pick an area of life" (callout, if gated)
      //   │ ... middle of screen stays free to see / type into the form
      //   └ bottom nav
      // maxHeight clamps the tooltip so it can't extend down and cover
      // the spotlighted target — that's what broke the old bottom-docked
      // version, and it's what would break here too if the tooltip
      // grew past the space above the target.
      const availTop = rect
        ? Math.max(110, rect.top - tipGap - 12)
        : 220;
      tipStyle = {
        position: "fixed",
        left: 12,
        right: 12,
        top: "calc(12px + env(safe-area-inset-top, 0px))",
        width: "auto",
        maxHeight: availTop + "px",
        overflow: "hidden"
      };
    } else if (rect) {
      const wantTop = step.placement === "top";
      const fitsTop = rect.top - tipGap - 140 > 20;
      const fitsBottom = rect.bottom + tipGap + 140 < vh - 20;
      const placeTop = wantTop ? fitsTop : (fitsBottom ? false : fitsTop);
      const centerX = rect.left + rect.width / 2;
      const left = Math.max(12, Math.min(vw - tipW - 12, centerX - tipW / 2));
      tipStyle = placeTop
        ? { position: "fixed", left, bottom: vh - rect.top + tipGap, width: tipW }
        : { position: "fixed", left, top: rect.bottom + tipGap, width: tipW };
    } else {
      tipStyle = {
        position: "fixed",
        left: "50%",
        top: "50%",
        transform: "translate(-50%,-50%)",
        width: tipW
      };
    }

    // Build the dim panels. When a rect is known we carve four panels
    // around it so the target stays lit. When not, a single full-screen
    // dim panel covers everything.
    const panels = [];
    if (rect) {
      const tR = { top: rect.top - pad, left: rect.left - pad,
                   right: rect.right + pad, bottom: rect.bottom + pad };
      // top
      panels.push({ left: 0, top: 0, width: vw, height: Math.max(0, tR.top) });
      // bottom
      panels.push({ left: 0, top: tR.bottom, width: vw, height: Math.max(0, vh - tR.bottom) });
      // left strip
      panels.push({ left: 0, top: tR.top, width: Math.max(0, tR.left), height: Math.max(0, tR.bottom - tR.top) });
      // right strip
      panels.push({ left: tR.right, top: tR.top, width: Math.max(0, vw - tR.right), height: Math.max(0, tR.bottom - tR.top) });
    } else {
      panels.push({ left: 0, top: 0, width: vw, height: vh });
    }

    // Dim opacity: the standard 0.58 dim reads as a strong "foreground
    // spotlight" and was right for the initial [+] step (the user just
    // needs to see WHERE to tap). But once the form is open and the
    // user is reading / typing into fields, that same dim makes the
    // form hard to read — the whole point of the walkthrough is that
    // the background IS the content the user is operating on. So for
    // form-walkthrough steps, drop to a much softer wash (0.22) that
    // still separates layers visually but keeps the form legible.
    const dimColor = step.formStep === true
      ? "rgba(0,0,0,0.22)"
      : "rgba(0,0,0,0.58)";

    const isLast = tourStep === TOUR_STEPS.length;

    // (gateBlocked is computed at the top of renderTour so it can drive
    //  tooltip placement as well as advance() / dim-panel pointer events.)

    // ── Form steps save their value to `data` when the user advances.
    //    Both pieces of state (tourHome, tourReviewDay/Hour) live at the
    //    component top level so React preserves them across re-renders
    //    triggered by the resize/scroll listener.
    const advance = () => {
      if (gateBlocked) return;
      if (step.form === "weeklyReview") {
        save({
          ...data,
          weeklyReview: { day: tourReviewDay, hour: tourReviewHour }
        });
      } else if (step.form === "homeLocation") {
        save({ ...data, homeLocation: tourHome.trim() });
      }
      if (isLast) finishTour();
      else setTourStep(tourStep + 1);
    };
    const goBack = () => {
      if (tourStep > 1) setTourStep(tourStep - 1);
    };
    // Expose the latest closures so the component-level global-swipe
    // useEffect can trigger them without re-binding document listeners
    // on every step/state change. renderTour runs on every render, so
    // these refs are always current when a swipe fires.
    tourAdvanceRef.current = advance;
    tourGoBackRef.current = goBack;

    // ── Swipe handlers — attached to the tooltip and the dim panels so
    //    a horizontal swipe anywhere off the spotlight area navigates the
    //    tour. Threshold is 45px horizontal with a clamp that requires
    //    |dx| > |dy| so vertical scrolls inside the tooltip body don't
    //    accidentally trigger nav. Form inputs and buttons inside the
    //    tooltip stop-propagate so dragging a select / typing in the
    //    home-location input never registers as a swipe.
    const SWIPE_MIN = 45;
    const onSwipeStart = (clientX, clientY) => {
      tourSwipeRef.current = { x: clientX, y: clientY, t: Date.now(), active: true };
    };
    const onSwipeEnd = (clientX, clientY) => {
      const s = tourSwipeRef.current;
      if (!s || !s.active) return;
      tourSwipeRef.current.active = false;
      const dx = clientX - s.x;
      const dy = clientY - s.y;
      if (Math.abs(dx) < SWIPE_MIN) return;
      if (Math.abs(dx) < Math.abs(dy)) return; // mostly vertical → ignore
      if (dx < 0) advance();        // swipe left → next
      else goBack();                 // swipe right → back
    };
    const swipeHandlers = {
      onTouchStart: e => {
        const t = e.touches && e.touches[0];
        if (t) onSwipeStart(t.clientX, t.clientY);
      },
      onTouchEnd: e => {
        const t = (e.changedTouches && e.changedTouches[0]) || (e.touches && e.touches[0]);
        if (t) onSwipeEnd(t.clientX, t.clientY);
      },
      onMouseDown: e => onSwipeStart(e.clientX, e.clientY),

<!-- iOS "Add to Home Screen" requires a raster apple-touch-icon; Safari
     silently ignores data:image/svg+xml here and falls back to a
     screenshot-of-the-page icon, which is what the previous build
     shipped. Pointing at the 180×180 PNG (plus the 1024×1024 for
     high-DPI spring loaders) renders the real logo on the home
     screen. Favicon link uses the same PNGs so browser tabs and the
     saved-page thumbnail stay on-brand. -->

<style>
*{box-sizing:border-box;margin:0;padding:0}
/* Theme tokens. The palette-level colors below are read from React
   inline styles as `var(--c-…)`. That means flipping a light/dark
   value here cascades everywhere the var is used — no extra
   attribute-substring override needed per surface. Colors that are
   NOT tokenized (brand greens, tints, accents, gradients) still rely
   on the legacy `body.dark [style*="rgb(…)"]` overrides below, so
   don't assume every color works via tokens yet. Anything new should
   prefer a token. */
:root{
  --accent:#2d5a2d;
  --accent-2:#3d7a3d;
  --app-bg:#f8f7f4;
  --app-text:#1f2937;
  --c-surface-raised:#f9fafb;
  --c-surface-muted:#f3f4f6;
  --c-border:#e5e7eb;
  --c-text:#1f2937;
  --c-text-strong:#111827;
  --c-text-soft:#374151;
  --c-tint-green:#f0f7f0;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--app-bg);font-family:system-ui,-apple-system,sans-serif;color:var(--app-text);min-height:100%;min-height:-webkit-fill-available;overscroll-behavior:none}
/* Dark mode: flip tokens first (covers every inline style that uses a
   `var(--c-…)`). Then fall back to inline-style-attribute substring
   overrides for colors still hard-coded as hex — React normalizes
   those to rgb() in the DOM, so each override matches a specific rgb
   triple. If you add a new surface, prefer a token. */
body.dark{
  --app-bg:#0b0d0f;
  --app-text:#e5e7eb;
  --c-surface-raised:#1c1f23;
  --c-surface-muted:#22262a;
  --c-border:#2a2f34;
  --c-text:#e5e7eb;
  --c-text-strong:#f3f4f6;
  --c-text-soft:#d1d5db;
  --c-tint-green:#182418;
}
/* ── neutral surface → dark card ── */
body.dark [style*="background: rgb(255, 255, 255)"]{background:#17191c!important}
body.dark [style*="background: rgb(248, 247, 244)"]{background:#0b0d0f!important}
/* ── green tints (brand) ── */
body.dark [style*="background: rgb(240, 247, 240)"]{background:#182418!important}
body.dark [style*="background: rgb(240, 253, 244)"]{background:#162216!important}
body.dark [style*="background: rgb(245, 250, 245)"]{background:#182418!important}
body.dark [style*="background: rgb(198, 223, 198)"]{background:#2a3d2a!important}
/* ── amber / warning tints ── */
body.dark [style*="background: rgb(255, 251, 235)"]{background:#2a220f!important}
body.dark [style*="background: rgb(255, 247, 237)"]{background:#2a1e0f!important}
body.dark [style*="background: rgb(254, 243, 199)"]{background:#332810!important}
body.dark [style*="background: rgb(254, 249, 195)"]{background:#332e0f!important}
/* ── red / danger tints ── */
body.dark [style*="background: rgb(254, 242, 242)"]{background:#2a1414!important}
body.dark [style*="background: rgb(254, 226, 226)"]{background:#3a1a1a!important}
/* Avoid-habit card tints: the default card bg (#fff5f5), the
   transient "missed" bg (#fff1f1), and the success/miss border
   colors (#86efac / #fca5a5). Without these the whole avoid list
   stays stubbornly pink in dark mode. */
body.dark [style*="background: rgb(255, 245, 245)"]{background:#241414!important}
body.dark [style*="background: rgb(255, 241, 241)"]{background:#2a1414!important}
body.dark [style*="solid rgb(254, 202, 202)"]{border-color:#4d1a1a!important}
body.dark [style*="solid rgb(252, 165, 165)"]{border-color:#5a2020!important}
body.dark [style*="solid rgb(134, 239, 172)"]{border-color:#2a3d2a!important}
/* ── cyan / travel tints ── */
body.dark [style*="background: rgb(240, 249, 255)"]{background:#0f2231!important}
body.dark [style*="background: rgb(236, 254, 255)"]{background:#0f2631!important}
body.dark [style*="background: rgb(207, 250, 254)"]{background:#123340!important}
body.dark [style*="background: rgb(186, 230, 253)"]{background:#153a4d!important}
/* ── blue tints ── */
body.dark [style*="background: rgb(239, 246, 255)"]{background:#0f1a31!important}
body.dark [style*="background: rgb(219, 234, 254)"]{background:#1a2540!important}
/* ── purple / violet tints ── */
body.dark [style*="background: rgb(245, 243, 255)"]{background:#1f1a31!important}
body.dark [style*="background: rgb(221, 214, 254)"]{background:#2d2540!important}
/* ── pink / rose tints ── */
body.dark [style*="background: rgb(253, 244, 255)"]{background:#2a1531!important}
body.dark [style*="background: rgb(240, 171, 252)"]{background:#3d2040!important}
/* ── teal tints ── */
body.dark [style*="background: rgb(240, 253, 250)"]{background:#0f2626!important}
/* ── light gradients → dark gradients (hand-mapped to the 2 specific
   gradients actually used by the XP/Level bar and the Insights card) ── */
body.dark [style*="linear-gradient(135deg, rgb(240, 253, 244), rgb(240, 247, 240))"]{background:linear-gradient(135deg,#162216,#182418)!important}
body.dark [style*="linear-gradient(135deg, rgb(240, 247, 240), rgb(245, 250, 245))"]{background:linear-gradient(135deg,#182418,#1a2a1a)!important}
body.dark [style*="linear-gradient(180deg, rgb(248, 247, 244) 0%, rgb(239, 236, 229) 100%)"]{background:linear-gradient(180deg,#0b0d0f 0%,#1a1c1f 100%)!important}
body.dark [style*="linear-gradient(90deg, rgb(254, 243, 199), rgb(253, 230, 138))"]{background:linear-gradient(90deg,#332810,#3d2f10)!important}
/* ── borders: flip near-white / light gray borders to dark-mode gray.
      The neutrals #e5e7eb and #f3f4f6 are handled by the --c-border /
      --c-surface-muted tokens now; only the legacy tinted borders stay
      here because they're not yet tokenized. ── */
body.dark [style*="border: 1px solid rgb(198, 223, 198)"]{border-color:#2a3d2a!important}
body.dark [style*="border: 1px solid rgb(186, 230, 253)"]{border-color:#153a4d!important}
body.dark [style*="border: 1px solid rgb(253, 186, 116)"]{border-color:#4d2810!important}
body.dark [style*="border: 1px solid rgb(254, 202, 202)"]{border-color:#4d1a1a!important}
body.dark [style*="border: 1px solid rgb(253, 211, 77)"]{border-color:#4d3510!important}
body.dark [style*="border-bottom: 1px solid rgb(252, 211, 77)"]{border-bottom-color:#4d3510!important}
/* ── text colors: light-mode dark grays → dark-mode near-white.
      The neutrals #1f2937 / #111827 / #374151 are handled by the
      --c-text / --c-text-strong / --c-text-soft tokens now. Only the
      non-tokenized grays (#6b7280, #9ca3af) still need overrides. ── */
body.dark [style*="color: rgb(75, 85, 99)"]{color:#d1d5db!important}
body.dark [style*="color: rgb(107, 114, 128)"]{color:#9ca3af!important}
body.dark [style*="color: rgb(156, 163, 175)"]{color:#9ca3af!important}
body.dark [style*="color: rgb(209, 213, 219)"]{color:#6b7280!important}
/* ── accents on tinted cards: keep brand text readable on tinted dark bg ── */
body.dark [style*="color: rgb(45, 90, 45)"]:not([data-brand]){color:#9fdf9f!important}
body.dark [style*="color: rgb(8, 145, 178)"]{color:#7dd3fc!important}
body.dark [style*="color: rgb(120, 53, 15)"]{color:#fcd34d!important}
body.dark [style*="color: rgb(153, 27, 27)"]{color:#fca5a5!important}
body.dark [style*="color: rgb(21, 128, 61)"]{color:#86efac!important}
body.dark [style*="color: rgb(194, 65, 12)"]{color:#fdba74!important}
body.dark [style*="color: rgb(217, 119, 6)"]{color:#fbbf24!important}
/* ── dashed travel-day outlines: stay visible on dark calendar ── */
body.dark [style*="dashed rgb(103, 232, 249)"]{border-color:#67e8f9!important}
/* Custom accent: remap the default green button background / accent
   colors to the user's chosen --accent value. Uses inline-style
   attribute substring matching because most components hard-code
   "#2d5a2d" as inline style. Anything marked `data-brand="1"`
   stays on the canonical Verrocchio green — the demo badge, the
   "pick Verrocchio green" palette swatch, and the splash/brand
   artwork explicitly opt out of recoloring. */
body.accent-custom [style*="background: rgb(45, 90, 45)"]:not([data-brand]){background:var(--accent)!important}
body.accent-custom [style*="color: rgb(45, 90, 45)"]:not([data-brand]){color:var(--accent)!important}
body.accent-custom [style*="stroke: rgb(45, 90, 45)"]:not([data-brand]){stroke:var(--accent)!important}
body.accent-custom [style*="fill: rgb(45, 90, 45)"]:not([data-brand]){fill:var(--accent)!important}
/* Borders: match any width so `2px solid #2d5a2d` and `1.5px solid
   #2d5a2d` both remap, plus the shorthand `border-color`, plus each
   side-specific variant (borderTop/Bottom/Left/Right). */
body.accent-custom [style*="solid rgb(45, 90, 45)"]:not([data-brand]){border-color:var(--accent)!important}
body.accent-custom [style*="border-color: rgb(45, 90, 45)"]:not([data-brand]){border-color:var(--accent)!important}
body.accent-custom [style*="border-top-color: rgb(45, 90, 45)"]:not([data-brand]){border-top-color:var(--accent)!important}
body.accent-custom [style*="border-bottom-color: rgb(45, 90, 45)"]:not([data-brand]){border-bottom-color:var(--accent)!important}
/* SVG presentation attributes (the bottom-nav icons and some chart
   marks set `fill="#2d5a2d"` / `stroke="#2d5a2d"` rather than inline
   style). Attribute selectors catch both the hex and normalized forms. */
body.accent-custom svg [fill="#2d5a2d"]:not([data-brand]),
body.accent-custom [fill="#2d5a2d"]:not([data-brand]){fill:var(--accent)!important}
body.accent-custom svg [stroke="#2d5a2d"]:not([data-brand]),
body.accent-custom [stroke="#2d5a2d"]:not([data-brand]){stroke:var(--accent)!important}
/* Guided-tour highlight ring: gently pulse the brand-green glow around
   the spotlighted target so the eye lands on it even before reading the
   tooltip. Ring itself is drawn inline in renderTour(); this just
   animates the box-shadow radius/alpha. */
@keyframes tourPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(45,90,45,.25),0 8px 24px rgba(0,0,0,.3)}
  50%{box-shadow:0 0 0 8px rgba(45,90,45,.15),0 8px 28px rgba(0,0,0,.32)}
}
/* Gated-step + button emphasis. Applied to the real target button (the
   "New goal" / "New habit" [+]) while the tour is waiting for the user to
   tap it, so the button itself visibly wobbles — not just a ring around
   it. Slight scale + rotation so it reads as "look here, tap me" rather
   than a steady pulse the eye filters out. */
@keyframes tourTargetBounce{
  0%,100%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(1.18) rotate(-4deg)}
  40%{transform:scale(1.18) rotate(4deg)}
  60%{transform:scale(1.1) rotate(-2deg)}
  80%{transform:scale(1.05) rotate(0deg)}
}
.tour-target-bounce{animation:tourTargetBounce 1.4s ease-in-out infinite;transform-origin:center center}
@media (prefers-reduced-motion: reduce){
  .tour-target-bounce{animation:none}
}
/* Gated-step callout bob — arrow + bubble below the spotlighted button,
   pointing up at it. Separate from tourTargetBounce so the callout
   motion reads as an independent "look up here" nudge rather than being
   yoked to the button's jiggle. */
@keyframes tourCalloutBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.tour-callout{animation:tourCalloutBob 1.1s ease-in-out infinite}
@media (prefers-reduced-motion: reduce){
  .tour-callout{animation:none}
}
::placeholder{color:#9ca3af}
input,select,textarea{outline:none;font-family:inherit;-webkit-appearance:none;border-radius:0}
/* ── Duration filter slider (Habits tab "Max time" control) ──
   Native <input type="range"> renders a rectangular track by default.
   We override with a pill-shaped track on both WebKit and Firefox so
   the slider matches the rest of the pill-shaped filter chrome.
   The thumb is a 14px circle in the same cyan accent so drag affordance
   stays clear. accentColor on the element still tints the filled
   portion on WebKit (via ::-webkit-slider-runnable-track inheritance)
   and on Firefox (::-moz-range-progress). */
/* Dual-thumb duration range slider. Two <input type="range"> elements
   are absolutely stacked over a shared wrapper; their native tracks are
   hidden and a custom gray track + accent-colored fill is drawn between
   the two thumb positions. The inputs themselves get pointer-events:none
   on the track so neither one steals the wrong thumb — only the thumbs
   have pointer-events:auto. Thumbs use var(--accent) so they follow the
   user's selected accent color (Verrocchio green by default). */
.dur-slider-wrap{position:relative;height:18px;flex:1;min-width:80px}
.dur-slider-wrap .dur-track{position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:6px;border-radius:9999px;background:#e5e7eb;pointer-events:none}
.dur-slider-wrap .dur-fill{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:9999px;background:var(--accent,#2d5a2d);pointer-events:none}
.dur-slider-wrap input[type=range].dur-slider{position:absolute;top:0;left:0;width:100%;height:18px;background:transparent;pointer-events:none;-webkit-appearance:none;appearance:none;margin:0;padding:0}
.dur-slider-wrap input[type=range].dur-slider:focus{outline:none}
.dur-slider-wrap input[type=range].dur-slider::-webkit-slider-runnable-track{height:6px;background:transparent;border:none}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-track{height:6px;background:transparent;border:none}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-progress{background:transparent}
.dur-slider-wrap input[type=range].dur-slider::-webkit-slider-thumb{pointer-events:auto;-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent,#2d5a2d);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);margin-top:-5px;cursor:pointer;position:relative;z-index:2}
.dur-slider-wrap input[type=range].dur-slider::-moz-range-thumb{pointer-events:auto;width:16px;height:16px;border-radius:50%;background:var(--accent,#2d5a2d);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer;position:relative;z-index:2}
body.dark .dur-slider-wrap .dur-track{background:#2a2f36}
body.dark .dur-slider-wrap input[type=range].dur-slider::-webkit-slider-thumb{border-color:#17191c}
body.dark .dur-slider-wrap input[type=range].dur-slider::-moz-range-thumb{border-color:#17191c}
/* Prevent iOS Safari from auto-zooming into inputs on focus (it fires
   when the input's computed font-size < 16px and the zoom persists
   AFTER blur — leaving the whole app stuck zoomed-in and forcing the
   user to pinch back out). Forcing 16px on touch devices avoids that
   without affecting desktop layouts that use smaller inputs. */
@media (hover:none) and (pointer:coarse){
  input,select,textarea{font-size:16px!important}
}
select{-webkit-appearance:none;appearance:none}
textarea{resize:vertical}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.fade-in{animation:fadeIn .2s ease forwards}
.pulsing{animation:pulse 1.5s ease infinite}
/* ── Verrocchio welcome splash ("Ink V") ──────────────────────────────
   Full-bleed brand animation on the welcome screen while
   splashPhase === "loading" (see setSplashPhase timer). Pyramid
   blocks stack bottom-to-top in quick springy succession; a Playfair
   Display "V" is then DRAWN into the pyramid's negative space via
   an SVG stroke-dashoffset reveal — left arm first, then the
   thinner right arm — so the glyph appears hand-inked. The Lora
   wordmark and italic tagline land last.
   Earlier "Climber" (v2) and "Quick build" (v3) variants lived here
   too; they were removed once the Ink V was chosen as the final
   animation. If you need to restore them, their commit is in git. */
.splashv4{position:fixed;inset:0;background:#faf8f3;display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:9999}
.splashv4 .stage{position:relative;flex:0 0 auto;width:320px;height:280px}
/* Pyramid built from 10 individual square-ish blocks arranged 4-3-2-1
   from bottom to top. Replaces the old four-bar version where each row
   was one solid wide rectangle — the discrete blocks read as a stacked
   constructed pyramid rather than a stepped wedge. Block size 44x26
   with an 8px horizontal gap puts the bottom row at the same 200px
   width the old layout used, so the V glyph sitting on top still
   lines up. Vertical gap is 4px between rows. */
.splashv4 .pyramid{position:absolute;top:66px;left:50%;width:200px;height:120px;transform:translateX(-50%)}
.splashv4 .block{position:absolute;width:44px;height:26px;background:linear-gradient(135deg,#2d5a2d 0%,#3d7a3d 100%);border-radius:4px;box-shadow:0 6px 14px rgba(45,90,45,.22),inset 0 1px 0 rgba(255,255,255,.18);opacity:0;animation:splashv4BlockPop 1s cubic-bezier(.34,1.56,.64,1) forwards;will-change:transform,opacity;transform-origin:50% 100%}
/* Row 1 (4 blocks, bottom). 4*44 + 3*8 = 200 */
.splashv4 .b1{bottom:0;left:0;animation-delay:.10s}
.splashv4 .b2{bottom:0;left:52px;animation-delay:.20s}
.splashv4 .b3{bottom:0;left:104px;animation-delay:.30s}
.splashv4 .b4{bottom:0;left:156px;animation-delay:.40s}
/* Row 2 (3 blocks). Offset 26px to center over row 1. */
.splashv4 .b5{bottom:30px;left:26px;animation-delay:.54s}
.splashv4 .b6{bottom:30px;left:78px;animation-delay:.64s}
.splashv4 .b7{bottom:30px;left:130px;animation-delay:.74s}
/* Row 3 (2 blocks). Offset 52px. */
.splashv4 .b8{bottom:60px;left:52px;animation-delay:.88s}
.splashv4 .b9{bottom:60px;left:104px;animation-delay:.98s}
/* Row 4 (apex, 1 block). Offset 78px to center. */
.splashv4 .b10{bottom:90px;left:78px;animation-delay:1.12s}
/* Pop-in animation replacing the old "drop from above" stack: each
   block grows from 0 with a slight pre-rotation, overshoots its final
   size via a back-curve easing, and settles at 1×. Reads as blocks
   snapping into place like puzzle pieces rather than dropping in. */
@keyframes splashv4BlockPop{
  0%   {opacity:0;transform:scale(0) rotate(-10deg)}
  55%  {opacity:1;transform:scale(1.12) rotate(3deg)}
  100% {opacity:1;transform:scale(1) rotate(0)}
}
/* Wordmark holds 10 individual letter spans — one per pyramid block.
   Container itself is static (no entrance animation) so each letter
   can fade up on its own staggered timing, paired 1:1 with the
   matching block. Block 1 + V, block 2 + e, ..., block 10 + o. */
.splashv4 .brand-wordmark{position:absolute;top:22px;left:50%;font-family:'Lora',Georgia,'Times New Roman',serif;font-weight:700;font-size:34px;line-height:1;color:#2d5a2d;letter-spacing:-.01em;white-space:nowrap;transform:translateX(-50%)}
.splashv4 .wm-letter{display:inline-block;opacity:0;transform:translateY(6px);animation:splashv4LetterIn .84s cubic-bezier(.22,1,.36,1) forwards;will-change:transform,opacity}
.splashv4 .wm-1{animation-delay:.10s}
.splashv4 .wm-2{animation-delay:.20s}
.splashv4 .wm-3{animation-delay:.30s}
.splashv4 .wm-4{animation-delay:.40s}
.splashv4 .wm-5{animation-delay:.54s}
.splashv4 .wm-6{animation-delay:.64s}
.splashv4 .wm-7{animation-delay:.74s}
.splashv4 .wm-8{animation-delay:.88s}
.splashv4 .wm-9{animation-delay:.98s}
.splashv4 .wm-10{animation-delay:1.12s}
@keyframes splashv4LetterIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion: reduce){.splashv4 .block,.splashv4 .wm-letter{animation-duration:.01s!important}}

/* Compact pyramid + V brand mark — static lockup used on the quote card. */
.brand-mark{position:relative;width:140px;height:78px;margin:0 auto 22px}
.brand-mark .bm-block{position:absolute;left:50%;height:18px;background:linear-gradient(135deg,#2d5a2d 0%,#3d7a3d 100%);border-radius:3px;box-shadow:0 4px 10px rgba(45,90,45,.2),inset 0 1px 0 rgba(255,255,255,.18);transform:translateX(-50%)}
.brand-mark .bm-b1{bottom:0;width:140px}
.brand-mark .bm-b2{bottom:20px;width:105px}
.brand-mark .bm-b3{bottom:40px;width:70px}
.brand-mark .bm-b4{bottom:60px;width:35px}
.brand-mark .bm-v{position:absolute;top:20px;left:50%;transform:translate(-50%,-2px);width:70px;height:58px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-weight:900;font-size:62px;line-height:1;color:#f4efe4;text-shadow:0 2px 8px rgba(0,0,0,.25);pointer-events:none}
::-webkit-scrollbar{width:4px}

   panels carved around the rect + a ring drawn at the rect position)
   was fragile in every possible way: targets not yet mounted on tour-
   step change, tab transitions moving rects mid-render, scrolls
   leaving the ring pinned to a stale position, nested scroll
   containers requiring capture-phase listeners, form fields inside
   the "hole" that still got the dim overlay on top of them. We
   replaced the whole thing with two CSS classes toggled on the real
   target DOM node:

/* Habit frequency taxonomy. `rank` is used to order habits from "most
   often" to "least often" when a goal expands its linked habits (lower

   Field shape per cadence:

     weekdays   — `days: number[]`  (0..6 Sun..Sat; multi-select)

     monthly    — `monthDay: 1..31` (day of month)
     quarterly  — `month: 0..11` + `monthDay: 1..31`
                  (anchor date; repeats every 3 months from the anchor)
     annual     — `month: 0..11` + `monthDay: 1..31`
                  (anchor date; repeats every year)

   Historical note: an earlier build had two weekly variants — `weekly`
   (no day) and `weekly-day` (with day). They've been merged into a
   single `weekly` that always carries a `day`. Legacy `weekly-day`
   habits are migrated on read by `getFreq()`. */
const FREQ = [
  { value: "daily",       label: "Daily",         icon: "\u{1F4C5}", rank: 1 },
  { value: "weekdays",    label: "Select Days",   icon: "\u{1F5D3}", rank: 2 },
  { value: "weekly",      label: "Weekly",        icon: "\u{1F5D3}", rank: 3 },
  { value: "monthly",     label: "Monthly",       icon: "\u{1F4C6}", rank: 5 },
  { value: "quarterly",   label: "Quarterly",     icon: "\u{1F4C6}", rank: 6 },
  { value: "annual",      label: "Annual",        icon: "\u{1F4C6}", rank: 7 }
];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_LONG  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
// Ordinal suffix for day-of-month display (1st, 2nd, 3rd, 4th, … 21st, …).
const ordSuffix = n => {
  const v = n % 100;
  if (v >= 11 && v <= 13) return n + "th";
  switch (n % 10) { case 1: return n + "st"; case 2: return n + "nd"; case 3: return n + "rd"; default: return n + "th"; }

// their meaning across the whole codebase.

// this list when rendering chips so Monday appears first, while the

const DOW_ORDER = [1, 2, 3, 4, 5, 6, 0];
const dowDisplayRank = d => {

  return i === -1 ? 99 : i;

   - Legacy `weekly-day` cadence is collapsed into `weekly` (its `day`

  return {
    type: rawType,
    days: Array.isArray(f.days) ? f.days : [],
    day: typeof f.day === "number" ? f.day : null,

    month:    typeof f.month    === "number" ? f.month    : null

const habitGoalIds = h => {

//   daily      → always due
//   weekdays   → today's day-of-week is in the days array
//   weekly     → today's day-of-week === fq.day
//   monthly    → today's date === fq.monthDay
//   quarterly  → today's month is on the 3-month cadence from fq.month
//                AND today's date === fq.monthDay
//   annual     → today's month === fq.month AND today's date === fq.monthDay
// Legacy habits without a frequency field default to "daily" (always due).
const isHabitDueOn = (h, dateKey) => {
  const fq = getFreq(h);
  if (!fq || fq.type === "daily") return true;
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateKey || "");
  if (!m) return true; // unparsable date → don't hide

  const day = dt.getDate();
  const mon = dt.getMonth();

  if (fq.type === "monthly")  return (fq.monthDay || 1) === day;
  if (fq.type === "quarterly") {
    const anchorMonth = fq.month == null ? 0 : fq.month;
    const anchorDay   = fq.monthDay || 1;
    return ((mon - anchorMonth) % 3 + 3) % 3 === 0 && anchorDay === day;
  }
  if (fq.type === "annual") {
    const anchorMonth = fq.month == null ? 0 : fq.month;
    const anchorDay   = fq.monthDay || 1;
    return mon === anchorMonth && day === anchorDay;

  }
  if (fq.type === "weekly") {

    // the old weekly / weekly-day split. Show "Weekly — Tue" so the
    // user can see the anchor at a glance.
    return "Weekly \u2014 " + (DOW_ABBR[fq.day == null ? 1 : fq.day] || "Mon");

  if (fq.type === "monthly") {
    return fq.monthDay ? "Monthly \u2014 " + ordSuffix(fq.monthDay) : "Monthly";
  }
  if (fq.type === "quarterly") {
    if (fq.month != null && fq.monthDay) {
      return "Quarterly \u2014 " + MONTHS_SHORT[fq.month] + " " + fq.monthDay;
    }
    return "Quarterly";
  }
  if (fq.type === "annual") {
    if (fq.month != null && fq.monthDay) {
      return "Annual \u2014 " + MONTHS_SHORT[fq.month] + " " + fq.monthDay;
    }
    return "Annual";
  }

  "text": "Find a body of water, and be still beside it for a time. Build a fire and watch the flames. Sit on the porch. Lie on the grass. Light candles. Take a deep breath. Write a letter to someone. Discover something new everyday. Learn. Tell stories. Listen to old people. Ask them questions. Give to others when you can and treat yourself occasionally. Read real books and newspapers. Always buy the grocery store flowers if they catch your eye. Remember that there is power in moderation. Learn to cook or bake a new dish. Enjoy every meal. Savor your food. Drink water. Any chance you get, hold a baby. When the opportunity arises, dance. Always swim or wade in the water. Study leaves. At least once this year, pee outside. Be completely quiet. Turn your favorite song up loud. Sing along. If someone makes you feel bad all the time, get away from them. Laugh with others. Laugh while you're alone. Spend time with animals. Don't judge. Think this: \"There but for the grace of God go I\" or \"Everyone you meet is fighting a hard battle.\" Forgive others. Forgive yourself.",

  "text": "It’s dark because you are trying too hard.\nLightly child, lightly. Learn to do everything lightly.\nYes, feel lightly even though you’re feeling deeply.\nJust lightly let things happen and lightly cope with them.\n\nI was so preposterously serious in those days, such a humorless little prig.\nLightly, lightly – it’s the best advice ever given me.\nWhen it comes to dying even. Nothing ponderous, or portentous, or emphatic.\nNo rhetoric, no tremolos,\nno self conscious persona putting on its celebrated imitation of Christ or Little Nell.\nAnd of course, no theology, no metaphysics.\nJust the fact of dying and the fact of the clear light.\n\nSo throw away your baggage and go forward.\nThere are quicksands all about you, sucking at your feet,\ntrying to suck you down into fear and self-pity and despair.\nThat’s why you must walk so lightly.\nLightly my darling,\non tiptoes and no luggage,\nnot even a sponge bag,\ncompletely unencumbered.",

  "text": "The Chinese noted with surprise and disgust the ability of the Mongol warriors to survive on little food and water for long periods; according to one, the entire army could camp without a single puff of smoke since they needed no fires to cook. Compared to the lurched soldiers, the Mongols were much healthier and stronger. The Mongols consumed a steady diet of meat, milk, yogurt, and other dairy products, and they fought men who lived on gruel made from various grains. The grain diet of the peasant warriors stunted their bones, rotted their teeth, and left them weak and prone to disease. In contrast, the poorest Mongol soldier ate mostly protein, thereby giving him strong teeth and bones. Unlike the lurched soldiers, who were dependent on a heavy carbohydrate diet, the Mongols could more easily go a day or two without food.",

const fmtDur = v => {

  if (n % 60 === 0) return `${n / 60}h`;
  return `${Math.floor(n / 60)}h ${n % 60}m`;
};

/* ── Habit visual helpers ─────────────────────────────────────────
   All pure input→SVG functions used across habit cards, stats
   modal, achievement shelf, and the Habits tab. Kept here (rather
   than inside the main component) so the JSX factories are easy to
   reason about and reusable — none of them need component state.

// 14-day sparkline — tiny green-on-grey bar+line chart representing
// the last two weeks. Done days draw a 2px bar + a connecting line
// through the tops; missed/empty days leave a faint tick. Width is
// configurable because it sits next to other card chrome and may
// need to shrink on narrow cards.
const Sparkline14 = React.memo(function Sparkline14({ habit, width = 72, height = 14, color = "#2d5a2d" }) {
  const l14 = getLast14(habit);
  const n = l14.length;
  const step = width / n;
  const top = 2, bot = height - 2;
  const pts = l14.map((d, i) => [i * step + step / 2, d.done ? top : bot]);
  const pathD = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return React.createElement("svg", {
    width, height, viewBox: `0 0 ${width} ${height}`, "aria-hidden": true,
    style: { display: "block", flexShrink: 0 }
  },
    // Faint baseline
    React.createElement("line", { x1: 0, y1: bot + 0.5, x2: width, y2: bot + 0.5, stroke: "var(--c-border)", strokeWidth: 1 }),
    // Connecting line through day tops
    React.createElement("path", { d: pathD, stroke: color, strokeWidth: 1.2, fill: "none", opacity: 0.55, strokeLinejoin: "round" }),
    // Dots: filled on done days, empty ring on missed/empty
    ...l14.map((d, i) => React.createElement("circle", {
      key: i,
      cx: (i * step + step / 2).toFixed(1),
      cy: d.done ? top : bot,
      r: d.done ? 1.6 : 1.1,
      fill: d.done ? color : "#fff",
      stroke: d.done ? color : "#d1d5db",
      strokeWidth: 0.8
    }))
  );
});

// 7-day dot strip aligned to the current calendar week (Sun→Sat).
// Cells: done = green solid, missed = red solid, today (not done
// or missed yet) = green ring, future = grey ring, past-empty = grey ring.
// Sits beneath the habit title as a glance-able weekly cadence.
const WeekDots = React.memo(function WeekDots({ habit, size = 7, gap = 3 }) {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  // Build the 7 calendar dates for this week starting Sunday.
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - dow + i);
    const k = dk(d);
    const isFuture = i > dow;
    const isToday = i === dow;
    const state = habit.completions?.[k];
    days.push({ k, isFuture, isToday, state });
  }
  return React.createElement("div", {
    style: { display: "flex", alignItems: "center", gap, flexShrink: 0 },
    "aria-hidden": true
  }, ...days.map((d, i) => {
    let bg = "transparent", border = "var(--c-border)";
    if (d.state === "done") { bg = "#22c55e"; border = "#22c55e"; }
    else if (d.state === "missed") { bg = "#ef4444"; border = "#ef4444"; }
    else if (d.isToday) { border = "#2d5a2d"; }
    else if (d.isFuture) { border = "var(--c-surface-muted)"; }
    return React.createElement("div", {
      key: i,
      style: {
        width: size, height: size, borderRadius: "50%",
        background: bg, border: `1px solid ${border}`,
        boxSizing: "border-box"
      }
    });
  }));
});

// Streak-chain glyph — replaces the emoji `🔥 N` pill with a row of
// stylized flame SVGs that grow as the streak grows. Up to 5 are
// drawn; after that we show `5+ · N` so the count still reads. Cold
// state shows frosted "broken-link" glyphs with the days-since count.
const StreakChain = React.memo(function StreakChain({ streak, cold }) {
  if (streak > 0) {
    const shown = Math.min(streak, 5);
    // Flame colors ramp from amber → orange → red as the streak grows.
    const hot = streak >= 30 ? "#dc2626" : streak >= 7 ? "#ea580c" : "#f59e0b";
    return React.createElement("div", {
      style: {
        height: 16, display: "flex", alignItems: "center", gap: 1,
        paddingLeft: 3, paddingRight: 5, background: "#fff7ed",
        border: "1px solid #fed7aa", borderRadius: 4, flexShrink: 0
      }
    },
      ...Array.from({ length: shown }, (_, i) => React.createElement("svg", {
        key: i, width: 7, height: 10, viewBox: "0 0 7 10", "aria-hidden": true
      },
        React.createElement("path", {
          d: "M3.5 0.5 C 5 2 6 3.5 6 5.5 C 6 7.8 4.8 9.3 3.5 9.3 C 2.2 9.3 1 7.8 1 5.5 C 1 4.2 1.8 3 3.5 0.5 Z",
          fill: hot, opacity: 0.55 + (i / Math.max(shown - 1, 1)) * 0.45
        })
      )),
      React.createElement("span", {
        style: { fontSize: 8, fontWeight: 700, color: "#c2410c", marginLeft: 2 }
      }, streak > 5 ? "\u00B7 " + streak : streak)
    );
  }
  if (cold != null) {
    return React.createElement("div", {
      style: {
        height: 16, display: "flex", alignItems: "center", gap: 2,
        paddingLeft: 4, paddingRight: 5, background: "#eff6ff",
        border: "1px solid #bfdbfe", borderRadius: 4, flexShrink: 0
      }
    },
      React.createElement("svg", {
        width: 10, height: 10, viewBox: "0 0 10 10", "aria-hidden": true
      },
        // Broken chain — two small links with a gap
        React.createElement("circle", { cx: 3, cy: 5, r: 1.8, fill: "none", stroke: "#3b82f6", strokeWidth: 1.2 }),
        React.createElement("circle", { cx: 7, cy: 5, r: 1.8, fill: "none", stroke: "#3b82f6", strokeWidth: 1.2, opacity: 0.5 }),
        React.createElement("line", { x1: 4.5, y1: 5, x2: 5.5, y2: 5, stroke: "#3b82f6", strokeWidth: 1.2, opacity: 0.35 })
      ),
      React.createElement("span", { style: { fontSize: 8, fontWeight: 700, color: "#1d4ed8" } }, cold)
    );
  }
  return null;
});

// SproutAvatar — a tiny growth glyph that evolves with streak

// Momentum arrow — ▲ / ▼ / ▬ based on the delta between the last 7
// days and the prior 7 days of completion. `value` optional (shown
// as a percent delta if provided). Compact; lives next to a habit's
// completion rate in the stats modal.
const MomentumArrow = React.memo(function MomentumArrow({ habit }) {
  const now = new Date();
  const days = (offset, count) => {
    let c = 0;
    for (let i = offset; i < offset + count; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      if (habit.completions?.[dk(d)] === "done") c++;
    }
    return c;
  };
  const recent = days(0, 7);
  const prior = days(7, 7);
  const delta = recent - prior;
  const glyph = delta > 0 ? "\u25B2" : delta < 0 ? "\u25BC" : "\u2192";
  const color = delta > 0 ? "#16a34a" : delta < 0 ? "#dc2626" : "#9ca3af";
  return React.createElement("span", {
    title: `Last 7d: ${recent} · Prior 7d: ${prior}`,
    style: { fontSize: 9, fontWeight: 700, color, marginLeft: 4 }
  }, glyph, delta !== 0 ? " " + Math.abs(delta) : "");

  const doAuth = async () => {

    }

  };
  // Temporary one-tap sign-in for the seeded demo personas. Tapping a

  // Custom-appearance showcase entries. Each persona gets ONE extra

  // Seeded custom quotes pool so the Inspiration > Quotes tab has

    { text: "Motion beats meditation when meditation becomes procrastination.",                   author: ""                }
  ];
  // Per-persona profile. `rate(daysAgo)` returns the probability a
  // habit was completed on that day — shape encodes the persona's
  // character (morning-consistent = flat high, falling-off = high
  // then crashes in recent days, etc.). The custom `accentColor` is
  // written to localStorage on sign-in so each persona lands in
  // custom-appearance mode with their own tint.
  const DEMO_PROFILES = {
    // Heavy, deeply-populated profile — the "what the app looks like
    // after months of use" showcase. Large history window so the Month
    // tab of Routine Compare, Habit Reports charts, and the streak/XP
    // views all have rich material.
    "morning-consistent": {
      accentColor: "#ea580c",
      aiTone: "encouraging",
      habitCounts: { morning: 6, afternoon: 5, evening: 5, avoid: 4 },
      goalCount: 5, todoCount: 10, dayCount: 42,
      archivedGoals: 3, archivedTodos: 6, journalEntries: 10, customQuotes: 4,
      rate: () => 0.88,
      morningHour: () => 6, xpBase: 1400, xpSpread: 400
    },
    // Mid-volume profile with a collapse pattern — enough history to
    // visibly show the slip in charts, enough breadth to surface the
    // "pieces you were keeping up with" contrast.
    "falling-off": {
      accentColor: "#d97706",
      aiTone: "tough-love",
      habitCounts: { morning: 4, afternoon: 4, evening: 4, avoid: 3 },
      goalCount: 4, todoCount: 9, dayCount: 35,
      archivedGoals: 2, archivedTodos: 5, journalEntries: 7, customQuotes: 3,
      rate: (d) => d <= 6 ? 0.28 : 0.88,
      morningHour: () => 7, xpBase: 620, xpSpread: 200
    },
    // Balanced, "typical engaged user" profile.
    "steady-average": {
      accentColor: "#0ea5e9",
      aiTone: "neutral",
      habitCounts: { morning: 5, afternoon: 4, evening: 4, avoid: 3 },
      goalCount: 4, todoCount: 8, dayCount: 28,
      archivedGoals: 2, archivedTodos: 4, journalEntries: 6, customQuotes: 3,
      rate: () => 0.68,
      morningHour: () => 7, xpBase: 540, xpSpread: 180
    },
    // Smallest profile — but still meaningfully populated (a new user
    // who's been active for ~3 weeks), so every page has SOMETHING to
    // inspect without overwhelming the "just started" framing.
    "brand-new": {
      accentColor: "#9333ea",
      aiTone: "encouraging",
      habitCounts: { morning: 3, afternoon: 3, evening: 3, avoid: 2 },
      goalCount: 2, todoCount: 5, dayCount: 21,
      archivedGoals: 1, archivedTodos: 2, journalEntries: 4, customQuotes: 2,
      rate: (d) => d <= 10 ? 0.55 : 0,
      morningHour: () => 8, xpBase: 160, xpSpread: 80
    }
  };
  // Small RNG helpers, scoped to the demo code.
  const demoRandInt = (min, max) => min + Math.floor(Math.random() * (max - min + 1));
  const demoPad = (n) => String(n).padStart(2, "0");
  const demoPickN = (arr, n) => {
    const s = arr.slice();
    // Fisher-Yates on a copy
    for (let i = s.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [s[i], s[j]] = [s[j], s[i]];
    }
    return s.slice(0, Math.min(n, s.length));
  };
  const demoPickOne = (arr) => arr[Math.floor(Math.random() * arr.length)];
  // Build a fresh full Firestore doc for the persona, with randomized
  // habits / goals / todos + 2 weeks of completion history matching the
  // persona's shape. `_seedAccent` is stripped by signInAsDemoUser
  // before the doc is written; it's only there to ferry the accent
  // color from this pure function to the side-effect-ful sign-in path.
  const buildRandomDemoDoc = (recipe) => {
    const profile = DEMO_PROFILES[recipe];
    if (!profile) return null;
    const today = new Date(); today.setHours(12, 0, 0, 0);
    // Newest → oldest so index 0 is "today".
    const days = Array.from({ length: profile.dayCount }, (_, i) => {
      const d = new Date(today); d.setDate(today.getDate() - i); return dk(d);
    });
    // ── Habits ──
    // Frequency variety matters: if every habit were "daily", the
    // Routine Compare view's "Differs by weekday" bucket would always
    // be empty. Roughly ~25% get a non-daily cadence so the month +
    // week tabs actually have contrast to show.
    let habitId = Date.now();
    let order = 0;
    const habits = [];
    for (const section of ["morning", "afternoon", "evening", "avoid"]) {
      const n = profile.habitCounts[section] || 0;
      for (const p of demoPickN(DEMO_HABIT_POOL[section], n)) {
        // Avoid-section stays daily — "no phone before bed" on only
        // some weekdays wouldn't read right. For the others, sprinkle
        // weekday-subset and weekly cadences.
        let frequency = { type: "daily", days: [], day: null, monthDay: 1, month: 0 };
        if (section !== "avoid") {
          const roll = Math.random();
          if (roll < 0.18) {
            // Weekday-subset (e.g. Mon/Wed/Fri gym split).
            const subset = demoPickN([1, 2, 3, 4, 5], 2 + demoRandInt(0, 2));
            frequency = { type: "weekdays", days: subset.sort((a, b) => a - b), day: null, monthDay: 1, month: 0 };
          } else if (roll < 0.28) {
            // Weekly on a specific weekday (e.g. Sunday long-run).
            frequency = { type: "weekly", days: [], day: demoRandInt(0, 6), monthDay: 1, month: 0 };
          }
        }
        habits.push({
          id: habitId++,
          text: p.text, section, type: p.type, importance: p.importance,
          frequency,
          completions: {}, completionTimes: {}, completionUnits: {},
          notes: null, duration: null, goalId: null, location: "both",
          icon: null, startDate: null,
          target: p.target || null, unitLabel: p.unitLabel || null, increment: p.increment || null,
          _order: order++
        });
      }
    }
    // ── Goals ──
    // Pick enough goals for BOTH the active list and the archive in
    // one shuffle so no goal is duplicated across the two buckets.
    const archivedGoalCount = profile.archivedGoals || 0;
    const goalShuffle = demoPickN(DEMO_GOAL_POOL, profile.goalCount + archivedGoalCount);
    const goals = goalShuffle.slice(0, profile.goalCount).map((g, i) => ({
      id: habitId + 100 + i,
      text: g.text, type: g.type, smart: g.smart,
      completed: false, _order: i
    }));
    // Link every habit whose roll hits 60% — but FORCE each goal to
    // have at least one habit linked so the "link-per-goal" achievement
    // has a fair path to unlock and the rollups aren't empty.
    if (goals.length > 0) {
      for (const h of habits) {
        if (Math.random() < 0.6) h.goalId = demoPickOne(goals).id;
      }
      // Ensure at least one habit per goal.
      const hasHabit = new Set(habits.filter(h => h.goalId != null).map(h => h.goalId));
      for (const g of goals) {
        if (hasHabit.has(g.id)) continue;
        const candidate = habits[demoRandInt(0, habits.length - 1)];
        if (candidate) candidate.goalId = g.id;
      }
    }
    // ── Completions ──
    // Respect each habit's frequency so schedule-vs-completion lines
    // up (otherwise a "weekly" Sunday habit would have Mon-Fri done
    // marks, which is nonsensical).
    const dayOfWeek = (iso) => { const [y, m, d] = iso.split("-").map(Number); return new Date(y, m - 1, d).getDay(); };
    const mH = profile.morningHour();
    for (const h of habits) {
      for (let d = 0; d < days.length; d++) {
        const k = days[d];
        const dow = dayOfWeek(k);
        const fq = h.frequency || {};
        const eligible =
          fq.type === "weekdays" ? (fq.days || []).includes(dow) :
          fq.type === "weekly"   ? (fq.day == null ? 1 : fq.day) === dow :
          true; // daily
        if (!eligible) continue;
        if (Math.random() >= profile.rate(d)) continue;
        let hr;
        if (h.section === "morning") hr = mH + demoRandInt(0, 2);
        else if (h.section === "afternoon") hr = 12 + demoRandInt(0, 5);
        else if (h.section === "evening") hr = 18 + demoRandInt(0, 4);
        else hr = 20 + demoRandInt(0, 3); // avoid — bedtime-ish
        h.completions[k] = "done";
        h.completionTimes[k] = demoPad(hr) + ":" + demoPad(demoRandInt(0, 55));
        if (h.target) {
          // Hit target ±1 increment most days, occasionally under.
          const jitter = (h.increment || 1);
          const miss = Math.random() < 0.25;
          const v = miss ? Math.max(jitter, h.target - jitter * demoRandInt(1, 2))
                         : h.target + (Math.random() < 0.3 ? jitter : 0);
          h.completionUnits[k] = Math.max(jitter, Math.round(v));
        }
      }
    }
    // ── Todos ──
    // Over-sample from the pool so we can split into active + archive
    // (archived todos live in data.archive with a done:true flag).
    const archivedTodoCount = profile.archivedTodos || 0;
    const todoShuffle = demoPickN(DEMO_TODO_POOL, profile.todoCount + archivedTodoCount);
    const todos = todoShuffle.slice(0, profile.todoCount).map((t, i) => ({
      id: habitId + 200 + i,
      text: t.text,
      done: Math.random() < 0.2,
      dueDate: t.dueIn ? dk(new Date(today.getTime() + t.dueIn * 86400000)) : "",
      goalId: goals.length > 0 && Math.random() < 0.35 ? demoPickOne(goals).id : null,
      notes: "",
      _order: i
    }));
    // ── Archive (completed goals + completed todos) ──
    // Completed goals land in goalArchive with archivedAt + completedDate
    // so Goal History renders entries with real dates. completedDate
    // uses a random day within the persona's history window.
    const goalArchive = goalShuffle.slice(profile.goalCount).map((g, i) => {
      const ageDays = demoRandInt(2, Math.max(3, profile.dayCount - 1));
      const completedAt = new Date(today.getTime() - ageDays * 86400000);
      return {
        id: habitId + 300 + i,
        text: g.text, type: g.type, smart: g.smart,
        completed: true,
        archivedAt: completedAt.toISOString(),
        completedDate: dk(completedAt),
        _order: i
      };
    });
    // Archived (completed) todos feed the "Completed (N)" section on
    // the Tasks tab and the history-type flows.
    const archive = todoShuffle.slice(profile.todoCount).map((t, i) => {
      const ageDays = demoRandInt(1, Math.max(2, Math.floor(profile.dayCount / 2)));
      const archivedAt = new Date(today.getTime() - ageDays * 86400000);
      return {
        id: habitId + 400 + i,
        text: t.text,
        done: true,
        dueDate: "",
        goalId: null,
        notes: "",
        archivedAt: archivedAt.toISOString(),
        _order: i
      };
    });
    // ── Journal entries ──
    // Backdate across the history window so the calendar + Inspiration
    // views show entries scattered over time instead of everything

  // iCalendar (.ics) export. Every active habit becomes a recurring

  //
  // Time-of-day mapping (since habits don't carry a clock-time field):
  //   morning   → starts 6:00, then each subsequent morning habit
  //               starts where the previous one ended (sequential
  //               stacking by duration).
  //   afternoon → starts 12:00, same stacking rule.
  //   evening   → starts 18:00, same stacking rule.
  //   all-day   → all-day VEVENT (VALUE=DATE), no clock time.
  //   avoid     → skipped — calendar reminders to NOT do something
  //               are noise the user didn't ask for.
  //
  // Recurrence (RRULE) derives directly from habit.frequency:
  //   daily      → FREQ=DAILY
  //   weekdays   → FREQ=WEEKLY;BYDAY=MO,WE,FR…
  //   weekly     → FREQ=WEEKLY;BYDAY=<one day>
  //   monthly    → FREQ=MONTHLY;BYMONTHDAY=<n>
  //   quarterly  → FREQ=MONTHLY;INTERVAL=3;BYMONTHDAY=<n>
  //   annual     → FREQ=YEARLY;BYMONTH=<m>;BYMONTHDAY=<n>
  //
  // DTSTART is aligned to the first date that matches the RRULE so
  // calendar apps (Apple in particular) anchor the recurrence
  // correctly. Each event also carries a 5-minute reminder VALARM for
  // timed events, or a 0-minute morning-of alarm for all-day events.
  const exportHabitsICS = () => {
    // Skip avoid habits AND all-day "Daily Completion" habits — neither
    // sits on a clock-time slot, and their inclusion in a time-of-day
    // calendar export muddied the daily schedule. The Calendar tab
    // applies the same filter so what the user sees in the app
    // matches what gets exported.
    const habits = (data.habits || []).filter(h =>
      h && h.section !== "avoid" && h.section !== "all-day"

      alert("No timed habits to export. Add a Morning/Afternoon/Evening habit first.");
      return;
    }
    const tzid = (() => {
      try { return Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"; }
      catch (e) { return "UTC"; }
    })();
    // Section anchors come from the user's configured timeRanges
    // (or DEFAULT_TIME_RANGES). morning.start = 6, afternoon.start
    // = 12, evening.start = 18 by default; if the user customized
    // them on the Profile page, the export honors that.
    const ranges = getTimeRanges(data);
    const SECTION_START = {
      morning:   (ranges.morning   && ranges.morning.start   != null ? ranges.morning.start   : 6)  * 60,
      afternoon: (ranges.afternoon && ranges.afternoon.start != null ? ranges.afternoon.start : 12) * 60,
      evening:   (ranges.evening   && ranges.evening.start   != null ? ranges.evening.start   : 18) * 60

    const pad = n => String(n).padStart(2, "0");

      .replace(/\\/g, "\\\\")
      .replace(/;/g, "\\;")
      .replace(/,/g, "\\,")
      .replace(/\r?\n/g, "\\n");

      d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate())
      + "T" + pad(d.getHours()) + pad(d.getMinutes()) + "00";

      d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
    const utcStamp = d => {
      const z = new Date(d.getTime());
      return z.getUTCFullYear() + pad(z.getUTCMonth() + 1) + pad(z.getUTCDate())
        + "T" + pad(z.getUTCHours()) + pad(z.getUTCMinutes()) + pad(z.getUTCSeconds()) + "Z";
    };
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    // First date matching the RRULE — calendar apps key off this.
    const firstOccurrence = freq => {
      if (!freq || freq.type === "daily") return new Date(today);
      if (freq.type === "weekdays" || freq.type === "weekly") {
        const targets = freq.type === "weekdays"
          ? (Array.isArray(freq.days) ? freq.days : [])
          : (typeof freq.day === "number" ? [freq.day] : []);
        if (!targets.length) return new Date(today);
        for (let i = 0; i < 14; i++) {
          const c = new Date(today);
          c.setDate(today.getDate() + i);
          if (targets.includes(c.getDay())) return c;
        }
        return new Date(today);

      if (freq.type === "monthly") {
        const md = freq.monthDay || 1;
        const c = new Date(today.getFullYear(), today.getMonth(), md);
        if (c < today) c.setMonth(c.getMonth() + 1);
        return c;
      }
      if (freq.type === "quarterly") {
        const md = freq.monthDay || 1;
        const m  = typeof freq.month === "number" ? freq.month : today.getMonth();
        let c = new Date(today.getFullYear(), m, md);
        while (c < today) c.setMonth(c.getMonth() + 3);
        return c;
      }
      if (freq.type === "annual") {
        const md = freq.monthDay || 1;
        const m  = typeof freq.month === "number" ? freq.month : 0;
        let c = new Date(today.getFullYear(), m, md);
        if (c < today) c = new Date(today.getFullYear() + 1, m, md);

        const days = (freq.days || []).map(d => DOW_ICS[d]).filter(Boolean).join(",");
        return days ? "FREQ=WEEKLY;BYDAY=" + days : "FREQ=DAILY";

        return typeof freq.day === "number"

      if (freq.type === "quarterly") return "FREQ=MONTHLY;INTERVAL=3;BYMONTHDAY=" + (freq.monthDay || 1);
      if (freq.type === "annual")    return "FREQ=YEARLY;BYMONTH=" + ((freq.month || 0) + 1) + ";BYMONTHDAY=" + (freq.monthDay || 1);

    const sortedHabits = habits.slice().sort((a, b) => {

      const dur = Math.max(5, parseInt(h.duration, 10) || 30);

      const anchor = SECTION_START[sec] != null ? SECTION_START[sec] : 12 * 60;

      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Verrocchio//Habits//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "X-WR-CALNAME:Verrocchio Habits",
      "X-WR-TIMEZONE:" + tzid

    // calendar apps surface this as a flag/icon on the event.
    const priorityFor = imp => imp === "Non-Negotiable" ? 1

      const first = firstOccurrence(freq);
      const uid = (h.id || ("h-" + Math.random().toString(36).slice(2, 10))) + "@verrocchio.app";
      const summary = escapeICS(h.text || "Habit");
      const descParts = [];
      if (h.importance) descParts.push(h.importance);
      if (h.type)       descParts.push(h.type);
      if (h.duration)   descParts.push(h.duration + " min");
      const description = escapeICS(descParts.join(" · "));
      // CATEGORIES tags the event so calendar apps can filter or
      // colour-code by area-of-life and importance tier.
      const categories = [];
      if (h.type)       categories.push(h.type);
      if (h.importance) categories.push(h.importance);

      lines.push("UID:" + uid);
      lines.push("DTSTAMP:" + dtstamp);

        // upstream. So every event takes the same DTSTART/DTEND form.
        const start = new Date(first);
        start.setHours(0, 0, 0, 0);
        start.setMinutes(ht.startMin);
        const end = new Date(start.getTime() + ht.durationMin * 60000);

        lines.push("DTEND;TZID="   + tzid + ":" + localStamp(end));

        lines.push("ACTION:DISPLAY");
        lines.push("DESCRIPTION:" + summary);
        lines.push("TRIGGER:-PT5M");
        lines.push("END:VALARM");

    lines.push("END:VCALENDAR");

    const blob = new Blob([lines.join("\r\n") + "\r\n"], { type: "text/calendar;charset=utf-8" });

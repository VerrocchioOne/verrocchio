  const [confirmDeleteAcct, setConfirmDeleteAcct] = useState(false);

  // ── Feature-access tracking effects ──
  // Positioned AFTER `tab`, `showProfile`, `profileSection` are declared
  // to avoid the TDZ error that fires when these effects' dependency
  // arrays are evaluated during the component body's top-down pass.
  // Tab-visit instrumentation: when the user switches tabs, record the
  // corresponding feature. This is the cheap path — every tab maps to
  // one feature id and the effect fires exactly once per navigation.
  useEffect(() => {
    const map = { brief: "home.view", habits: "habits.view", goals: "goals.view", todos: "todos.view", reflect: "reflection.view" };
    if (map[tab]) touchFeature(map[tab]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [tab]);
  // Profile-open instrumentation: separate effect since Profile is a
  // modal overlay (showProfile), not a tab.
  useEffect(() => {
    if (showProfile) touchFeature("profile.view");
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [showProfile]);
  // App Settings panel view (inside Profile).
  useEffect(() => {
    if (showProfile && profileSection === "settings") touchFeature("settings.view");
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [showProfile, profileSection]);
  // Travel-day instrumentation: watch travelDays.length and touch the
  // feature whenever it grows. Keeps the "mark a travel day" check
  // correct regardless of which of the several calendar entry points
  // fired the write. `travelCountRef` is declared near touchFeature.
  useEffect(() => {
    const len = (data && data.travelDays && data.travelDays.length) || 0;
    const prev = travelCountRef.current;
    if (prev != null && len > prev) touchFeature("travel.mark");
    travelCountRef.current = len;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.travelDays && data.travelDays.length]);

  /* GUIDED TOUR — Appcues-style first-login walkthrough. `tourStep` is
     declared earlier in this function (just above the shake-to-exit
     useEffect) so its dependency array can read it without a TDZ.
     0 when inactive, 1..TOUR_STEPS.length when showing that step. Auto-
     starts once the user has cleared the splash + onboarding; persists
     the "don't nag me again" decision in localStorage. Users can replay
     from App Settings at any time. */
  const [tourDone, setTourDone] = useState(() => localStorage.getItem("v-tour-done") === "1");
  // Minimize-to-corner affordance. When true the full tooltip collapses
  // to a small floating pill in the opposite corner of the spotlighted
  // element so the user can freely interact with the page. Clicking the
  // pill restores the full tooltip. Always resets to false on step
  // change so each new step starts with the full card visible — a user
  // who minimized step 2 shouldn't silently land on step 3 minimized.
  const [tourMinimized, setTourMinimized] = useState(false);
  // Tour/demo control surfaces. `confirmExitDemo` drives a two-
  // phase modal: phase 1 asks the user to confirm leaving demo
  // mode; phase 2 shows them where the Replay Tour control lives
  // before actually running exitDemo(). The hint is shown in-
  // modal (not as a toast after exit) because exitDemo() kicks an
  // unauthenticated user straight to the login screen, where a
  // post-exit toast would feel orphaned and out of context.
  //
  // State values: null = modal closed, "confirm" = phase 1,
  // "hint" = phase 2 (replay location).
  const [confirmExitDemo, setConfirmExitDemo] = useState(null);
  // advance() / goBack() are defined inside renderTour (they close over
  // the current step/gate/form state). Kept as component-scoped refs so
  // any future programmatic nav hook (autoAdvance, keyboard shortcuts,
  // etc.) can fire the latest versions without re-binding. The former
  // document-level swipe listener was removed — the tour is entirely
  // button-driven now.
  const tourAdvanceRef = useRef(null);
  const tourGoBackRef = useRef(null);
  // Timers kept alive across the auto-scroll-target-into-view effect
  // so the cleanup can clear them on a rapid step change.
  const tourScrollTimers = useRef([]);

  /* CONFETTI on first goal + first habit.
     Refs seed to -1 so the first render (which may land with goals
     already loaded from Firestore / localStorage) is treated as "seed
     only" and doesn't fire a burst. A legitimate 0 → 1 transition in
     a subsequent render — the user adding their first-ever goal —
     does fire, once. `celebratedFirstGoal` / `celebratedFirstHabit`
     on the data doc guard against a second fire across sessions or
     if the user deletes and re-adds later. */
  const prevGoalsCountRef = useRef(-1);
  const prevHabitsCountRef = useRef(-1);

  /* APP SETTINGS
     - settingsMode: "default" vs "custom". In default, accent is the
       Verrocchio green and all category/importance/section edits are
       ignored. In custom, the user controls accent + can add custom
       categories / importance levels / time-of-day groupings.
     - darkMode is independent of settingsMode (works in both).
     - accentColor only takes effect when settingsMode === "custom".
     All three persist to localStorage so the choice survives reloads
     even before data syncs from Firestore. */
  const [settingsMode, setSettingsMode] = useState(() => localStorage.getItem("v-settings-mode") || "default");
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem("v-dark-mode") === "1");
  const [accentColor, setAccentColor] = useState(() => localStorage.getItem("v-accent-color") || "#2d5a2d");
  /* Staged-form state for the "Add Importance Level" and
     "Add Time-of-Day Group" mini-forms inside App Settings. */
  const [newImpName, setNewImpName] = useState("");
  const [newImpColor, setNewImpColor] = useState("#6366f1");
  const [newSecName, setNewSecName] = useState("");
  const [newSecIcon, setNewSecIcon] = useState("⭐");
  const [newSecColor, setNewSecColor] = useState("#6366f1");
  /* Tracks which default row is currently expanded to show its
     description. Keyed as `${list}:${value}` (e.g. "cat:Physical").
     Only one row per list stays expanded at a time. */
  const [expandedDefault, setExpandedDefault] = useState({});

  /* Achievements modal — opened by long-pressing the XP/Level bar
     in the header. Closes on backdrop tap or × button. */
  const [showAchievements, setShowAchievements] = useState(false);
  /* XP chart modal — opened by TAPPING the XP bar (short press).
     Long press still opens the achievements shelf; the existing
     press-timer ref suppresses the click after a hold. `xpChartGrain`
     remembers the chosen granularity across opens within the session
     so a user who prefers week-columns gets week-columns next time
     without re-tapping the toggle. */
  // Calendar tab state — view mode and the focal date the grid /
  // list pivots around. The view toggle (day/week/month) lives at
  // the top of the tab; calendarFocus is the date the user is
  // currently inspecting.
  const [calendarView, setCalendarView] = useState("day");
  const [calendarFocus, setCalendarFocus] = useState(() => dk(new Date()));
  const [showXpChart, setShowXpChart] = useState(false);
  const [xpChartGrain, setXpChartGrain] = useState("day"); // "day" | "week" | "month"
  // When the user taps a column on the XP chart, store the bar
  // object so we can render a per-habit breakdown below the chart
  // for that specific window. null = no bar selected.
  const [selectedXpBar, setSelectedXpBar] = useState(null);
  const levelHoldTimerRef = useRef(null);
  const levelPressStartRef = useRef(false);
  // Set true for one tick after the long-press handler fires so the
  // onClick path (which would otherwise ALSO run and open the XP
  // chart) bails out. Reset in beginLevelPress for the next gesture.
  const levelLongPressFiredRef = useRef(false);
  const beginLevelPress = () => {
    levelPressStartRef.current = true;
    levelLongPressFiredRef.current = false;
    if (levelHoldTimerRef.current) clearTimeout(levelHoldTimerRef.current);
    levelHoldTimerRef.current = setTimeout(() => {
      if (levelPressStartRef.current) {
        setShowAchievements(true);
        levelLongPressFiredRef.current = true;
        levelPressStartRef.current = false; // suppress the subsequent click
      }
    }, 450);
  };
  const cancelLevelPress = () => {
    if (levelHoldTimerRef.current) clearTimeout(levelHoldTimerRef.current);
    levelHoldTimerRef.current = null;
    levelPressStartRef.current = false;
  };

  // Apply dark mode + accent to <body> whenever the toggles change.
  // Pre-app screens (splash loading, login, onboarding) stay on the
  // canonical Verrocchio light theme so brand identity is stable on
  // every first-launch and every shared screenshot — dark mode and
  // custom accents only turn on once the user is actually inside
  // the app shell. localStorage is still written unconditionally so
  // the toggle state is preserved across the splash.
  //
  // Demo mode is also locked to the canonical light theme + green
  // accent: demo is a showroom, and it should always look like the
  // out-of-the-box Verrocchio regardless of the signed-in user's
  // personal customization.
  const inPreApp = !hasSeenWelcome
    || (authUser === null && !demoMode)
    || !(data && data.onboardingComplete);
  const themeLocked = inPreApp || demoMode;
  useEffect(() => {
    document.body.classList.toggle("dark", !!darkMode && !themeLocked);
    localStorage.setItem("v-dark-mode", darkMode ? "1" : "0");
  }, [darkMode, themeLocked]);
  useEffect(() => {
    const isCustom = settingsMode === "custom" && !themeLocked;
    document.body.classList.toggle("accent-custom", isCustom);
    document.documentElement.style.setProperty("--accent", isCustom ? accentColor : "#2d5a2d");
    localStorage.setItem("v-settings-mode", settingsMode);
    localStorage.setItem("v-accent-color", accentColor);
  }, [settingsMode, accentColor, themeLocked]);

  // Cross-device tour-done sync: once the user's data doc loads, pull
  // data.tourDone into local state so a fresh browser / device doesn't
  // re-fire the tour on a user who already dismissed it elsewhere.
  // Device-local "v-tour-done" localStorage is still the write-back
  // path (see finishTour) — this just makes the device PICK UP what's
  // on the doc. Never flips tourDone back to false from data; only
  // ever promotes false→true. Demo mode is skipped so the demo always
  // runs the tour regardless of the replaying real account's state.
  useEffect(() => {
    if (demoMode) return;
    if (!data || !data.tourDone) return;
    if (tourDone) return;
    setTourDone(true);
    try { localStorage.setItem("v-tour-done", "1"); } catch (e) {}
  }, [data && data.tourDone, demoMode, tourDone]);

  // Auto-start the guided tour once the user is past onboarding and
  // hasn't seen it before. demoMode deliberately runs the tour too:
  // the whole point of demo mode is to preview what a brand-new user
  // sees, and the tour IS part of that experience. Placed above all
  // the conditional early-returns for onboarding / auth screens so
  // React's hook order stays stable across renders.
  //
  // Returning-user guard: if ANY signal shows prior use of the app
  // (goals, habits, todos, todo archive, journal entries, custom
  // quotes, earned XP, or >1 day-visits), we treat the user as a
  // returning user and do NOT auto-fire the tour. Previously this
  // only checked goals+habits — an account that had only logged
  // journal entries or completed some todos would still get the
  // goal-form walkthrough, which is the "old tour model" users were
  // complaining about. They can still replay the tour explicitly
  // from App Settings → Guided Tour. This is a belt on top of
  // `tourDone` for cases where tourDone hasn't synced yet across
  // devices but the Firestore doc already shows activity.
  const hasAnyData = !demoMode && !!(data && (
    (data.goals && data.goals.length) ||
    (data.habits && data.habits.length) ||
    (data.todos && data.todos.length) ||
    (data.archive && data.archive.length) ||
    (data.goalArchive && data.goalArchive.length) ||
    (data.journal && data.journal.length) ||
    ((data.quotes || []).some(q => q && q.custom)) ||
    ((data.dayVisits && data.dayVisits.length) || 0) > 1 ||
    (data.xp || 0) > 0
  ));
  // Persist tourDone the first time we see real activity. The stateless
  // hasAnyData guard in the auto-start effect bails per render, but a
  // fresh device or cleared cache can still queue the 1200ms timer in
  // the brief window between sign-in and Firestore hydration. Promoting
  // tourDone the moment any activity is observed permanently kills the
  // timer (its early `if (tourDone) return` wins) AND mirrors the
  // decision to localStorage + the cloud doc so the tour can't reappear
  // on another device. Demo mode is intentionally excluded — demo
  // always replays the tour as part of its preview-the-new-user role.
  useEffect(() => {
    if (demoMode) return;
    if (tourDone) return;
    if (!hasAnyData) return;
    setTourDone(true);
    try { localStorage.setItem("v-tour-done", "1"); } catch (e) {}
    if (data && !data.tourDone) {
      try { save({ ...data, tourDone: true }); } catch (e) {}
    }
  }, [hasAnyData, tourDone, demoMode]);
  // syncState lives here (instead of with the rest of the FIREBASE SYNC
  // block further down) because the auto-start tour effect's dependency
  // array reads it during render — declaring it later put it in the
  // temporal dead zone and crashed the app on first paint. The Firestore
  // load + save effects below all access it at runtime, so they are
  // unaffected by the move.
  const [syncState, setSyncState] = useState("loading"); // loading | synced | saving
  // Mirror save outcomes into the header date pill's manual flash.
  // Save() drives syncState through saving→synced. Whenever the flash
  // is "saving" and syncState lands on "synced", transition the flash
  // to match. The "Offline" terminal state is intentionally gone:
  // localStorage always succeeds, so the user's data is always safe,
  // and Firestore failures are logged silently rather than surfaced.
  useEffect(() => {
    if (manualSyncFlash !== "saving") return;
    if (syncState === "synced") setManualSyncFlash("synced");
  }, [syncState, manualSyncFlash]);
  useEffect(() => {
    if (manualSyncFlash !== "synced") return;
    const t = setTimeout(() => setManualSyncFlash(null), 2000);
    return () => clearTimeout(t);
  }, [manualSyncFlash]);
  useEffect(() => {
    if (tourDone) return;
    if (inPreApp) return;
    if (tourStep !== 0) return;
    if (hasAnyData) return;
    // Hard gate on Firestore reconciliation. `syncState` starts at
    // "loading" on every sign-in, flips to "synced" only after the
    // initial userDoc(uid).get() resolves. Before that flip `data` is
    // the blank default (DD) — which makes both `hasAnyData` and
    // `tourDone` read false even for a returning user whose cloud doc
    // has plenty of activity. Without this gate the 1200ms timer below
    // would fire inside that loading window and yank the account
    // straight into the tour. Deferring until "synced" lets the .get()
    // land, hydrates real data + tourDone, and the other guards above
    // take over naturally. "offline" is intentionally NOT a green light
    // here: if we can't reach Firestore we'd rather fall back to
    // whatever localStorage cached than misfire the tour.
    if (syncState !== "synced") return;
    // Defer a beat so the nav + render tree have landed in the DOM
    // before the tour tries to anchor to nav-button selectors. Longer
    // delay here (1200ms vs the old 400ms) gives Firestore a window to
    // hydrate data.tourDone first — otherwise a real user signing in
    // on a fresh device would see the tour briefly fire before the
    // cross-device sync effect above promotes tourDone.
    const t = setTimeout(() => {
      if (tourDone) return;
      // Re-check syncState at fire time: the effect cleanup runs when
      // any dep changes, but a sync flip from "synced" back to
      // "offline" (mid-timer network blip) won't clear the timer on
      // its own. Belt-and-braces read from the closure-captured value
      // is fine here — a flip to offline while the timer is pending
      // should abort the fire, not force it through.
      if (syncState !== "synced") return;
      setTourStep(1);
    }, 1200);
    return () => clearTimeout(t);
  }, [tourDone, inPreApp, tourStep, hasAnyData, syncState]);

  // Keyboard support for the guided tour: left/right arrows drive
  // Back/Next via the refs that renderTour keeps up to date. Lets
  // keyboard-only users walk through the tour (the rest of the app
  // still needs a broader keyboard-nav pass, but the tour is where
  // users get stuck first). Ignored when focus is inside a form
  // field so arrow keys don't fight with text-cursor motion.
  useEffect(() => {
    if (tourStep === 0) return;
    const isFormField = el => el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName);
    const onKey = e => {
      if (isFormField(document.activeElement)) return;
      if (e.key === "ArrowRight") {
        if (tourAdvanceRef.current) { e.preventDefault(); tourAdvanceRef.current(); }
      } else if (e.key === "ArrowLeft") {
        if (tourGoBackRef.current) { e.preventDefault(); tourGoBackRef.current(); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [tourStep]);

  // Tour ↔ goal-form sub-step bridge. The add-goal form now reveals
  // its fields one step at a time (name → area → SMART+save). When
  // the tour walks past a field, flip the form to the matching
  // sub-step so the selector it spotlights (goal-name / goal-area
  // / goal-smart / goal-save) is actually visible on screen. One-way
  // drive from tour → form; the form's Next button handles the
  // reverse direction inline.
  useEffect(() => {
    if (tourStep === 3) setGoalFormStep(0);
    else if (tourStep === 4) setGoalFormStep(1);
    else if (tourStep === 5 || tourStep === 6) setGoalFormStep(2);
  }, [tourStep]);

  /* Confetti — fire once the first time the user creates a goal or
     habit. Watches the length of each array and fires on the 0 → 1
     transition, guarded by a persisted flag on `data` so it never
     misfires twice (across sessions, across delete-all + re-add
     cycles, etc.). The -1 sentinel on the prev refs means the very
     first render — which may land with the arrays already populated
     from storage — is treated as seed-only and never fires. */
  useEffect(() => {
    const cur = (data && data.goals) ? data.goals.length : 0;
    const prev = prevGoalsCountRef.current;
    prevGoalsCountRef.current = cur;
    if (prev === -1) return; // seed on first render
    if (prev === 0 && cur >= 1 && !data.celebratedFirstGoal) {
      fireConfetti();
      save({ ...data, celebratedFirstGoal: true });
    }
  }, [data && data.goals && data.goals.length]);
  useEffect(() => {
    const cur = (data && data.habits) ? data.habits.length : 0;
    const prev = prevHabitsCountRef.current;
    prevHabitsCountRef.current = cur;
    if (prev === -1) return; // seed on first render
    if (prev === 0 && cur >= 1 && !data.celebratedFirstHabit) {
      fireConfetti();
      save({ ...data, celebratedFirstHabit: true });
    }
  }, [data && data.habits && data.habits.length]);
  // Seed the tour's form state from whatever is already saved on the
  // user's data doc when the tour first fires. Matters for the Replay
  // Tour flow (user ran the tour before, edited home/weekly review,
  // then replayed): the form controls should show their current values
  // rather than defaulting back to "" and Sunday 6pm and silently
  // overwriting saved data on Next. Runs once, at the 0 → 1 transition.
  useEffect(() => {
    if (tourStep !== 1) return;
    if (data && typeof data.homeLocation === "string" && data.homeLocation) {
      setTourHome(data.homeLocation);
    }
    if (data && data.weeklyReview) {
      if (typeof data.weeklyReview.day === "number") setTourReviewDay(data.weeklyReview.day);
      if (typeof data.weeklyReview.hour === "number") setTourReviewHour(data.weeklyReview.hour);
    }
    // Intentionally [tourStep] only — don't re-seed if `data` changes
    // mid-tour (e.g. user edited weekly review on step 8 form) because
    // that would yank the value back to the saved snapshot.
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [tourStep]);

  // Auto-advance the centered "Let's show you around!" welcome step
  // onto the [+] spotlight after a short beat. Previously the user had
  // to swipe before the + button ever got highlighted, which made the
  // tour feel like it was waiting on something obscure. Now the intro
  // appears, gives the user a second to read it, then the spotlight on
  // the + button lands on its own.
  useEffect(() => {
    if (tourStep !== 1) return;
    const t = setTimeout(() => {
      // Only advance if still on step 1 — if the user already swiped
      // forward (fast reader) don't bump them to step 3.
      setTourStep(s => s === 1 ? 2 : s);
    }, 1600);
    return () => clearTimeout(t);
  }, [tourStep]);
  /* Path A spotlight — class-based. Instead of reading the target's
     rect every render and painting a separate overlay ring + dim
     panels around it (fragile: stale rects on scroll, missing rects
     on late mounts, nested-scroll-container edge cases), we toggle
     two CSS classes directly on the target element:
       • .tour-target           — the primary focus for this step.
                                  Lifts the element above a single
                                  full-screen dim, paints a pulsing
                                  green outline via box-shadow, and
                                  scrolls itself into view.
       • .tour-target-secondary — a dashed non-pulsing outline on the
                                  "you CAN go here next" target (e.g.
                                  the form's Next button once a name
                                  is typed). Only applied when the
                                  step's gate is passing so we don't
                                  highlight a disabled button.

     This effect runs on EVERY render (no dep array) so the secondary
     class flips on the moment the user types enough to pass the gate
     — the render that carries the new controlled-input value is the
     same render the effect runs in, and we re-read the gate fresh.

     The element keeps its own layout, so resize/scroll are handled
     for free by the browser. No refs, no re-measure timers, no rect
     math. Scroll-into-view lives in the separate [tourStep] effect
     below so a keystroke doesn't yank the viewport. */
  // Each new tour step starts non-minimized so the user always sees
  // the full card + dim on first landing. Explicit effect (rather than
  // inline at setTourStep call sites) so replays, back-swipes, and
  // autoAdvance jumps all get the same reset for free.
  useEffect(() => { setTourMinimized(false); }, [tourStep]);
  useEffect(() => {
    if (tourStep === 0) return undefined;
    // When minimized, the whole point is to let the user interact with
    // the page — skip the spotlight class-toggle + stacking-context
    // lift so the target isn't visually re-pinned over app chrome.
    // Flipping minimized → full re-runs this effect (render cycle),
    // which re-adds the class and re-lifts the stack.
    if (tourMinimized) return undefined;
    const step = TOUR_STEPS[tourStep - 1];
    if (!step) return undefined;
    const gateBlocked = typeof step.gate === "function" && !step.gate(data);
    let primaryEl = null;
    let secondaryEl = null;
    /* Stacking-context escape. Bumping the target to z-index 9999 only
       works if its nearest positioned ancestor with a z-index doesn't
       TRAP it inside a lower stacking context. Problem targets here:
         • Sticky header  (<div className="lg" style={{position:"sticky",
           zIndex:50}}>)  — holds date / calendar / travel / xp /
           streak / profile buttons.
         • Fixed bottom nav (<div className="lg" style={{position:"fixed",
           zIndex:100}}>)   — holds Home / Goals / Habits / Reflect.
       A child painted inside either of these stacking contexts cannot
       rise above the z=9998 dim overlay no matter its own z-index —
       the dim covers it and the spotlight ring vanishes. So on every
       class toggle we walk up the parent chain, find any ancestor that
       establishes a stacking context below 10000, stash its inline
       z-index / position on dataset, and lift it above the dim. Cleanup
       restores the originals so the normal app chrome sits back at its
       proper paint order once the step changes. */
    const STACKING_POS = { fixed: 1, sticky: 1, absolute: 1, relative: 1 };
    const liftedAncestors = [];
    const liftStack = (el) => {
      if (!el) return;
      let p = el.parentElement;
      while (p && p !== document.body && p !== document.documentElement) {
        const cs = window.getComputedStyle(p);
        const pos = cs.position;
        const zi = cs.zIndex;
        // Only treat ancestors that ACTUALLY create a stacking context
        // as traps. Positioned + numeric z-index is the common case; we
        // also catch transform / filter / will-change containers because
        // those create contexts regardless of position.
        const hasCtx =
          (STACKING_POS[pos] && zi !== "auto" && !isNaN(parseInt(zi, 10))) ||
          (cs.transform && cs.transform !== "none") ||
          (cs.filter && cs.filter !== "none") ||
          (cs.willChange && /transform|filter|opacity/.test(cs.willChange)) ||
          (parseFloat(cs.opacity) < 1);
        if (hasCtx) {
          // Only lift if the current paint level is actually below the
          // dim — lifting already-above-dim layers is pointless and risks
          // stacking issues with modals at higher z-indexes.
          const num = parseInt(zi, 10);
          if (isNaN(num) || num < 10000) {
            p.dataset.tourPrevZIndex = p.style.zIndex || "";
            p.dataset.tourPrevPosition = p.style.position || "";
            if (pos === "static") p.style.position = "relative";
            p.style.zIndex = "10000";
            liftedAncestors.push(p);
          }
        }
        p = p.parentElement;
      }
    };
    if (step.selector) {
      primaryEl = document.querySelector(step.selector);
      if (primaryEl) {
        primaryEl.classList.add("tour-target");
        liftStack(primaryEl);
      }
    }
    if (step.extraSelector && !gateBlocked) {
      secondaryEl = document.querySelector(step.extraSelector);
      if (secondaryEl && secondaryEl !== primaryEl) {
        secondaryEl.classList.add("tour-target-secondary");
        liftStack(secondaryEl);
      } else {
        secondaryEl = null;
      }
    }
    return () => {
      if (primaryEl) primaryEl.classList.remove("tour-target");
      if (secondaryEl) secondaryEl.classList.remove("tour-target-secondary");
      liftedAncestors.forEach(p => {
        p.style.zIndex = p.dataset.tourPrevZIndex || "";
        if (p.dataset.tourPrevPosition !== undefined) {
          p.style.position = p.dataset.tourPrevPosition;
        }
        delete p.dataset.tourPrevZIndex;
        delete p.dataset.tourPrevPosition;
      });
    };
  });

  /* Scroll the current tour target into view on step change.
     scrollIntoView is a no-op if the element is already in view, so
     there's no jitter when moving between adjacent steps on the same
     page. Retry cadence (rAF + 260ms + 560ms) covers tab transitions
     and lazy form mounts where the target isn't in the DOM on the
     first render after tourStep flips. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    const step = TOUR_STEPS[tourStep - 1];
    if (!step || !step.selector) return undefined;
    const block = step.pinBottom ? "start" : "center";
    const tryScroll = () => {
      const el = document.querySelector(step.selector);
      if (!el || typeof el.scrollIntoView !== "function") return;
      try {
        el.scrollIntoView({ block: block, inline: "nearest", behavior: "smooth" });
      } catch (_e) {
        // Safari <15.4 and some legacy browsers don't accept the options
        // object. Fall back to the boolean form — `true` aligns the top
        // of the element with the top of the scroll container, which is
        // the closest analogue to block:"start".
        el.scrollIntoView(step.pinBottom ? true : false);
      }
    };
    const raf = requestAnimationFrame(() => {
      tryScroll();
      const t1 = setTimeout(tryScroll, 260);
      const t2 = setTimeout(tryScroll, 560);
      tourScrollTimers.current = [t1, t2];
    });
    return () => {
      cancelAnimationFrame(raf);
      (tourScrollTimers.current || []).forEach(clearTimeout);
      tourScrollTimers.current = [];
    };
  }, [tourStep]);
  // Auto-switch the active tab as the tour advances. Any step can
  // declare a `tab` field in TOUR_STEPS and this effect flips setTab
  // to match, so the page the step describes is actually on screen
  // (not just hinted at by the bottom-nav icon). Header/centered
  // steps leave the tab alone.
  useEffect(() => {
    if (tourStep === 0) return;
    // TOUR_STEPS isn't declared yet at this line (it's below, in
    // render body) — so we read it lazily off the component's own
    // closure at effect time. Safe because the array is a module-level
    // constant shape with no state dependencies.
    const stepIdx = tourStep - 1;
    // Inline mini-mirror of TOUR_STEPS tabs to avoid a forward-ref
    // dependency. Update alongside TOUR_STEPS whenever tabs change.
    // Current shape (1-indexed):
    //   1        intro (no tab change)
    //   2-6      Goals walkthrough (tap +, name, area, SMART, save)
    //   7-14     Habits walkthrough (tap +, name, link, area, importance,
    //            timing, schedule, save)
    //   15       To-Dos
    //   16       Reflect
    //   17-24    header widgets / profile (no tab change)
    //   25       final "you're all set" (lands on brief)
    // Updated indices: steps 7 (goal showcase) and 16 (habit showcase)
    // are informational landings inserted AFTER the goal-save and
    // habit-save steps; they push the downstream tab mapping by 2.
    const TOUR_TAB_BY_STEP = {
      2: "goals", 3: "goals", 4: "goals", 5: "goals", 6: "goals", 7: "goals",
      8: "habits", 9: "habits", 10: "habits", 11: "habits", 12: "habits",
      13: "habits", 14: "habits", 15: "habits", 16: "habits",
      17: "todos", 18: "reflection", 27: "brief"
    };
    const wantTab = TOUR_TAB_BY_STEP[tourStep];
    if (wantTab && tab !== wantTab) setTab(wantTab);
    void stepIdx; // suppress unused warning in static analyzers
  }, [tourStep]);

  /* Gated-step [+] button bounce. We only animate the PRIMARY action
     target — the New-goal / New-habit [+] button — because it's the one
     step where the user might not realize the app is waiting on them.
     Once the form is open, the subsequent sub-steps (pick area, SMART,
     save) use the standard pulsing spotlight ring + arrow callout
     instead; physically wobbling each form field would read as visual
     noise rather than a "tap me" cue.

     Step indices track TOUR_STEPS:
       2  — "Let's start by adding a goal" → New-goal [+]
       6  — "Save your goal"               → Add-Goal button
       8  — "Now add a habit"               → New-habit [+]
       15 — "Save your habit"               → Add-Habit button
     Re-run key includes goals.length / habits.length so the bounce stops
     the instant the user creates the first goal / habit and the form
     un-mounts (otherwise the class would stay stamped on a stale DOM
     node if one ever came back via back-swipe). Steps 6/14 bounce the
     SAVE button itself — these are the "press the spotlighted save"
     gates that keep the user from swiping past without actually saving
     (U13); the pulsing spotlight ring alone was easy to read as
     decorative. */
  const goalsLen = (data && data.goals) ? data.goals.length : 0;
  const habitsLen = (data && data.habits) ? data.habits.length : 0;

    if (tourStep === 0) return undefined;
    const GATED = {
      2:  { sel: "button[aria-label='New goal']",  open: goalsLen  === 0 },
      6:  { sel: "[data-tour-id='goal-save']",     open: goalsLen  === 0 },
      8:  { sel: "button[aria-label='New habit']", open: habitsLen === 0 },
      15: { sel: "[data-tour-id='habit-save']",    open: habitsLen === 0 }
    };
    const info = GATED[tourStep];
    if (!info || !info.open) return undefined;
    const apply = () => {
      const el = document.querySelector(info.sel);
      if (el && !el.classList.contains("tour-target-bounce")) {
        el.classList.add("tour-target-bounce");
      }
    };
    apply();
    const t1 = setTimeout(apply, 80);
    const t2 = setTimeout(apply, 320);
    return () => {
      clearTimeout(t1);
      clearTimeout(t2);
      const el = document.querySelector(info.sel);
      if (el) el.classList.remove("tour-target-bounce");
    };
  }, [tourStep, goalsLen, habitsLen]);

  /* Tour navigation is button-driven (see Back/Next in the tooltip
     footer). The previous build tried swipe-anywhere-to-navigate and it
     kept tripping over embedded form inputs, modal overlays, and the
     inline goal/habit wizards — swipes that were meant as selection,
     scroll, or mis-taps would flip the tour step. Explicit buttons are
     discoverable, unambiguous, and work identically in the tour, the
     onboarding, and in the underlying forms themselves. The
     tourAdvanceRef / tourGoBackRef refs are still populated inside
     renderTour for any future programmatic nav (autoAdvance on gate
     pass uses setTourStep directly, not the refs), but no document-
     level listener reads from them. */

  /* Auto-advance + DOM gate re-evaluation.

     Two things this effect does:
       1. While the tour is on a gated step whose gate depends on DOM
          state (e.g. "is the goal form open?", "is the area-of-life
          dropdown populated?"), we listen for input/change events and
          DOM mutations so the render-driven gate check actually RUNS
          again when those things flip. Without this, renderTour only
          re-checks gates on resize/scroll/tourStep, and the tooltip
          would sit stale until the user happened to trigger one.
       2. When a step has `autoAdvance: true`, we advance as soon as
          its gate passes — no swipe needed. This is what makes the
          form walkthrough feel continuous: tap [+], form opens, the
          tooltip jumps to "Pick an area of life"; pick one, it jumps
          to "SMART details?"; etc. Steps without autoAdvance (pure
          informational ones like SMART) still require a manual swipe.

     The listeners are installed once per tour-step change, scoped to
     the entire document so they catch any form interaction anywhere.
     MutationObserver covers DOM additions (form appearing). The
     per-step effect means cleanup runs before the next step's apply,
     so we never accidentally double-advance. */
  useEffect(() => {
    if (tourStep === 0) return undefined;
    let cancelled = false;
    // Entry-point skip: if the step has a skipIf predicate and it
    // returns true against the current data snapshot (user already has
    // goals / habits), fast-forward past the whole walkthrough by
    // skipSteps positions. Runs once on step mount — guarded by the
    // same `s === tourStep` race check as autoAdvance below so a rapid
    // second scheduler can't double-advance.
    const step0 = TOUR_STEPS[tourStep - 1];
    if (step0 && typeof step0.skipIf === "function") {
      let shouldSkip = false;
      try { shouldSkip = !!step0.skipIf(data); } catch (_) { shouldSkip = false; }
      if (shouldSkip) {
        const jump = Math.max(1, step0.skipSteps || 1);
        setTourStep(s => (s === tourStep ? s + jump : s));
        return undefined;
      }
    }
    const check = () => {
      if (cancelled) return;
      const step = TOUR_STEPS[tourStep - 1];
      if (!step || !step.gate) return;
      if (step.autoAdvance !== true) return;
      // Pass `data` so gates that are data-based (goals.length > 0,
      // habits.length > 0) still work; DOM-based gates ignore the
      // argument and query the document directly.
      let passed = false;
      try { passed = !!step.gate(data); } catch (_) { passed = false; }
      if (passed) setTourStep(s => (s === tourStep ? s + 1 : s));
    };
    // Initial check — the gate might already be passing when the step
    // mounts (e.g. user back-swipes into a step they've already
    // satisfied). Skip a frame so this runs AFTER React has committed
    // the render for this step; otherwise we can advance past a step
    // the user hasn't actually seen.
    const initial = setTimeout(check, 120);
    const onTick = () => check();
    document.addEventListener("input",  onTick, { capture: true });
    document.addEventListener("change", onTick, { capture: true });
    document.addEventListener("click",  onTick, { capture: true });
    const mo = new MutationObserver(onTick);
    mo.observe(document.body, { childList: true, subtree: true });
    // Also re-check on resize/scroll ticks so we stay in sync with
    // the tour's own re-render triggers (already wired in a separate
    // effect; subscribing here keeps the two in step).
    const onR = () => check();
    window.addEventListener("resize", onR);
    window.addEventListener("scroll", onR, { capture: true, passive: true });
    return () => {
      cancelled = true;
      clearTimeout(initial);
      document.removeEventListener("input",  onTick, { capture: true });
      document.removeEventListener("change", onTick, { capture: true });
      document.removeEventListener("click",  onTick, { capture: true });
      window.removeEventListener("resize", onR);
      window.removeEventListener("scroll", onR, { capture: true });
      mo.disconnect();
    };
  }, [tourStep, goalsLen, habitsLen]);

      if (selected.length === 1 && selected[0] === val) setSelected([]);

  const [expandedPill, setExpandedPill] = useState(null);

  /* FIREBASE SYNC */
  // syncState is declared earlier (above the auto-start tour effect)
  // so its dependency array can read it without a TDZ.
  const saveTimerRef = useRef(null);
  const latestData = useRef(null);

  // Per-user localStorage key: prevents one device from leaking account
  // A's data into account B's session. Anonymous/legacy sessions (no uid)
  // fall back to the original key so existing single-user installs keep
  // their data on first load.
  const uid = authUser && authUser.uid ? authUser.uid : null;
  const lsKey = uid ? `${SK}-${uid}` : SK;

  // Load from Firestore whenever the signed-in user changes. Clears the
  // previous user's in-memory data first so we never flash account A's
  // habits inside account B's session. New users (no doc yet) start
  // from SEED state and will create their doc on first save.
  useEffect(() => {
    if (demoMode) return; // demo mode uses in-memory seed data only
    if (!uid) {
      // Signed out — wipe any previously loaded data so the next sign-in
      // can't see stale state. The login gate will keep us on the auth
      // screen until a user signs in.
      if (saveTimerRef.current) { clearTimeout(saveTimerRef.current); saveTimerRef.current = null; }
      latestData.current = null;
      try { setData(JSON.parse(JSON.stringify(DD))); } catch(e){}
      setSyncState("loading");
      return;
    }
    setSyncState("loading");
    // Prefer a local cached copy of *this* user's data for instant paint,
    // then reconcile with Firestore below.
    //
    // Critical: set `latestData.current` HERE (not just in the .get()
    // callback). Otherwise the realtime onSnapshot listener — which
    // attaches below and can fire immediately with whatever stale
    // snapshot Firestore's IndexedDB cache has — would see
    // latestData.current as null, compute localTs = 0, treat any cloud
    // value as "newer", and overwrite the freshly-loaded localStorage
    // state. With offline persistence enabled that cached snapshot is
    // often the last-seen-cloud from a previous session; on next-day
    // load the listener would silently roll the doc back. Seeding
    // latestData.current with the localStorage timestamp closes that
    // window so echo-detection compares against the right baseline.
    try {
      const r = localStorage.getItem(lsKey);
      if (r) {
        const d = JSON.parse(r);

        // predate the timestamp-echo logic. Without it the listener
        // sees localTs=0, treats any cached cloud snapshot as
        // "newer", and overwrites local state with stale data.
        if (typeof d._updatedAt !== "number") d._updatedAt = Date.now();
        setData(d);
        latestData.current = d;
      } else {
        // First time on this device for this user: start from the
        // blank default. Stamp _updatedAt = Date.now() so the
        // listener's echo-detection has a real baseline; otherwise
        // it'll see localTs=0 and adopt any stale Firestore-cached
        // snapshot that fires from IndexedDB before the .get()
        // callback below runs.
        const blank = JSON.parse(JSON.stringify(DD));
        blank._updatedAt = Date.now();
        setData(blank);
        latestData.current = blank;
      }

    // One-time legacy migration: the pre-multi-user build wrote to the
    // shared `users/main` doc and the unscoped `SK` localStorage key. On
    // the very first sign-in under the new code on a device that still
    // has that legacy data, promote it to the current user's scope so
    // the original owner doesn't lose their workspace. Guarded by the
    // "v-migrated" flag so only the first account to sign in here claims
    // it (subsequent accounts on the same browser get a fresh slate).
    const migrationFlag = "v-migrated";
    const alreadyMigrated = (() => { try { return !!localStorage.getItem(migrationFlag); } catch(e) { return true; } })();
    const legacyLocal = (() => { try { return localStorage.getItem(SK); } catch(e) { return null; } })();
    const userLocalExists = (() => { try { return !!localStorage.getItem(lsKey); } catch(e) { return false; } })();
    userDoc(uid).get().then(snap => {
      if (!snap.exists && !alreadyMigrated && !userLocalExists && legacyLocal) {
        // Copy legacy local cache into this user's per-user slot, then
        // write through to Firestore on the next save.
        try {
          localStorage.setItem(lsKey, legacyLocal);
          localStorage.setItem(migrationFlag, "1");
          const parsed = JSON.parse(legacyLocal);
          // Stamp _updatedAt so the realtime listener can correctly
          // echo-detect this migration write rather than seeing
          // remoteTs=0 and treating cached snapshots as newer.
          if (typeof parsed._updatedAt !== "number") parsed._updatedAt = Date.now();
          setData(parsed);
          latestData.current = parsed;
          userDoc(uid).set(sanitizeForFirestore(parsed)).catch(() => {});
        } catch (e) {}
        setSyncState("synced");
        return;
      }
      if (snap.exists) {
        const remote = hydrateCloudDoc(snap.data());
        const remoteTs = (remote && remote._updatedAt) || 0;
        // Compare against the localStorage snapshot. If THIS device made
        // changes that never reached Firestore (debounce dropped on
        // tab close, offline at the time, etc.), localStorage is newer
        // than cloud — adopting cloud wholesale would silently throw
        // those edits away. Push the local version up instead and keep
        // it as the in-memory state. If cloud is newer (typical
        // cross-device case: I edited on phone, now opening on
        // desktop), we adopt cloud as before.
        let localTs = 0;
        let localData = null;
        try {
          const r = localStorage.getItem(lsKey);
          if (r) {
            localData = JSON.parse(r);
            localTs = (localData && localData._updatedAt) || 0;
          }
        } catch (e) {}
        if (localTs > remoteTs && localData) {
          // Defensive: if local is somehow newer-shaped without a
          // valid _updatedAt, stamp one before pushing to cloud so
          // the doc Firestore receives carries a baseline timestamp.
          if (typeof localData._updatedAt !== "number") localData._updatedAt = localTs || Date.now();
          setData(localData);
          latestData.current = localData;
          try { userDoc(uid).set(sanitizeForFirestore(localData)).catch(() => {}); } catch (e) {}
        } else {
          setData(remote);
          latestData.current = remote;
          try { localStorage.setItem(lsKey, JSON.stringify(remote)); } catch (e) {}
        }
      } else {
        // Brand-new account — no doc yet. Leave `data` at the blank
        // default set above so the onboarding flow runs for them.
      }
      setSyncState("synced");
    }).catch(err => {
      // Initial fetch failed — usually a transient network blip on
      // page load. localStorage already has the user's data, so the
      // app is fully usable. Don't surface "Offline" — just log so
      // a real auth/permission issue is visible in DevTools.
      try { console.warn("[verrocchio load] initial fetch failed:", err && err.code, err && err.message); } catch (e) {}
      setSyncState("synced");
    });

    // Realtime listener: pick up writes from other tabs/devices.
    //
    // Echo detection: compare the snapshot's _updatedAt against the
    // timestamp of our most recent local save. If remote isn't newer,
    // it's almost certainly our own write coming back from Firestore
    // (or an older state we've already passed). This is the simple,
    // reliable approach the app used before the writer-ID rewrite.
    const unsubRealtime = userDoc(uid).onSnapshot(snap => {
      if (!snap.exists) return;
      const remote = snap.data();
      const localTs  = (latestData.current && latestData.current._updatedAt) || 0;
      const remoteTs = (remote && remote._updatedAt) || 0;
      if (remoteTs <= localTs) return; // own echo or stale
      const d = hydrateCloudDoc(remote);
      setData(d);
      latestData.current = d;
      try { localStorage.setItem(lsKey, JSON.stringify(d)); } catch (e) {}
      setSyncState("synced");
    }, err => {
      // Listener errors fire repeatedly during transient outages and
      // on every retry of the underlying gRPC stream. Surfacing them
      // as "Offline" in the UI was noise the user didn't want — and
      // the Firestore SDK reconnects on its own. Just log so genuine
      // auth/permission issues remain visible in DevTools.
      try { console.warn("[verrocchio listener] error:", err && err.code, err && err.message); } catch (e) {}
    });
    return () => { try { unsubRealtime(); } catch (e) {} };
  }, [uid, demoMode]);
  // Strip undefined-valued fields recursively before sending to
  // Firestore. Firestore .set() rejects ANY document containing an
  // undefined anywhere in the tree (with code "invalid-argument" or
  // "Function DocumentReference.set() called with invalid data.
  // Unsupported field value: undefined"). When that happens the
  // entire write fails — including from this device's localStorage to
  // the cloud — which is why doubles-taps were always landing on
  // Offline and why cross-device propagation could quietly stop.
  // JSON round-trip drops undefined values (kept null/0/"") and
  // collapses Date / Map / Set / class instances into plain objects.
  const sanitizeForFirestore = obj => {
    try { return JSON.parse(JSON.stringify(obj)); } catch (e) { return obj; }
  };
  // Save method. localStorage is treated as the source of truth for
  // the "Saved" indicator — if we wrote to it, the user's data is
  // safe on this device, full stop. Firestore is best-effort behind
  // the scenes: with offline persistence enabled, .set() resolves
  // from the local IndexedDB cache and queues the network attempt,
  // so it rarely rejects in normal operation. Failures get logged to
  // the console but DON'T flip the UI to "Offline" — that label was
  // misleading (data was always saved locally) and added noise on
  // every transient blip. A genuine Firestore problem still shows up
  // as a [verrocchio save] warning in DevTools.
  const save = useCallback(d => {
    const stamped = { ...d, _updatedAt: Date.now() };
    setData(stamped);
    latestData.current = stamped;
    if (demoMode) {
      setSaved(true);
      setTimeout(() => setSaved(false), 800);
      setSyncState("synced");
      return;
    }
    try {
      localStorage.setItem(lsKey, JSON.stringify(stamped));
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (e) {
      try { console.warn("[verrocchio save] localStorage failed:", e); } catch (_) {}
    }
    setSyncState("synced");
    if (!uid) return;
    userDoc(uid).set(sanitizeForFirestore(stamped)).catch(err => {
      try { console.warn("[verrocchio save] cloud write rejected:", err && err.code, err && err.message); } catch (e) {}
    });
  }, [demoMode, uid, lsKey]);

  // The visibility/pagehide flush and 30s heartbeat were removed:
  // both existed to compensate for the old 800ms save() debounce,
  // but save() now writes to Firestore immediately on every call.
  // The heartbeat could also race a more recent save from another
  // device — re-writing this device's stale snapshot would clobber
  // the cloud. Less code, fewer cross-device hiccups.

  // Wipe-all-data action. Truly empties every content array — does
  // NOT clone DD because DD's defaults include SEED_GOALS and
  // SEED_HABITS (the example "Run a half-marathon" / "Morning run"
  // entries). Cloning DD would leave the user staring at seed
  // examples instead of an empty workspace, which they read as
  // "delete didn't work". Build the blank doc from scratch with
  // empty arrays for every collection.
  //
  // Writes directly to localStorage + Firestore rather than going
  // through save() so a broken save path can't silently swallow the
  // wipe. Each step logs to [verrocchio wipe] for debug.
  const wipeAllData = async () => {
    try { console.log("[verrocchio wipe] start"); } catch (e) {}
    const blank = {
      goals: [],
      habits: [],
      todos: [],
      journal: [],
      quotes: [],
      archive: [],
      goalArchive: [],
      dailyRitual: {},
      upcomingDates: [],
      dayVisits: [],
      bestStreaks: {},
      achievementsUnlocked: {},
      customGoalTypes: [],
      customImportance: [],
      customSections: [],
      travelDays: [],
      homeLocation: "",
      xp: 0,
      onboardingComplete: true,
      tourDone: true,
      _updatedAt: Date.now()
    };
    // 1. In-memory React state.
    try { setData(blank); } catch (e) { try { console.warn("[verrocchio wipe] setData failed", e); } catch (_) {} }
    latestData.current = blank;
    // 2. Per-user localStorage.
    try {
      localStorage.setItem(lsKey, JSON.stringify(blank));
      try { console.log("[verrocchio wipe] localStorage cleared"); } catch (_) {}
    } catch (e) {
      try { console.warn("[verrocchio wipe] localStorage write failed", e); } catch (_) {}
    }
    // 3. Firestore (only when signed in and not in demo).
    if (!demoMode && uid) {
      try {
        await userDoc(uid).set(sanitizeForFirestore(blank));
        try { console.log("[verrocchio wipe] Firestore set succeeded"); } catch (_) {}
      } catch (e) {
        try { console.warn("[verrocchio wipe] Firestore set failed:", e && e.code, e && e.message, e); } catch (_) {}
      }
    }
    setConfirmWipe(null);
    setConfirmWipeTyped("");
    setShowProfile(false);
  };

  /* ── Day-visit tracking ──
     Append today's date key to data.dayVisits the first time the user
     opens the app each calendar day. Only runs once data is loaded and
     the user is actually in the app (not splash / login / onboarding /
     demo mode). Idempotent — if tk() is already the last entry, noop. */
  useEffect(() => {
    if (demoMode) return;
    if (!data || !data.onboardingComplete) return;
    const today = tk();
    const visits = Array.isArray(data.dayVisits) ? data.dayVisits : [];
    if (visits[visits.length - 1] === today) return; // fast path
    if (visits.indexOf(today) !== -1) return;
    save({ ...data, dayVisits: [...visits, today] });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.onboardingComplete, demoMode]);

  /* ── Achievement stat computation ──
     Derives the numbers that unlock tiers. Streak computation uses
     max(current streak across active habits, cached best-ever per
     habit), so streaks earned and later reset still count. */
  // Habit-pattern derivations that were previously recomputed on every
  // render of the Home tab. Both findCorrelations (O(N²·60)) and the
  // per-habit off-schedule scan (O(N·14)) only change when the
  // underlying habits array changes, so gating them on data.habits
  // identity skips the work on unrelated re-renders (tab switch,
  // scroll, etc.). The briefing prompt, the briefing fallback, and
  // the smartTips block all read these memoized values now.
  const memoedCorrelations = useMemo(() => findCorrelations((data && data.habits) || []), [data && data.habits]);
  const memoedOffSchedule  = useMemo(() => {
    const hs = (data && data.habits) || [];
    return hs.filter(h => h && h.section !== "avoid").map(h => detectOffSchedule(h)).filter(Boolean);
  }, [data && data.habits]);
  const achievementStats = useMemo(() => {
    const habitsArr = (data && data.habits) || [];
    const goalsArr = (data && data.goals) || [];
    const archiveArr = (data && data.goalArchive) || [];
    const currentBest = habitsArr.length ? Math.max(0, ...habitsArr.map(h => getStreak(h))) : 0;
    const cachedBest = Math.max(0, ...Object.values((data && data.bestStreaks) || {}), 0);
    // ── Derived goal-quality stats (feed the new Achiever/Builder
    // achievements). None of these introduce new storage — they're
    // pure functions of `data.goals` / `data.goalArchive` / `data.habits`.
    //
    //  smartGoals: count of goals (live OR archived) where every SMART
    //    field carries a non-empty value. `measurable` is the trickiest
    //    — the UI splits it into a number field + a unit field, so both
    //    must be filled for the M to count. The unlock check is
    //    `smartGoals >= 1` so filling SMART on a SINGLE goal triggers
    //    it; keeping it as a count (not a boolean) leaves room for
    //    future "3 SMART goals", "10 SMART goals" tiers without a
    //    schema change.
    //
    //  goalsCreated: total goals the user has ever created, = live +
    //    archived. Completing a goal moves it from data.goals to
    //    data.goalArchive; summing both means a 3-goals milestone
    //    stays unlocked even after the user checks them all off.
    //
    //  activeGoalsCleared: 1 at the "zero active, ≥1 archived" clean-
    //    slate moment, else 0. Boolean-as-threshold so the existing
    //    `statVal >= threshold` unlock check works unchanged.
    //
    //  habitPerGoal: 1 when there's at least one goal AND every live
    //    goal's id appears as a goalId on at least one habit. Zero-
    //    goal state stays locked so an empty workspace can't accidentally
    //    unlock "Laddered Up".
    const isSmartComplete = (g) => {
      const s = g && g.smart;
      if (!s) return false;
      const measurableOk = String(s.measurable || "").trim().length > 0
        && String(s.measurableUnit || "").trim().length > 0;
      return measurableOk
        && String(s.specific    || "").trim().length > 0
        && String(s.achievable  || "").trim().length > 0
        && String(s.relevant    || "").trim().length > 0
        && String(s.timebound   || "").trim().length > 0;
    };
    const smartGoals = goalsArr.filter(isSmartComplete).length
                     + archiveArr.filter(isSmartComplete).length;
    const goalsCreated = goalsArr.length + archiveArr.length;
    const activeGoalsCleared = (goalsArr.length === 0 && archiveArr.length >= 1) ? 1 : 0;
    const linkedGoalIds = new Set(habitsArr.map(h => h && h.goalId).filter(Boolean).map(String));
    const habitPerGoal = (goalsArr.length >= 1 && goalsArr.every(g => linkedGoalIds.has(String(g.id)))) ? 1 : 0;
    // featuresExplored: number of FEATURES entries the user has actually
    // touched at least once. touchFeature writes a timestamp into
    // data.featureAccess keyed by feature id — so the count of non-empty
    // entries is a direct read of "how much of the app has been
    // discovered". Drives the Explorer achievement tier set.
    const fa = (data && data.featureAccess) || {};
    const featuresExplored = Object.keys(fa).filter(k => !!fa[k]).length;
    return {
      visits: ((data && data.dayVisits) || []).length,
      bestStreak: Math.max(currentBest, cachedBest),
      goals: archiveArr.length,
      habitsActive: habitsArr.length,
      xp: (data && data.xp) || 0,
      smartGoals,
      goalsCreated,
      activeGoalsCleared,
      habitPerGoal,
      featuresExplored
    };
  }, [data]);

  // Removed: a one-shot effect that collapsed every section except
  // the current time-of-day one once data loaded. The user prefers
  // all sections expanded on first render, and the initial
  // `collapsedSections` state already starts every section open —
  // re-collapsing them after data arrives would override that.
  // didInitCollapseRef is kept declared in case any other effect
  // wants to gate on first-data-loaded later.

  /* ── Cache first-unlock timestamps ──
     Whenever stats cross a threshold for the first time, record the
     moment in data.achievementsUnlocked so the UI can show "Unlocked
     on Apr 21, 2026" even if the underlying stat later regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const already = (data && data.achievementsUnlocked) || {};
    const newly = {};
    ACHIEVEMENTS.forEach(a => {
      if (already[a.id]) return;
      if ((achievementStats[a.stat] || 0) >= a.threshold) {
        newly[a.id] = new Date().toISOString();
      }
    });
    if (Object.keys(newly).length === 0) return;
    save({ ...data, achievementsUnlocked: { ...already, ...newly } });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [achievementStats.visits, achievementStats.bestStreak, achievementStats.goals, achievementStats.habitsActive, achievementStats.xp, achievementStats.smartGoals, achievementStats.goalsCreated, achievementStats.activeGoalsCleared, achievementStats.habitPerGoal, achievementStats.featuresExplored]);

  /* Also keep data.bestStreaks up-to-date — whenever a habit's current
     streak exceeds its cached best, bump the cache so the achievement
     counter never regresses. */
  useEffect(() => {
    if (!data || !data.onboardingComplete) return;
    const habitsArr = data.habits || [];
    const cache = { ...(data.bestStreaks || {}) };
    let changed = false;
    habitsArr.forEach(h => {
      const s = getStreak(h);
      if (s > (cache[h.id] || 0)) { cache[h.id] = s; changed = true; }
    });
    if (changed) save({ ...data, bestStreaks: cache });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [data && data.habits]);

  const exportData = () => {
    const b = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `verrocchio-backup-${tk()}.json`;
    a.click();
  };
  const importData = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const p = JSON.parse(ev.target.result);
        if (!p.habits) p.habits = SEED_HABITS;
        if (!p.goals) p.goals = SEED_GOALS;
        if (!p.journal) p.journal = [];
        if (!p.archive) p.archive = [];
        if (!p.quotes) p.quotes = [];
        if (!p.todos) p.todos = [];
        save(p);
      } catch {
        alert("Invalid file.");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  /* TODOS */
  const addTodo = () => {
    if (!nTodo.trim()) return;
    save({
      ...data,
      todos: [...data.todos, {
        id: Date.now(),
        text: nTodo.trim(),
        done: false,
        date: new Date().toDateString(),
        dueDate: nTodoDue || null,
        goalId: nTodoGoalId || null
      }]
    });
    touchFeature("todo.create");
    sNTodo("");
    sNTodoDue("");
    // Keep the goal selection sticky — users adding multiple to-dos for
    // the same goal shouldn't have to re-pick it every time. Clear it
    // explicitly via the picker's "No goal" option.
  };
  const sETodo = t => {
    sETodoId(t.id);
    sETodoTxt(t.text);
    sETodoDue(t.dueDate || "");
  };
  const svETodo = id => {
    if (!eTodoTxt.trim()) return;
    save({
      ...data,
      todos: data.todos.map(t => t.id === id ? {
        ...t,
        text: eTodoTxt.trim(),
        dueDate: eTodoDue || null
      } : t)
    });
    sETodoId(null);
  };
  const chkTodo = id => {
    const t = data.todos.find(x => x.id === id);
    if (!t) return;
    save({
      ...data,
      todos: data.todos.filter(x => x.id !== id),
      archive: [...(data.archive || []), {
        ...t,
        done: true,
        archivedAt: new Date().toISOString()
      }]
    });
  };
  const delTodo = id => {
    const t = data.todos.find(x => x.id === id);
    if (!t) return;
    pushUndo(`Deleted task: ${t.text.slice(0, 30)}`, JSON.parse(JSON.stringify(data)));
    save({
      ...data,
      todos: data.todos.filter(x => x.id !== id),
      archive: [...(data.archive || []), {
        ...t,
        archivedAt: new Date().toISOString()
      }]
    });
  };
  const reordTodos = l => save({
    ...data,
    todos: l
  });
  const dueStatus = d => {
    if (!d) return null;
    const td = new Date();
    td.setHours(0, 0, 0, 0);
    const du = new Date(d + "T00:00:00");
    const df = Math.round((du - td) / 86400000);
    if (df < 0) return {
      label: "Overdue",
      color: "#dc2626",
      bg: "#fef2f2"
    };
    if (df === 0) return {
      label: "Due today",
      color: "#d97706",
      bg: "#fffbeb"
    };
    if (df === 1) return {
      label: "Due tomorrow",
      color: "#d97706",
      bg: "#fffbeb"
    };
    if (df <= 7) return {
      label: `Due in ${df}d`,
      color: "#0891b2",
      bg: "#f0f9ff"
    };
    return {
      label: new Date(d + "T00:00:00").toLocaleDateString("en-US", {
        month: "short",
        day: "numeric"
      }),
      color: "#6b7280",
      bg: "var(--c-surface-raised)"
    };
  };

  /* GOALS */
  const addGoal = () => {
    if (!nGoal.trim()) return;
    // Require an Area of Life. Without a bucket, the goal used to fall
    // into a null-type "General" pile that wasn't in HT, so the card
    // rendered with broken theme colors and the filter chips couldn't
    // target it. Rather than add a real "General" bucket, we force the
    // user to pick — that's the prompt the UI keeps making anyway.
    if (!nGType) {
      setGoalAreaErr(true);
      return;
    }
    // Require at least one underlying habit. A goal with no driving
    // habit is just a wish; the user has explicitly opted into pairing
    // each new goal with a concrete first habit. If the user clears
    // it, we abort and the gated Save button (already disabled) catches
    // the rest. Both records are created in a single save() call so
    // they land in localStorage + Firestore atomically and the habit's
    // goalId never points at a missing goal.
    if (!nGFirstHabit.trim()) return;
    const goalId = Date.now();
    const habitId = goalId + 1;
    const todayISO = dk(new Date());
    // Pull the habit's metadata from the new-habit form state that
    // Step 4 populated. Defaults match the standalone Add Habit form
    // so a user who tabbed past every dropdown still gets a valid
    // shape. The Area of Life is forced to nGType regardless of
    // nHType so it can't drift from the goal's area.
    const habitFreq = {
      ...(nHFreq || {}),
      type: (nHFreq && nHFreq.type) || "daily",
      days: Array.isArray(nHFreq && nHFreq.days) ? nHFreq.days.slice() : [],
      day: typeof (nHFreq && nHFreq.day) === "number" ? nHFreq.day : null,
      monthDay: typeof (nHFreq && nHFreq.monthDay) === "number" ? nHFreq.monthDay : 1,
      month: typeof (nHFreq && nHFreq.month) === "number" ? nHFreq.month : 0
    };
    save({
      ...data,
      goals: [...data.goals, {
        id: goalId,
        text: nGoal.trim(),
        type: nGType,
        smart: {
          ...nGSmart
        }
      }],
      habits: [...(data.habits || []), {
        id: habitId,
        text: nGFirstHabit.trim(),
        // Inherit area from the goal so habit + goal share a category.
        type: nGType,
        section: nHSec || "morning",
        duration: nHDur || "",
        importance: nHImp || "Important",
        notes: (nHNotes && nHNotes.trim()) || null,
        frequency: habitFreq,
        location: "both",
        startDate: nHStart || todayISO,
        goalIds: [goalId],
        goalId: goalId,
        completions: {},
        completionTimes: {},
        completionUnits: {},
        // Target fields land here only when the user flipped the
        // Yes/No vs Target & Unit toggle to Target & Unit on
        // Step 4. Yes/No mode writes nulls so the habit reads as
        // a plain Yes/No card.
        target:    nHHasTarget ? (() => { const n = parseInt(nHTarget, 10); return isFinite(n) && n >= 0 ? n : null; })() : null,
        targetOp:  nHHasTarget ? (nHTargetOp === "<=" ? "<=" : ">=") : ">=",
        unitLabel: nHHasTarget ? ((nHUnitLabel || "").trim() || null) : null,
        increment: nHHasTarget ? (() => { const n = parseInt(nHIncrement, 10); return isFinite(n) && n > 0 ? n : null; })() : null
      }]
    });
    touchFeature("goal.create");
    touchFeature("habit.create");
    sNGoal("");
    sNGType("");
    sNGSmart({
      specific: "",
      measurable: "",
      measurableUnit: "",
      achievable: "",
      relevant: "",
      timebound: ""
    });
    sNGFirstHabit("");
    // Reset the shared new-habit form state so a later standalone
    // Add Habit attempt starts fresh.
    sNHabit("");
    sNHType("");
    sNHSec("morning");
    sNHDur("");
    sNHImp("Important");
    sNHFreq({ type: "daily", days: [], day: 1, monthDay: 1, month: new Date().getMonth() });
    sNHStart(dk(new Date()));
